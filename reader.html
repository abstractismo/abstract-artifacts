tives, \"an explosion of flavor\", busy dressing to look premium.\n3. **Generous.** We share the matter, the tools, the language.\n   We do: credit the bar and the author of the cocktail, give away the lexicon and the extraction method.\n   We do not: put ourselves in the spotlight, lock up the language, treat the prescriber as a mere sales channel.\n4. **Welcoming.** A brand of bartenders: we read each person.\n   We do: simple with a beginner (the Concombre, the most obvious way in), sharp with a pro (the structure of the Poivron jaune, smoked with tea).\n   We do not: an entrance exam, a menu to decode, service that tests the guest.\n5. **Attentive.** Wonder as attention, not as mysticism.\n   We do: look closely at what the world walks past (a butter, a banana) and say what we saw there; speak of the fruit itself, the raspberry, the heart of the product.\n   We do not: promise an emotion or an effect; the wonder is ours before the ingredient, never an effect sold to the drinker.\n6. **Free.** We do what market conventions do not, because we believe in it, for ourselves first.\n   We do: release a Poivron jaune when the market expects a gin; own a choice justified by flavor alone.\n   We do not: reassure ourselves with a known category (\"it's like a gin\"), follow premium codes by default.\n\nTwo tensions sum up the character: radical in the product, familiar in the welcome; precise in the gesture, warm in the address. And one articulation settled with the Voice & tone chapter: its three words (Precise, Restrained, Generous) are the compression of the six traits for writing; the six are the full character, covering the space and the service as well. Same backbone, two granularities (hypothesis to validate).\n\n## What this changes, concretely\n\n**In the voice.** Abstract is never the hero of the sentence; we translate flavor instead of praising it; warmth travels through the address (\"yours to compose\"), not through adjectives. Before writing, one question is enough: does this sentence sound like someone precise, restrained, generous, welcoming, attentive and free?\n\n**In the design (hypotheses to validate).** The matter is the star: the color of the flavor carries the identity, everything else steps back. The human gesture stays visible - hand-painted, the owned imperfection of something made by humans. And the familiar frame works as legitimation: just as the old bistro makes a radical product accessible, the design borrows familiar forms to carry radical content.\n\n**In hospitality.** We read the person before rolling out the speech; depth is on request. The venue aims for self-evidence: the enormous work does not show, you come to live the moment, not to sit an exam. And credit flows both ways: the partner bar's menu names Abstract, Abstract names the bar and its author.\n\n## One personality, two expressions\n\nThe Lab and the Bistrot are the same person in two rooms of the house. In the Lab, the Creator is at the workbench: Precise and Free speak first. In the Bistrot, it hosts: Welcoming and Attentive speak first. The character never changes; only the order in which the traits express themselves does (hypothesis to validate). An Abstract Berlin, tomorrow, would reinterpret the lounge, never the character.\n\n## To settle / to challenge\n\n- **The Creator / Sage dosage.** Two thirds / one third is proposed. If the standard of flavor is our biggest ambition, should the Sage be more visible from the start, or stay in support while the library is young?\n- **\"Free\", displayed or lived.** Displayed boldness can contradict restraint. Should we claim freedom publicly, or let it show only in our actions?\n- **Three words or six traits.** Validate the two-level rule (three for writing, six for the whole brand) or merge into a single set.\n- **A named archetype versus Rémy's anti-dogma.** Rémy refuses dogmas; a frozen archetype could betray him. Confirm with him that \"the Creator who hands the brush\" describes his posture without freezing it.\n- **The Lab / Bistrot flexion.** Validate that the character does not flex between expressions, only the priority of the traits; or accept that the Bistrot genuinely bends the character toward hosting.\n", "fr": "# Personnalité & archétype de marque\n\n> v2 approfondie, pièce à casser. 2026-07-05. Cette version prend parti : un archétype dominant assumé, six traits actionnables, des implications concrètes sur la voix, le design et l'hospitalité. Les trous sont comblés par des hypothèses marquées « (hypothèse à valider) », pas par des blancs. À casser avec Nico, fidélité à Rémy à confirmer avec lui.\n\nCe chapitre donne un caractère nommé à Abstract : l'archétype qui oriente la marque et les traits qui la rendent reconnaissable, pour que tout le monde - de la copy d'un Monochrome au service en salle - incarne la même personne. Abstract est la marque chapeau ; le Lab (la cuisine) et le Bistrot (le salon) sont deux expressions sœurs de ce même caractère. Et la marque parle à tous, pro comme amateur : commencer par les professionnels est une question de déploiement, pas de personnalité.\n\n## L'archétype dominant : le Créateur qui tend le pinceau\n\nOn tranche : l'archétype dominant d'Abstract est **le Créateur**, et on l'assume sur toutes les surfaces. Trois preuves, pas une intuition :\n\n1. **Le nom et le produit sont nés de l'art.** Les Monochromes sont nommés d'après l'art abstrait ; les cocktails se composent comme une sérigraphie, une couleur posée sur l'autre. Ce n'est pas un vernis marketing, c'est l'acte de naissance.\n2. **La thèse tient en une phrase de Rémy** : on ne vend pas des tableaux, on vend de la peinture. Abstract fabrique de la matière et un medium, pas des objets finis.\n3. **Le geste créatif est singulier** : c'est un geste de retrait. Extraire, enlever le superflu, ne garder d'un ingrédient que son essence. Peu de choses, mais ce qui reste est puissant, et il n'y a nulle part où se cacher.\n\nMais notre Créateur a une singularité qui le distingue de presque toutes les marques de cet archétype : **il ne crée pas pour être admiré, il crée pour que d'autres créent.** L'œuvre finale n'est jamais la sienne. Elle appartient au barman qui pose la Framboise sur une structure de Negroni, au chef qui glisse l'Olive noire de Nyons dans un dessert, à l'amateur qui essaie le Concombre chez lui. On rend les gens auteurs, pas spectateurs. C'est un Créateur généreux, qui tend le pinceau au lieu de signer le tableau.\n\n## Le second : le Sage, version bibliothécaire\n\nEn soutien, **le Sage**. Abstract construit un standard, une bibliothèque de la saveur : un langage partagé, une connaissance ouverte, une approche de l'extraction qu'on donne au lieu de la garder (on partage la méthode, on garde la recette exacte). Mais c'est un sage de comptoir, tenu au chaud par l'hospitalité : il accueille, il ne fait jamais la leçon. La profondeur est là sur demande, jamais imposée.\n\nDosage proposé : le Créateur mène partout ; le Sage prend la parole sur les surfaces d'apprentissage - le lexique, les fiches de méthode, les ateliers, la formation des équipes - soit environ un tiers de l'expression de la marque (hypothèse à valider).\n\n## Ce qu'on n'est pas : trois refus\n\n- **Pas le Magicien.** L'extraction sous vide ressemble à de la magie ; on refuse le mystère. Le Monochrome Beurre évoque le gras, mais la distillation a retiré le gras : on dit « évoqué », pas « présent ». Notre maîtrise est faite de technique et d'attention, pas de tours.\n- **Pas le Souverain.** On ne se pose pas en « référence » qui domine sa catégorie. On construit un standard partagé, dans lequel chacun se retrouve et puise.\n- **Pas l'Explorateur.** C'est la fausse piste la plus tentante : le « terrain de la saveur » sonne comme une aventure. Mais notre geste est l'inverse de l'exotisme : on ne rapporte pas l'ingrédient du bout du monde, on regarde de près ce devant quoi tout le monde passe - un beurre, un concombre, une banane. L'aventure est dans l'attention, pas dans la distance.\n\n## La personnalité en une phrase\n\n> **Un créateur précis et libre, qui regarde la saveur de près et tend le pinceau : radical dans la matière, familier dans l'accueil.**\n\n## Six traits actionnables\n\n1. **Précis.** Fidèle à ce qui est réellement là.\n   On fait : nommer exactement (« une amertume qui se lit olive noire de Nyons », un citron qui est de Menton et on le dit).\n   On ne fait pas : un mot pour deux saveurs, « goût citron » générique, prétendre présent ce que le procédé a retiré.\n2. **Sobre.** On retire jusqu'à ce qu'il ne reste que le puissant.\n   On fait : des phrases et des étiquettes qui tiennent debout sans décor ; une idée à la fois.\n   On ne fait pas : les superlatifs, « l'explosion de saveur », l'habillage chargé pour paraître premium.\n3. **Généreux.** On partage la matière, les outils, le langage.\n   On fait : créditer le bar et l'auteur du cocktail, donner le lexique et la méthode d'extraction.\n   On ne fait pas : se mettre en vedette, verrouiller le langage, traiter le prescripteur comme un simple canal de vente.\n4. **Accueillant.** Une marque de barmen : on lit chaque personne.\n   On fait : simple avec un débutant (le Concombre, l'entrée la plus évidente), pointu avec un pro (la structure du Poivron jaune, fumée au thé).\n   On ne fait pas : l'examen d'entrée, la carte à décoder, le service qui teste le client.\n5. **Attentif.** L'émerveillement comme attention, pas comme mysticisme.\n   On fait : regarder de près ce devant quoi le monde passe (un beurre, une banane) et dire ce qu'on y a vu ; parler du fruit lui-même, la framboise, cœur du produit.\n   On ne fait pas : promettre une émotion ou un effet ; l'émerveillement est le nôtre devant l'ingrédient, jamais un effet vendu au buveur.\n6. **Libre.** On fait ce que les conventions du marché ne font pas, parce qu'on y croit, pour nous d'abord.\n   On fait : sortir un Poivron jaune quand le marché attend un gin ; assumer un choix qui ne se justifie que par la saveur.\n   On ne fait pas : se rassurer par une catégorie connue (« c'est comme un gin »), suivre les codes premium par défaut.\n\nDeux tensions résument le caractère : radical dans le produit, familier dans l'accueil ; précis dans le geste, chaleureux dans l'adresse. Et une articulation posée avec le chapitre Voix & ton : ses trois mots (Précis, Sobre, Généreux) sont la compression des six traits pour l'écriture ; les six sont le caractère complet, qui couvre aussi l'espace et le service. Même colonne vertébrale, deux granularités (hypothèse à valider).\n\n## Ce que ça change, concrètement\n\n**Dans la voix.** Abstract n'est jamais le héros de la phrase ; on traduit la saveur au lieu de la vanter ; la chaleur passe par l'adresse (« à vous de composer »), pas par les adjectifs. Avant d'écrire, une question suffit : est-ce que cette phrase sonne comme quelqu'un de précis, sobre, généreux, accueillant, attentif et libre ?\n\n**Dans le design (hypothèses à valider).** La matière est la vedette : la couleur de la saveur porte l'identité, le reste s'efface. Le geste humain reste visible - peint à la main, l'imperfection assumée d'une chose faite par des humains. Et le cadre familier sert de légitimation : comme le vieux bistrot rend le produit radical accessible, le design emprunte des formes familières pour porter un contenu radical.\n\n**Dans l'hospitalité.** On lit la personne avant de dérouler le discours ; la profondeur est à la demande. Le lieu vise l'évidence : le travail énorme ne se voit pas, on vient vivre le moment, pas passer un examen. Et le crédit circule dans les deux sens : la carte du bar partenaire nomme Abstract, Abstract nomme le bar et son auteur.\n\n## Une personnalité, deux expressions\n\nLe Lab et le Bistrot sont la même personne dans deux pièces de la maison. Au Lab, le Créateur est à l'établi : Précis et Libre parlent en premier. Au Bistrot, il reçoit : Accueillant et Attentif parlent en premier. Le caractère ne change jamais ; seul l'ordre dans lequel les traits s'expriment change (hypothèse à valider). Un Abstract Berlin, demain, réinterpréterait le salon, jamais le caractère.\n\n## À trancher / à challenger\n\n- **Le dosage Créateur / Sage.** Deux tiers / un tiers est proposé. Si le standard de la saveur est notre ambition la plus grande, le Sage doit-il être plus visible dès le départ, ou rester en soutien tant que la bibliothèque est jeune ?\n- **« Libre », affiché ou vécu.** L'audace affichée peut contredire la sobriété. Faut-il revendiquer la liberté publiquement, ou la laisser se voir dans les actes seulement ?\n- **Trois mots ou six traits.** Valider la règle à deux niveaux (trois pour l'écriture, six pour la marque entière) ou fusionner en un seul jeu.\n- **Un archétype nommé face à l'anti-dogme de Rémy.** Rémy refuse les dogmes ; un archétype figé pourrait le trahir. Valider avec lui que « le Créateur qui tend le pinceau » décrit sa posture sans la figer.\n- **La flexion Lab / Bistrot.** Valider que le caractère ne flexe pas entre les expressions, seulement la priorité des traits ; ou accepter que le Bistrot infléchisse réellement le caractère vers l'accueil.\n"}, {"id": "brand-book/lisible/04c-five-bold-steps.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/04c-five-bold-steps.md", "title_en": "Five Bold Steps (the vision)", "title_fr": "Five Bold Steps (la vision)", "en": "# Five Bold Steps (the vision)\n\n> **Exercise initiated (generative draft), to be reconciled with the FigJam and validated. 2026-07-05.**\n\nThis exercise fits on one page: where Abstract wants to go (the aspiration), the five bold moves that take us there, and what we lean on to hold them. It is the brand's road map - to be reread before any action plan, to check that every project serves one of these steps.\n\n## The aspiration\n\n**Make flavor a language everyone can speak.**\n\nAbstract becomes the standard of flavor: a living library where people come to see, name and share flavor - and leave with something to compose with. Not a brand that signs finished masterpieces: a house that hands over the matter, the tools and the words, and makes everyone an author - the reference bartender and the curious amateur alike.\n\n## The five bold steps\n\n### 1. Write the standard of flavor *(to validate)*\n\n**We build the library before others write the rules of the category.** Every aroma is translated into a simple, transmissible rendering (color as the anchor), named, shelved - and we give this language away rather than lock it up. One honesty keeps it clean: we evoke, we never claim, and we speak of the fruit itself, never of the alcohol or of an effect.\n\n### 2. Put the paint in the creators' hands *(to validate)*\n\n**Reference bars and gastronomic kitchens first - an order of deployment, not a definition of the brand.** We equip those who compose the loudest: reliable Monochromes, a language a team can be taught, a creation that is always credited. Their works become the first shelf of the library, and their recommendation our best voice.\n\n### 3. Open the door to everyone *(to validate)*\n\n**The brand speaks to everyone, not only to pros.** Beyond the medium, we hand the public tools and a language to better grasp flavor and play with it. The Bistrot is the living room where you experience it without sitting an exam: simple for the beginner, very deep for whoever asks - two audiences, one place.\n\n### 4. Grow the house into a galaxy *(to validate)*\n\n**Abstract is the umbrella brand; beneath it, two sister expressions: the Lab (the kitchen, where we make) and the Bistrot (the living room, where we host).** A common base you recognize everywhere, and for each place an expression of its own: an Abstract Berlin would not copy Lyon, it would reinterpret it locally. The home market first, then Europe, then the world.\n\n### 5. Give a lot, keep the edge *(to validate)*\n\n**We share the approach and the words; the edge lives elsewhere.** The language of flavor and our way of approaching extraction are given away - that is the spirit of the house. What stays hard to copy is the combination: the mastery, the instinct, the hospitality, the freedom, the network. The more we give, the more indispensable the library becomes.\n\n## What we lean on\n\n- **Technical mastery** of vacuum extraction: we are among the best.\n- **Freedom** from market conventions: we can do what the big groups will not.\n- **Instinct and humanity**: we do it because we believe in it, for ourselves first, before the business.\n- **Hospitality**: Abstract is a brand of bartenders, and hosting is what a bartender does best.\n- **The network**: the creators already composing with us, and talking about it.\n\nAnd one stance running through everything: **sharing.** We give the language and the approach; the exact recipe stays home. Generosity is not a weakness of the model, it is its engine.\n\n## To settle / to reconcile with the FigJam\n\n- **The aspiration**: reconcile this wording with the essence and signature in progress (\"the medium of flavor\", \"Compose with flavor.\").\n- **The five steps**: confront this cut with Ismail's FigJam - merge, rephrase or replace.\n- **The pace**: when to open wide to the public (step 3), and the France, Europe, world tempo (step 4).\n- **The values**: the value set proposed elsewhere (precision, restraint, generosity, connection, wonder) remains to be locked; check that it carries these five steps.\n- **The lasting edge**: confirm that the combination in step 5 is the right one, and that it does not rest on a single person.\n\n---\n\n*This chapter is an initiated draft, never discussed in a workshop: a piece to break, to reconcile with the FigJam before validation.*\n", "fr": "# Five Bold Steps (la vision)\n\n> **v2 approfondie, pièce à casser. 2026-07-05.** Deuxième passe de l'exercice : les trous du premier jet sont comblés par des hypothèses datées et chiffrées, marquées « (hypothèse à valider) ». À casser avec Nico et le FigJam avant validation.\n\nCet exercice tient sur une page : là où Abstract veut aller (l'aspiration), les cinq mouvements audacieux qui nous y mènent, et ce sur quoi on s'appuie pour les tenir. C'est la carte de route de la marque, à relire avant tout plan d'action pour vérifier que chaque chantier sert un de ces pas. Cette version prend parti : des horizons datés, des ordres de grandeur, des choix assumés. Tout ce qui est une hypothèse est marqué comme tel : c'est fait pour être challengé, pas pour être contourné.\n\n## L'aspiration\n\n**Faire de la saveur un langage que tout le monde peut parler.**\n\nDans dix ans, quand quelqu'un veut nommer une saveur - un barman à Séoul, une pâtissière à Lyon, un curieux à sa table - le réflexe est d'ouvrir la bibliothèque Abstract. Pas parce qu'on l'a imposée : parce qu'elle est la plus juste, la plus ouverte, et qu'on y trouve de quoi composer. Abstract devient le standard de la saveur : une bibliothèque vivante où l'on vient voir, nommer et partager la saveur, et repartir avec de quoi faire. Pas une marque qui signe des chefs-d'œuvre finis : une maison qui tend la matière, les outils et les mots, et qui rend chacun auteur, le barman de référence comme l'amateur curieux.\n\n## Les cinq pas audacieux\n\n### 1. Écrire le standard de la saveur\n\n**On écrit la bibliothèque avant que d'autres n'écrivent les règles de la catégorie.** La fenêtre est courte : douze à dix-huit mois avant qu'un acteur mieux financé ne s'y installe.\n\nChaque Monochrome entre à la bibliothèque avec sa fiche de langage : une couleur en ancrage, un rendu simple qui se lit dans le temps (l'attaque, le corps, la finale), des mots honnêtes. Le Beurre est le cas d'école : il évoque le gras, mais la distillation a retiré le gras - on dit « évoqué », jamais « présent ». Le Citron de Menton nomme son origine, parce qu'un standard qui ne cite pas ses sources n'en est pas un. L'Olive noire de Nyons prouve que la bibliothèque dépasse le fruit sucré : la saveur est un territoire entier, pas un rayon de sirops.\n\nLe pari : tout le catalogue a sa fiche de langage sous vingt-quatre mois, et la bibliothèque est publiée en ligne, ouverte et gratuite, dès les vingt premières entrées (hypothèse à valider). On ne verrouille rien : aucun dépôt sur les descripteurs, le langage se donne. Ce qui porte notre nom, c'est l'édition, comme un dictionnaire porte le nom de sa maison.\n\nComment on saura : un pro reformule juste ce qu'est un Monochrome après une première rencontre (cible : neuf sur dix, hypothèse à valider), et surtout le test de transmission : un chef de bar enseigne un Monochrome à son équipe sans nous dans la pièce, et l'équipe le restitue fidèlement.\n\n### 2. Mettre la peinture entre les mains des créateurs\n\n**Les bars de référence et les cuisines gastronomiques d'abord : un ordre de déploiement, pas une définition de la marque.** On arme ceux qui composent le plus fort, et on signe chaque œuvre.\n\nConcret : un cocktail construit sur Poivron jaune et Framboise porte le nom de son auteur sur la carte, et Abstract y figure comme la matière, jamais l'inverse. La cuisine est un front égal au bar : le Poivron jaune et le Concombre appellent les chefs ; la Banane et le Beurre appellent la pâtisserie (le gras évoqué sans le gras, c'est un outil de pâtissier). Le crédit n'est pas une courtoisie, c'est un contrat : la co-création est signée, et l'œuvre entre au premier rayon de la bibliothèque.\n\nLe pari : soixante établissements de référence actifs en France à la fin de la première année de déploiement, vingt-cinq créateurs ambassadeurs dont un tiers en cuisine et pâtisserie (hypothèses à valider).\n\nComment on saura : plus d'un tiers des nouveaux clients arrivent par recommandation d'un créateur, trois clients sur quatre recommandent au trimestre, et les cartes créditent visiblement (hypothèses à valider).\n\n### 3. Ouvrir la porte à tout le monde\n\n**La marque parle à tous dès aujourd'hui ; les produits pour tous arrivent par vagues datées.** Commencer par le pro est une décision de budget et de volume, pas d'identité.\n\nLe Bistrot est déjà la porte grand public : le salon où l'on vit la saveur sans passer d'examen. Le Concombre et le Citron de Menton sont des entrées évidentes pour un débutant ; l'Olive noire de Nyons attend le curieux qui veut aller loin. La bibliothèque en ligne est ouverte à tous dès le premier jour. Et on parle du fruit lui-même - la framboise, le citron - jamais de l'alcool ni d'un effet : c'est notre registre, et il est aussi notre conformité.\n\nLe pari : une première vague de formats grand public (petits formats, coffret de découverte de la saveur) dans les dix-huit mois qui suivent la consolidation du socle pro, et une part grand public autour de vingt pour cent du revenu à trois ans (hypothèses à valider).\n\nComment on saura : au Bistrot, un client sur trois repart avec un mot ou un geste : il nomme un Monochrome, il rejoue un accord chez lui, il offre le coffret (hypothèse à valider).\n\n### 4. Faire grandir la maison en galaxie\n\n**Abstract est la marque chapeau ; en dessous, deux expressions sœurs : le Lab (la cuisine, on fabrique) et le Bistrot (le salon, on accueille).** Un socle commun reconnaissable partout, une expression propre par lieu.\n\nLe pari, en trois cercles datés : la France se consolide d'abord (le socle pro et les deux lieux) ; une première adresse européenne ouvre à horizon trois ans, et on prend parti pour Londres, là où le réseau des créateurs est le plus dense et où la scène cocktail fait référence (hypothèse à valider, Berlin en alternative crédible). Un Abstract Londres ne copierait pas Lyon : il le réinterpréterait localement, avec le socle commun pour signature. Le monde vient après l'Europe, pas avant.\n\nComment on saura : le test de famille. Un client du Bistrot sait que le Lab fabrique la matière ; un client de Londres reconnaît la maison sans avoir vu Lyon (études de reconnaissance simples, hypothèse à valider).\n\n### 5. Donner beaucoup, garder l'avance\n\n**On partage l'approche et les mots ; l'avance vit ailleurs.** Le langage de la saveur et notre façon d'aborder l'extraction se donnent : c'est l'esprit de la maison. La recette exacte - les paramètres, la main, le jugement - reste à la maison.\n\nConcret : on enseigne volontiers comment on aborde un arôme fragile (le Concombre, qui se perd vite), on ne publie pas les paramètres d'extraction. Position assumée : le jour où un concurrent emploie nos mots pour vendre sa matière, on n'a pas perdu, on a gagné le langage. L'avance n'est pas dans le secret ; elle est dans la combinaison : la maîtrise, la liberté, l'instinct, l'hospitalité, le réseau, et le crédit rendu aux co-créateurs, qui fait qu'on préfère composer avec nous.\n\nComment on saura : plus de la moitié des mentions du segment pro nous citent, six prospects sur dix nous connaissent avant le premier contact (hypothèses à valider), et le signe paradoxal : nos mots apparaissent chez les autres.\n\n## Ce sur quoi on s'appuie\n\n- **La maîtrise technique** de l'extraction sous vide : on est parmi les meilleurs.\n- **La liberté** vis-à-vis des conventions du marché : on peut faire ce que les grands groupes ne feront pas.\n- **L'instinct et l'humanité** : on le fait parce qu'on y croit, pour nous d'abord. Un grand groupe piloté aux études de marché a déjà essayé ce terrain, et s'est retiré.\n- **L'hospitalité** : Abstract est une marque de barmen, et accueillir est ce qu'un barman sait faire de mieux.\n- **Le réseau** : les créateurs qui composent déjà avec nous, et qui en parlent.\n- **Le crédit des co-créateurs** : signer les œuvres de ceux qui composent avec nous rend le réseau fidèle, et difficile à débaucher.\n\nEt une posture qui traverse tout : **le partage.** On donne le langage et l'approche ; la recette exacte reste à la maison. La générosité n'est pas une faiblesse du modèle, c'est son moteur.\n\n## À trancher / à challenger\n\n- **Le tempo grand public** : la vague de formats à dix-huit mois après le socle pro est un choix de prudence ; l'alternative est d'ouvrir plus tôt, par le Bistrot et la bibliothèque en ligne seulement. Où met-on le curseur ?\n- **La première ville hors de France** : Londres (réseau, scène) ou Berlin (symbole, coût) ? Le choix engage la lecture du « sense of place ».\n- **Le sans-alcool** : la contrainte de production le bloque à court terme, mais la catégorie explose. Quand et comment lever la contrainte, ou assume-t-on que la saveur d'Abstract passe par l'alcool, point ?\n- **L'ouverture de la bibliothèque** : gratuite et contributive (notre pari), ou gratuite mais sous main éditoriale stricte ? La réponse règle qui peut y écrire, et comment elle reste juste.\n- **Le poids de la cuisine** : on l'a mise à égalité avec le bar dès le pas 2 (un tiers des ambassadeurs) ; l'alternative est bar d'abord, cuisine ensuite.\n- **Les chiffres eux-mêmes** : soixante établissements, vingt-cinq ambassadeurs, vingt pour cent grand public à trois ans sont hérités d'objectifs antérieurs ; à recaler sur la réalité commerciale du moment.\n\n---\n\n*Ce chapitre est un premier jet abouti, jamais discuté en atelier : une pièce à casser, à réconcilier avec le FigJam avant validation.*\n"}, {"id": "brand-book/lisible/04d-business-model-canvas.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/04d-business-model-canvas.md", "title_en": "Business Model Canvas", "title_fr": "Business Model Canvas", "en": "# Business Model Canvas\n\n> Exercise initiated (generative draft), to be reconciled with the FigJam and validated. 2026-07-05.\n\nThe Business Model Canvas lays out, in nine blocks, how Abstract creates value, moves it around, and lives from it: its purpose is to check that the brand and the business model tell the same story.\n\n## 1. Customer segments\n\nThe brand speaks to everyone: to the professional and to the general public alike. Starting with the pro is a deployment choice (budget, volume, effort), not a definition of the brand.\n\n- **The pro**: high-level bartenders and chefs (reference bars, gastronomic restaurants), creators under pressure, looking for reliable material to compose with. The culinary extension (cooking, pastry) is a priority ground.\n- **The enthusiast, the guest**: the person who walks into the Bistrot or orders online, to whom we hand tools and a language to better grasp flavor and play with it.\n\nGeography in circles: France first, then Europe, then export and the world.\n\n## 2. Value propositions\n\nWe do not sell finished objects: we sell material and tools that each person makes their own. We make people authors, not spectators.\n\n- **The material**: the Monochromes, isolated and pure aromas (nothing added), made to be composed with, not to be drunk on their own.\n- **The language**: a standard, almost a library of flavor: the means to see, name and share what we perceive.\n- **The custom work**: a distillate created on a client's request, with three levels of involvement, from the most discreet to the most co-signed.\n- **The place**: the Bistrot, where the same rigor is lived simply, with no exam to pass.\n\nThe register stays sensitive and honest: we evoke flavor, we never claim more than what is there.\n\n## 3. Channels\n\nDirect sales to establishments are today's core. Around them: distributors and wine merchants (an existing but weakened channel, to watch), e-commerce (the online buying experience still needs rebuilding), and the Bistrots in Lyon and Paris, living showcases and the general public's first contact with the brand. The network of prescribers (the bartenders and chefs who recommend us) is a channel in its own right: it is what makes the language travel.\n\n## 4. Customer relationships\n\nThe relationship is part of the product. With the pro: support that runs from discovery to credited co-creation - we train, we share the approach, we turn people into prescribers. With the public: the hospitality of the Bistrot, with depth on demand (very far with a sharp pro, kept simple with a beginner). The underlying stance is generosity: we give the language and the approach, we keep the exact recipe.\n\n## 5. Revenue streams\n\n- **The Monochromes** sold to pros, with recurrence as the engine (repurchase, primary-supplier status).\n- **The custom work**, priced by the level of transparency and rights sharing; assigning or sharing the rights to a recipe is a revenue in itself.\n- **The general public**: e-commerce, and what is lived and bought at the Bistrot (the bar, the table).\n- **To explore**: training, masterclasses, signed drops.\n\nThe current split between these streams is still to be quantified: it is the first piece of data missing from this canvas.\n\n## 6. Key resources\n\nTechnical mastery of vacuum extraction: we are among the best. Rémy's renown and international network - a major resource, but the advantage must not come down to his presence alone. The team's instinct and humanity: we do it because we believe in it. The two places. And the library of flavor itself: the language and the renderings that accumulate. All of it carried by an umbrella brand, Abstract, with two sister expressions: the Lab (the kitchen, where we make) and the Bistrot (the living room, where we host).\n\n## 7. Key activities\n\nMaking (the Lab): extracting, producing, creating new Monochromes and the custom distillates. Hosting (the Bistrot): keeping the places alive. Passing on: the language, the tools, the training. And animating the network: co-creations, credits, prescribers who recommend.\n\n## 8. Key partners\n\nProducers and the sourcing of raw ingredients: quality starts there (the exact supply chains are to be specified). Distributors. Partner establishments and bartender and chef ambassadors. For the culinary extension: cooking and pastry partners to identify.\n\n## 9. Cost structure\n\nProduction: quality raw ingredients, extraction, and a base that remains alcoholic in the short term (a known production constraint that closes the non-alcoholic door for now). The two places: rents, teams, hospitality. Creation: custom work consumes trial and tasting time. The brand and its diffusion. Break-even has been reached and organic growth is under control; the detail of costs and margins is still to be quantified.\n\n## To settle / to reconcile with the FigJam\n\n- **Quantify the revenue split** (Monochromes, custom work, Bistrot, e-commerce) before any trade-off.\n- **The place of the general public** in the next two years' model: which channel first (rebuilt e-commerce, the Bistrot, both)?\n- **The custom work**: validate the three levels of involvement and the rights-sharing logic.\n- **Training and masterclasses**: a revenue stream, a gesture of generosity, or both?\n- **The Lab / Bistrot reading**: one umbrella canvas (as here) or two sister canvases sharing the same base?\n", "fr": "# Business Model Canvas\n\n> **v2 approfondie, pièce à casser. 2026-07-05.** Ce chapitre pousse le brouillon initial un cran plus loin : les trous sont comblés par des hypothèses assumées, chacune marquée « (hypothèse à valider) ». À challenger par Ismaïl et Nico, puis à réconcilier avec le FigJam.\n\nLe Business Model Canvas met à plat, en neuf blocs, comment Abstract crée de la valeur, la fait circuler et en vit. Il sert à vérifier une chose simple : que la marque et le modèle économique racontent la même histoire. Ici, la marque parle à tout le monde ; le modèle, lui, choisit par où commencer.\n\n## 1. Segments de clientèle\n\nLa marque parle à tous : au professionnel comme au grand public. Commencer par le pro est un choix de déploiement (budget, volume, effort), pas une définition de marque.\n\n- **Le pro (B2B), cœur du déploiement.** Trois visages : les bars de référence, où la carte prouve la maîtrise ; les cuisines et pâtisseries gastronomiques, terrain prioritaire de l'extension culinaire, où un Poivron jaune ou un Concombre parlent autant à un chef qu'à un barman ; et les maisons ou marques qui veulent un distillat à elles. Cible : 60 établissements actifs fin 2026, dont la moitié nous traite en fournisseur principal (hypothèse à valider).\n- **Le grand public (B2C), déjà là.** Le curieux qui pousse la porte du Bistrot à Lyon ou à Paris, et l'amateur qui commandera en ligne quand l'expérience d'achat aura été refondée. On ne le fait pas attendre : le Bistrot est son entrée dès aujourd'hui.\n\nGéographie par cercles : la France d'abord (Paris, Lyon, Marseille, Bordeaux), puis le Royaume-Uni et le Benelux via le réseau international, puis le monde (tempo : hypothèse à valider).\n\n## 2. Propositions de valeur\n\nOn ne vend pas des objets finis : on vend de la matière et des outils que chacun s'approprie. On rend les gens auteurs, pas spectateurs.\n\n- **La matière : les Monochromes.** Des arômes isolés et purs, rien d'ajouté, faits pour composer : Beurre, Framboise, Citron de Menton, Poivron jaune, Concombre, Olive noire de Nyons, Banane. Chacun est une couleur sur la palette, pas une bouteille à finir. Et chacun tient la promesse d'honnêteté : le Beurre évoque le gras que la distillation a précisément retiré. On dit « évoqué », jamais « présent ».\n- **Le langage : le standard de la saveur.** Une bibliothèque où chaque arôme est traduit en un rendu simple et transmissible, qu'une équipe peut apprendre. C'est ce qui transforme un achat en adoption.\n- **Le sur-mesure : le distillat à la demande.** Trois niveaux, du plus discret (on produit pour le client, on garde les droits de la recette) au plus co-signé (transparence complète, droits partagés, trois à cinq dégustations). Le prix monte avec la transparence et le crédit.\n- **Le lieu : le Bistrot.** La même exigence, vécue simplement, sans examen. Le cadre familier rend un produit radical accessible.\n\nSur les marchés réglementés, on parle du fruit lui-même, la Framboise, le Citron de Menton, jamais de l'alcool ni d'un effet. C'est à la fois notre registre et notre conformité.\n\n## 3. Canaux\n\nLes flux B2B et B2C ne passent pas par les mêmes portes.\n\n**B2B.** La vente directe aux établissements est le cœur, et doit le rester. Les distributeurs et cavistes existent mais s'affaiblissent ; position assumée : on les garde comme relais de couverture, sans leur laisser plus de 30 % du chiffre B2B (hypothèse à valider). Le vrai canal de croissance est le réseau de prescripteurs, les barmen et chefs qui recommandent, avec un tiers des nouveaux clients acquis par recommandation (hypothèse à valider).\n\n**B2C.** Position assumée : le Bistrot d'abord, l'e-commerce ensuite. Les deux Bistrots sont le premier canal grand public : on y goûte, on y apprend, on y achète. L'e-commerce, à l'expérience historiquement décevante, ne rouvre en grand qu'une fois refondé à la hauteur du lieu, visé sous dix-huit mois (hypothèse à valider). Vendre en ligne une expérience en dessous du Bistrot abîmerait la marque.\n\n## 4. Relations clients\n\nLa relation fait partie du produit.\n\n- **Avec le pro** : un parcours qui va de la découverte à la co-création créditée. On forme les équipes au langage, on accompagne les premières cartes, on crédite chaque création : le nom du barman ou du chef d'abord, Abstract comme matière nommée derrière. Le crédit du co-créateur n'est pas une politesse, c'est le mécanisme qui rend le réseau difficile à copier.\n- **Avec le public** : l'hospitalité, avec la profondeur à la demande. Très loin avec un passionné, tout simple avec un débutant, dans le même lieu.\n\nLa posture de fond est la générosité : on donne le langage et l'approche, on garde la recette exacte.\n\n## 5. Sources de revenus\n\nLa répartition actuelle n'est pas consolidée ; on pose donc une première structure de lecture, à corriger avec les vrais chiffres.\n\n**Aujourd'hui (hypothèse à valider)** : Monochromes vendus aux pros ~55 % du chiffre, Bistrots (bar + table) ~30 %, sur-mesure ~10 %, e-commerce ~5 %.\n\n**Cap à trois ans (hypothèse à valider)** : Monochromes B2B 45 %, Bistrots 25 %, sur-mesure 15 %, grand public en ligne 10 %, formation et contenus 5 %. La lecture derrière ces chiffres : la récurrence B2B reste le socle (réachat trimestriel visé à 75 %), le sur-mesure devient un vrai deuxième étage, et le grand public cesse d'être une figure de style pour devenir une ligne du compte de résultat.\n\n**Le sur-mesure, tarifé par la transparence (hypothèse à valider)** : niveau discret à partir de ~2 500 €, niveau accompagné ~6 000 €, niveau co-signé à partir de ~12 000 €, la cession ou le partage des droits d'une recette étant un revenu à part entière.\n\n**Formation et contenus** : position assumée : payants pour les entreprises et les marques, généreux pour les pros du réseau. La masterclass d'un grand groupe se facture ; l'atelier du jeune barman prometteur s'offre. C'est un coût d'acquisition, pas une perte.\n\n## 6. Ressources clés\n\n- **La maîtrise technique** de l'extraction sous vide : on est parmi les meilleurs.\n- **La liberté** vis-à-vis des conventions : on fait ce que les grands groupes ne font pas.\n- **L'instinct et l'humanité** de l'équipe : on le fait parce qu'on y croit.\n- **L'hospitalité** : une marque de barmen sait accueillir.\n- **Le réseau**, dont la renommée internationale de Rémy est l'accélérateur ; le modèle doit toutefois apprendre à gagner des clients sans lui.\n- **La bibliothèque de la saveur** elle-même : le langage, les rendus, les créations créditées qui s'accumulent. Un actif qui prend de la valeur à chaque usage.\n\nLe tout porté par une marque chapeau, Abstract, avec deux expressions sœurs : le Lab (la cuisine, on fabrique) et le Bistrot (le salon, on accueille).\n\n## 7. Activités clés\n\nFabriquer (le Lab) : extraire, produire, créer, avec une cadence de quatre à six nouveaux Monochromes par an (hypothèse à valider), plus les sur-mesure. Accueillir (le Bistrot) : faire vivre les lieux. Transmettre : le langage, les outils, la formation. Animer le réseau : co-créations, crédits, une vingtaine d'ambassadeurs actifs (hypothèse à valider). Et entretenir la bibliothèque : nommer, traduire, ranger chaque nouvelle saveur. C'est une activité en soi, pas un sous-produit.\n\n## 8. Partenaires clés\n\nLes producteurs d'abord : la qualité commence dans le champ. Position assumée : des filières nommées et revendiquées, à l'image du Citron de Menton (IGP) et de l'Olive noire de Nyons (AOP). Le terroir est déjà dans le nom des produits ; il doit l'être dans les contrats (sécurisation des volumes : hypothèse à valider). Ensuite : les distributeurs (relais, pas dépendance), les établissements partenaires et les ambassadeurs barmen et chefs, et pour l'extension culinaire deux maisons de gastronomie ou de pâtisserie partenaires d'ici deux ans (hypothèse à valider).\n\n## 9. Structure de coûts\n\n- **La production** : des ingrédients bruts de qualité (une filière nommée se paie), l'extraction, et une base qui reste alcoolisée à court terme, contrainte de production connue qui ferme pour l'instant la porte du sans-alcool. On l'assume plutôt que de bricoler un sans-alcool en dessous de notre exigence.\n- **Les lieux** : loyers, équipes, hospitalité de Lyon et Paris.\n- **La création** : le sur-mesure consomme des essais et des dégustations ; ce temps se retrouve dans les prix du bloc 5.\n- **La générosité** : échantillons, formations offertes, temps donné au réseau. On la traite comme un coût d'acquisition mesuré, pas comme du mécénat : le coût d'un client gagné par le réseau doit rester nettement sous celui des autres canaux (hypothèse à valider).\n- **La marque** : la refonte et sa diffusion, plafonnées autour d'un dixième du chiffre annuel (hypothèse à valider).\n\nLe point d'équilibre est atteint et la croissance reste organique. Position assumée : pas de levée de fonds tant que la fenêtre concurrentielle peut être tenue par le réseau (hypothèse à valider).\n\n## À trancher / à challenger\n\n- **Le poids du sur-mesure** : deuxième étage du modèle (15 % à trois ans) ou offre d'appel qui nourrit le catalogue ? Le niveau co-signé cannibalise-t-il le temps du Lab ?\n- **Les distributeurs** : réinvestir un canal qui s'affaiblit, ou assumer sa décroissance au profit du direct et du réseau ?\n- **Le tempo B2C** : le Bistrot seul comme canal grand public jusqu'à la refonte e-commerce, ou un pont plus tôt (commande en ligne à retirer au Bistrot, drops limités) ?\n- **Formation payante ou généreuse** : la ligne proposée (entreprises payantes, réseau offert) tient-elle face aux cas réels ?\n- **Le sans-alcool** : on assume l'absence tant que la production ne suit pas, ou on prépare dès maintenant une voie à la hauteur de notre exigence ?\n- **Un canvas ou deux** : garder ce canvas chapeau, ou décliner deux canvases sœurs (Lab, Bistrot) qui partagent le socle ?\n- **La dépendance au réseau fondateur** : quel palier de clients gagnés sans Rémy prouverait que l'avantage est bien la combinaison, pas la personne ?\n\n---\n\n*Ce chapitre est une v2 générée, jamais discutée en atelier : une pièce à casser, à réconcilier avec le FigJam avant validation.*\n"}, {"id": "brand-book/lisible/05-concept-distorsion.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/05-concept-distorsion.md", "title_en": "The concept: Distortion", "title_fr": "Le concept : la Distorsion", "en": "# The concept: Distortion\n\n> Readable version, for human review. Draft of 2026-07-04. We stripped out all the agent tooling: tests, source tags, coded cross-references, protocols. What is left is the concept: what distortion is, why it is the right image for Abstract, and the rules that govern it.\n>\n> Status: proposal, meant to be challenged. The real creative work stays with Rémy and the art direction; this document proposes a system, it does not lock the gesture.\n\n## 1. The central idea\n\nDistortion is the same thing as distillation, but for the image.\n\nOur process removes the matter of the fruit to keep only its aromatic substance. Distortion does the same to the image: it removes the literal object and keeps the sensation. **Distillation is to the product what distortion is to the image.** This is the red thread of the whole concept: distortion is not decoration, it is the visual counterpart of what we make.\n\nAnother way to put it: **we do not photograph the fruit, we render the sensation the fruit leaves behind.** When you remember a perfect peach, you do not see an exact botanical image; you find again the warmth, the ripeness, the light of the moment. Memory does not fix reality, it keeps its charge. Distortion lets you see that memory.\n\nThe discipline it imposes: a distortion that adds no sensation is pure decoration, and we refuse it. We remove in order to reveal; there is nowhere to hide.\n\n## 2. A signature, not a filter\n\nAbstract's distortion is not a blur.\n\nOur signature gesture is **overprinting / off-registration**: one color laid over another, slightly offset, the seam left visible, the way a screen print works. It is Rémy's own words for how the Monochromes compose: \"you lay one color over another and that creates the composition.\" A digital variant completes the gesture: chromatic aberration, colors that lightly fringe the edges.\n\nWhy the distinction matters: the **generic gaussian blur** is the filter everyone applies. It belongs to no one and says nothing. Overprinting, by contrast, is a craft with a lineage (Warhol's screen printing, the abstract art of Malevich, Rothko, Pollock, Kandinsky). That is where the brand becomes unmistakable. Decorative blur, the bottle-on-black glamour shot, the frozen-droplet stock photo: that is not us.\n\n## 3. Distortion is a library, not four boxes\n\nThere are not four fixed types of distortion. There is an **open library of techniques, and it is the aroma that summons the technique.**\n\nEvery aroma has a profile you can read: round or sharp, bright or lingering, transparent or dense, intense or quiet. Each trait has an image physics that expresses it. A round, enveloping aroma calls for a soft blur; an electric attack calls for a kinetic streak; a note that bursts then fades calls for a star of light. The library stays open: a new aroma can call for a technique no other has used yet.\n\nThat is polymorphism: a single system, but an expression proper to each product, derived from what the product actually is. Not eight products forced into four boxes.\n\n## 4. Product by product: the Monochromes\n\nThe proof that the system works: two close aromas produce opposite images, not from a designer's taste, but because the aromas themselves diverge.\n\n- **Raspberry vs Strawberry.** Same berry family. Raspberry is taut, intense, it bursts: a radial-burst image. Strawberry is round, warm, it blooms like jam warming up: a slow-blur image.\n- **Yellow pepper vs Lemon.** Both electric, both sharp. Pepper is a sustained attack: a directional streak. Lemon is a zest that flashes then fades: a star that explodes then dies.\n- **Cucumber vs Black olive.** Both read \"through.\" Cucumber is clear, watery: a light ripple. Olive is deep, low, oily: a dark reflection, black on black, the most reductive, the most \"abstract\" of them all.\n\nEach Monochrome thus receives one main technique, sometimes a secondary accent, always printed through the house signature.\n\n## 5. Where distortion is allowed to live\n\nOne simple rule governs everything: **distortion lives on the image; the text stays sharp.**\n\nEverything factual that must be read (a name, a price, a legal notice, the alcohol content, the composition) is set sharp, legible, never distorted. The logo is the only exception: it carries a deliberate motion while staying legible.\n\nIntensity is tuned to the surface. An art object like the bottle can go far; a menu, an email, a post, an ad stay restrained, both for legibility and to stay compliant. The bottom-line rule: on anything meant for the public, legibility comes before effect. An image too distorted to be decoded does not ship.\n\n## 6. Evoke honestly (and the Evin law)\n\nOur ground is the sensitive, poetic evocation of flavor. We do not describe a lemon by its grams of acid; we render its idea, its sensation. This is the heart of the brand.\n\nTwo honesties keep it true.\n\n- **Evoked, not present.** The butter Monochrome evokes fat, but distillation is precisely what removed the fat. We suggest it, we do not claim it is there. Distortion can evoke a sensation; it never asserts a fact. Facts (method, composition, legal notices) live in the sharp text.\n- **The Evin law.** On regulated markets, we speak of the **fruit itself** (the raspberry, the heart of the product), never of alcohol or of an effect. That is what keeps us both true and compliant. Any public-facing piece goes through legal validation before publication.\n\n## 7. Color\n\nColor is the brand's anchor: we literally carry its name. It is a subject of its own, the **standard, the library of flavor**, handled elsewhere. One point of caution here: we do not represent a product's profile as a cliché organoleptic radar; we look for a truer, more accessible expression (orientation 2026-07-04).\n\n## 8. In the venues: Lab and Bistrot\n\nAbstract is an **umbrella brand**. Beneath it, **two sister expressions**: Abstract Lab (the kitchen, where we make) and Abstract Bistrot (the living room, where we welcome). They share a **common base** (the same graphic and editorial signature, you can feel you are in the same galaxy) and each has its **own living expression**; an Abstract Berlin, tomorrow, would be a local reinterpretation, not a copy (orientation 2026-07-04, to validate with Rémy).\n\nFor distortion, this means: the grammar is shared, we do not reinvent a language per venue. What changes from one place to another is the frame (the room, the mood, the materials), not the gesture. The familiar frame of the old bistro does not dull the product: on the contrary, it makes the radical product legitimate and accessible. The old model \"the core is locked, the venue only flexes the frame\" softens toward \"common base + own expression\"; architecture to confirm with Rémy.\n\n## 9. How long it holds\n\nDistortion is validated as the brand's visual language for about two years (horizon 2028). It is **re-evaluated at the deadline, not renewed by default**: is it still ours, or has it become a category cliché? We reopen it earlier if a competitor adopts the same language, if overprinting saturates the wider design market, or if the Evin legal frame tightens.\n\n## What is still to be settled\n\n- **The brand architecture** (umbrella brand + Lab and Bistrot as sisters): to validate with Rémy.\n- **The exact print gesture** of the signature (offset distance, layer order, where the seam shows): this is the real creative work, still to do.\n- **Color** (color per aroma or a master palette): handled separately.\n- **The photo direction** and the **Evin legal clearance**: handled separately, before any publication.\n\n---\n\n*This document is the readable source, kept up to date with Nico. The detailed agent version will be regenerated from it. No jargon, no codes: that is deliberate.*\n", "fr": "# Le concept : la Distorsion\n\n> Version lisible, pour relecture humaine. Brouillon du 2026-07-04. On a retiré tout l'outillage pour agents : tests, tags de source, renvois codés, protocoles. Il ne reste que le concept : ce qu'est la distorsion, pourquoi elle est la bonne image pour Abstract, et les règles qui la gouvernent.\n>\n> Statut : proposition, pièces à casser. La création véritable reste à Rémy et à la direction artistique ; ce document propose un système, il ne fige pas le geste.\n\n## 1. L'idée centrale\n\nLa distorsion, c'est la même chose que la distillation, mais pour l'image.\n\nNotre procédé retire la matière du fruit pour n'en garder que la substance aromatique. La distorsion fait pareil à l'image : elle retire l'objet littéral et garde la sensation. **La distillation est au produit ce que la distorsion est à l'image.** C'est le fil rouge de tout le concept : la distorsion n'est pas de la décoration, elle est le pendant visuel de ce qu'on fabrique.\n\nUne autre façon de le dire : **on ne photographie pas le fruit, on rend la sensation que le fruit laisse derrière lui.** Quand on se souvient d'une pêche parfaite, on ne revoit pas une image botanique exacte ; on retrouve la chaleur, la maturité, la lumière de l'instant. La mémoire ne fixe pas le réel, elle en garde la charge. La distorsion donne à voir cette mémoire-là.\n\nLa discipline que ça impose : une distorsion qui n'ajoute aucune sensation est de la pure décoration, et on la refuse. On retire pour révéler ; il n'y a nulle part où se cacher.\n\n## 2. Une signature, pas un filtre\n\nLa distorsion d'Abstract n'est pas un flou.\n\nNotre geste signature, c'est la **surimpression / le hors-repérage** : une couleur posée sur une autre, légèrement décalée, la couture laissée visible, comme le fait une sérigraphie. C'est le mot même de Rémy pour décrire comment les Monochromes se composent : « on pose une couleur sur l'autre et ça crée la composition ». Une variante numérique complète le geste : l'aberration chromatique, les couleurs qui frangent légèrement les contours.\n\nPourquoi cette distinction compte : le **flou gaussien générique** est le filtre que tout le monde applique. Il n'appartient à personne et ne dit rien. La surimpression, elle, est un métier, avec une filiation (la sérigraphie de Warhol, l'art abstrait de Malevich, Rothko, Pollock, Kandinsky). C'est là que la marque devient reconnaissable entre toutes. Le flou décoratif, le glamour de bouteille sur fond noir, la photo de gouttes figées : ce n'est pas nous.\n\n## 3. La distorsion est une bibliothèque, pas quatre cases\n\nIl n'y a pas quatre types de distorsion figés. Il y a une **bibliothèque ouverte de techniques, et c'est l'arôme qui appelle la technique.**\n\nChaque arôme a un profil qu'on peut lire : rond ou tranchant, vif ou persistant, transparent ou dense, intense ou discret. À chaque trait correspond une physique d'image qui l'exprime. Un arôme rond et enveloppant appelle un fondu doux ; une attaque électrique appelle un trait cinétique ; une note qui éclate puis s'efface appelle une étoile de lumière. La bibliothèque reste ouverte : un nouvel arôme peut appeler une technique qu'aucun autre n'a encore utilisée.\n\nC'est ça, le polymorphisme : un seul système, mais une expression propre à chaque produit, dérivée de ce que le produit est vraiment. Pas huit produits forcés dans quatre cases.\n\n## 4. Produit par produit : les Monochromes\n\nLa preuve que le système marche : deux arômes proches donnent des images opposées, non par goût du designer, mais parce que les arômes eux-mêmes divergent.\n\n- **Framboise contre Fraise.** Même famille de baie. La framboise est tendue, intense, elle éclate : image d'éclat radial. La fraise est ronde, chaude, elle s'épanouit comme une confiture qui chauffe : image de fondu lent.\n- **Poivron jaune contre Citron.** Tous deux électriques, tranchants. Le poivron est une attaque tenue : un trait directionnel. Le citron est un zeste qui flashe puis s'efface : une étoile qui explose puis meurt.\n- **Concombre contre Olive noire.** Tous deux se lisent « à travers ». Le concombre est clair, aqueux : une ondulation légère. L'olive est grave, profonde, huileuse : un reflet sombre, noir sur noir, le plus réducteur, le plus « abstract » de tous.\n\nChaque Monochrome reçoit ainsi une technique principale, parfois un accent secondaire, toujours imprimés à travers la signature maison.\n\n## 5. Où la distorsion a le droit de vivre\n\nUne règle simple gouverne tout : **la distorsion vit sur l'image ; le texte reste net.**\n\nTout ce qui est factuel et doit se lire (un nom, un prix, une mention légale, le degré d'alcool, la composition) est composé net, lisible, jamais distordu. Le logo est la seule exception : il porte un mouvement assumé, tout en restant lisible.\n\nL'intensité, elle, se règle selon la surface. Un objet d'art comme la bouteille peut aller loin ; une carte de menu, un e-mail, un post, une publicité restent discrets, à la fois pour la lisibilité et pour rester conformes. Règle de fond : sur une pièce destinée au public, la lisibilité passe avant l'effet. Un visuel trop distordu pour être décodé ne sort pas.\n\n## 6. Évoquer juste (et la loi Evin)\n\nNotre terrain, c'est l'évocation sensible et poétique de la saveur. On ne décrit pas un citron par ses grammes d'acide ; on en rend l'idée, la sensation. C'est le cœur de la marque.\n\nDeux honnêtetés la gardent juste.\n\n- **Évoqué, pas présent.** Le Monochrome beurre évoque le gras, mais la distillation a justement retiré le gras. On le suggère, on ne prétend pas qu'il est là. La distorsion peut évoquer une sensation ; elle n'affirme jamais un fait. Les faits (méthode, composition, mentions) vivent dans le texte net.\n- **La loi Evin.** Sur les marchés réglementés, on parle du **fruit lui-même** (la framboise, cœur du produit), jamais de l'alcool ni d'un effet. C'est ce qui nous garde à la fois justes et conformes. Toute pièce destinée au public passe une validation juridique avant publication.\n\n## 7. La couleur\n\nLa couleur est l'ancrage de la marque : on porte littéralement son nom. C'est un sujet à part entière, le **standard, la bibliothèque de la saveur**, traité ailleurs. Un point de vigilance ici : on ne représente pas le profil d'un produit par un radar organoleptique cliché ; on cherche une expression plus juste et plus accessible (orientation 2026-07-04).\n\n## 8. Dans les lieux : Lab et Bistrot\n\nAbstract est une **marque chapeau**. En dessous, **deux expressions sœurs** : Abstract Lab (la cuisine, on fabrique) et Abstract Bistrot (le salon, on accueille). Elles partagent un **socle commun** (la même signature graphique et éditoriale, on sent qu'on est dans la même galaxie) et chacune a son **expression propre et vivante** ; un Abstract Berlin, demain, serait une réinterprétation locale, pas une copie (orientation 2026-07-04, à valider avec Rémy).\n\nPour la distorsion, ça veut dire : la grammaire est commune, on ne réinvente pas un langage par lieu. Ce qui change d'un lieu à l'autre, c'est le cadre (la salle, l'ambiance, les matériaux), pas le geste. Le cadre familier du vieux bistrot n'affadit pas le produit : au contraire, il rend le produit radical légitime et accessible. L'ancien modèle « le cœur est verrouillé, le lieu ne flexe que le cadre » s'assouplit vers « socle commun + expression propre » ; architecture à confirmer avec Rémy.\n\n## 9. Combien de temps ça tient\n\nLa distorsion est validée comme langage visuel de la marque pour environ deux ans (horizon 2028). Elle est **réévaluée à l'échéance, pas reconduite par défaut** : est-elle toujours à nous, ou devenue un cliché de catégorie ? On la rouvre plus tôt si un concurrent adopte le même langage, si la surimpression sature le marché du design, ou si le cadre juridique Evin se durcit.\n\n## Ce qui reste à trancher\n\n- **L'architecture de marque** (marque chapeau + Lab et Bistrot sœurs) : à valider avec Rémy.\n- **Le geste d'impression exact** de la signature (décalage, ordre des couches, où la couture se montre) : c'est le vrai travail créatif, à faire.\n- **La couleur** (couleur par arôme ou palette maîtresse) : traitée à part.\n- **La direction photo** et le **feu vert juridique Evin** : traités à part, avant toute publication.\n\n---\n\n*Ce document est la source lisible, tenue à jour avec Nico. La version détaillée pour les agents sera régénérée à partir de celle-ci. Pas de jargon, pas de codes : c'est volontaire.*\n"}, {"id": "brand-book/lisible/06-logo-wordmark.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/06-logo-wordmark.md", "title_en": "Logo & wordmark", "title_fr": "Logo & wordmark", "en": "# Logo & wordmark\n\n> Readable version, for human review. This chapter says what the brand sign (the \"Abstract\" wordmark) must SAY and must never say, before any drawing. The drawing itself - the letters, the exact depth of the blur, the layouts - belongs to Rémy and the art direction; here we only set the direction. We have stripped out everything built for agents: the tests, the thresholds, the coded cross-references.\n>\n> Status: draft, made to be challenged.\n\n## 1. What the sign must say\n\nThe name is the method. \"Abstract\" is a contraction of the real that reveals the substance rather than the appearance: what memory keeps once the form fades. So the sign should read as a name that states its own way of working, not as a label you could paste onto any brand without losing anything.\n\nIt borrows the posture of abstract art - Malevich, Kandinsky, Rothko, Pollock, Rémy's lineage: a stripping-away that leaves the sensation, color tied to form as a language. It takes the attitude, never the pastiche of any painter.\n\nAbove all, the sign is a credit mark, not a hero. We make the paint, you make the work: whoever composes owns their signature, Abstract owns the standard - the small, stable, recognizable mark set in the corner of someone else's work. That is our proprietary part, where the language and the approach are given away.\n\n## 2. What it must never say\n\nNo legend, no founder's romance: the sign is neither an autograph nor a coat of arms. No promise of effect or consumption - nothing that suggests euphoria or intoxication. Not a decoration: a generic phone-filter gaussian blur is exactly what we are not. And never the star: the maker's creation comes first, the sign stays credited but discreet.\n\n## 3. The treatment: an owned blur\n\nThe chosen mark is a directional flow, an owned blur, validated as the brand language for two years. The sign replays on itself the move the product makes: distillation strips the matter from the fruit and keeps its aromatic substance; the blur strips a measure of sharpness and keeps the name. It is a gesture of making, not a gaze losing focus.\n\nA few rules hold this treatment together:\n\n- It is a treatment drawn once and for all, frozen into the file, never a filter re-tuned in use.\n- The name always stays legible: readability wins over the effect.\n- It runs along a single axis, with no doubling (a double image would read as blurred vision, a sensitive point for the Evin law).\n- It applies to the whole wordmark or not at all, and never carries over to any other element.\n\nAn honest note on the Evin law: this blur could read as an evocation of drunkenness. That is not a ban, it is a risk to have legally assessed and framed. Until that assessment is delivered (it is pending, to confirm with legal counsel), we publish the sharp version of the sign everywhere; the blur treatment stays in internal exploration. A sharp version of the sign therefore always exists - it is both the fallback and the brand's current public face.\n\n## 4. Variants, small sizes and protection\n\nTwo pieces are enough: a positive (dark sign on a light ground) and a negative (light sign on a dark ground). \"Inverted\" is just a use of the negative, not a third version. For very small formats - favicon, app icon, round avatar, credit line at the foot of a menu - a reduced form takes over, and at that scale the sign stays sharp. Below a certain floor, we do not place an illegible sign: better no sign at all, replaced by a plain credit line spelled out in full.\n\nThe sign needs air. A breathing zone surrounds it, proportional to its size, where nothing enters: no other logo, no text, no busy image, no page edge. We never crop it, never let it run off the frame, never butt it against the legal mentions block. Its only allowed neighbor is its credit line.\n\n## 5. One brand, several expressions\n\nOrientation to confirm with Rémy (2026-07-04): Abstract is an umbrella brand; Abstract Lab (the kitchen, where we make things) and Abstract Bistrot (the parlor, where we host) are two sister expressions sharing one common base. So we do not say \"Abstract = the Lab.\"\n\nFor the sign this is simple: one master wordmark, shared across the whole galaxy, never a separate logo per venue. The venue reads through a descriptor in clean typography, set next to the sign: \"Bistrot\", \"Bistrot, Lyon\", \"Bistrot, Paris\". That descriptor is text, never a second drawn sign, never distorted, always smaller than the sign. To avoid: fusing the descriptor into the logo, giving it its own color or a badge, writing a city on its own (\"Abstract, Lyon\" without \"Bistrot\"), or letting the descriptor live without the sign. A Berlin, tomorrow, would be the same brand reread locally, not a new logo.\n\n## 6. Color, backgrounds and forbidden moves\n\nThe sign lives in the neutrals, ink and paper. It never takes on the color of an aroma: on a Raspberry surface the aroma owns the field, the sign keeps its neutral signature. It can sit on a flat color, a gradient or a photo, as long as it stands well clear of the background; if a photo cannot hold it, we place a light or dark plate beneath it. It always stays clear of the \"seam\" that signs the image layer: that signature belongs to the image, not to the sign.\n\nWhat we never do to the sign: outline, drop shadow, glow, bevel, gradient inside it, recoloring, stretching, rotation, cropping, or placing it in a badge or a container. The sign receives nothing.\n\n## 7. The sign in motion\n\nOnly one animation is possible: the flow plays, then resolves into the static sign - the final state is always the sharp, still sign. No zoom, rotation, morphing, flashing, or looping. The motion must read as a controlled gesture - a print pulled off a screen-printing frame - never as a drunken camera or double vision. It respects accessibility settings (reduced motion = still sign) and never starts with sound. And, as with the still blur, until the Evin-law assessment is delivered, no blurred motion is published: the sign stays static in communication.\n\n## 8. How the sign circulates\n\nOne official source, one approved file pack, and a trail of uses: a file that does not come from the approved pack is not official (not a screenshot, not an ad hoc export, not an email attachment). Internally - menus, decks, documents - we draw straight from the pack. Outward - press, partners, ambassadors - a use goes through a request and an approval, and every publicly exposed use passes through the compliance check before publication. Sponsorship, for its part, is banned by the Evin law: never a sign on a sponsorship surface, whatever the situation.\n\n## Still to decide\n\n- The Evin-law green light on the blur: to confirm with legal counsel. Until it is delivered, sharp version everywhere in communication.\n- The drawing itself - letters, blur depth, reduced form: belongs to Rémy and the art direction.\n- The \"umbrella brand + Lab and Bistrot as sisters\" architecture: to confirm with Rémy.\n- A separable symbol or monogram, alongside the wordmark: to decide (Rémy and the art direction).\n", "fr": "# Logo & wordmark\n\n> Version lisible, pour relecture humaine. Ce chapitre dit ce que le signe de marque (le logotype \"Abstract\") doit DIRE et ne doit jamais dire, avant tout dessin. Le dessin lui-même - les lettres, la profondeur exacte du flou, les compositions - revient à Rémy et à la direction artistique ; ici, on ne fixe que le cap. On a retiré tout l'outillage destiné aux agents : les tests, les seuils, les renvois codés.\n>\n> Statut : brouillon, pièces à casser.\n\n## 1. Ce que le signe doit dire\n\nLe nom est la méthode. \"Abstract\", c'est une contraction du réel qui révèle la substance plutôt que l'apparence : ce que la mémoire garde quand la forme s'efface. Le signe doit donc se lire comme un nom qui dit sa propre façon de faire, pas comme une étiquette qu'on pourrait coller sur n'importe quelle marque sans rien y perdre.\n\nIl emprunte la posture de l'art abstrait - Malevich, Kandinsky, Rothko, Pollock, la filiation de Rémy : un retrait qui laisse la sensation, la couleur associée à la forme comme un langage. Il en prend l'attitude, jamais le pastiche d'un peintre.\n\nSurtout, le signe est une marque de crédit, pas un héros. On fait la peinture, à vous l'œuvre : celui qui compose possède sa signature, Abstract possède le standard - la petite marque, stable et reconnaissable, posée au coin de l'œuvre d'un autre. C'est notre part propriétaire, là où le langage et l'approche, eux, se partagent.\n\n## 2. Ce qu'il ne doit jamais dire\n\nPas de légende, pas de roman de fondateur : le signe n'est ni un autographe ni un blason. Pas de promesse d'effet ni de consommation - rien qui suggère l'euphorie ou l'ivresse. Pas une décoration : un flou gaussien de filtre de téléphone, c'est exactement ce qu'on n'est pas. Et jamais la vedette : la création de l'auteur passe devant, le signe reste crédité mais discret.\n\n## 3. Le traitement : un flou assumé\n\nLe tracé retenu est un flux directionnel, un flou assumé, validé comme langage de marque pour deux ans. Le signe rejoue sur lui-même le geste du produit : la distillation retire la matière du fruit et garde sa substance aromatique ; le flou retire un peu de netteté et garde le nom. C'est un geste de fabrication, pas un regard qui perd le focus.\n\nQuelques règles tiennent ce traitement :\n\n- C'est un traitement dessiné une fois pour toutes, figé dans le fichier, jamais un filtre qu'on re-règle à l'usage.\n- Le nom reste toujours lisible : la lisibilité prime sur l'effet.\n- Il court sur un seul axe, sans dédoublement (une double image se lirait comme une vision trouble, un point sensible côté loi Evin).\n- Il s'applique au logotype entier ou pas du tout, et ne se transmet jamais à un autre élément.\n\nUn point d'honnêteté loi Evin : ce flou pourrait se lire comme une évocation de l'ivresse. Ce n'est pas une interdiction, c'est un risque à faire évaluer juridiquement et à cadrer. Tant que cette évaluation n'est pas rendue (elle est en attente, à valider avec le référent juridique), on publie partout la version nette du signe ; le traitement flou reste en exploration interne. Une version nette du signe existe donc toujours - c'est à la fois le repli et le visage public actuel de la marque.\n\n## 4. Variantes, petite taille et protection\n\nDeux pièces suffisent : un positif (signe sombre sur fond clair) et un négatif (signe clair sur fond sombre). \"Inversé\" n'est qu'un usage du négatif, pas une troisième version. Pour les très petits formats - favicon, icône d'application, avatar rond, crédit en pied de menu - une forme réduite prend le relais, et à cette échelle le signe reste net. En dessous d'un certain seuil, on ne met pas de signe illisible : mieux vaut pas de signe du tout, remplacé par une simple ligne de crédit écrite en toutes lettres.\n\nLe signe a besoin d'air. Une zone de respiration l'entoure, proportionnelle à sa taille, où rien n'entre : ni autre logo, ni texte, ni image chargée, ni bord de page. On ne le rogne jamais, on ne le laisse jamais déborder du cadre, on ne le colle jamais au bloc des mentions légales. Le seul voisin autorisé, c'est sa ligne de crédit.\n\n## 5. Une seule marque, plusieurs expressions\n\nOrientation à valider avec Rémy (2026-07-04) : Abstract est une marque chapeau ; Abstract Lab (la cuisine, on fabrique) et Abstract Bistrot (le salon, on accueille) sont deux expressions sœurs qui partagent un même socle. On ne dit donc pas \"Abstract = le Lab\".\n\nPour le signe, cela se traduit simplement : un seul logotype maître, partagé par toute la galaxie, jamais un logo séparé par lieu. Le lieu se lit par un descripteur en typographie nette, accolé au signe : \"Bistrot\", \"Bistrot, Lyon\", \"Bistrot, Paris\". Ce descripteur est du texte, jamais un second signe dessiné, jamais distordu, toujours plus petit que le signe. À éviter : fondre le descripteur dans le logo, lui donner sa propre couleur ou un badge, écrire une ville seule (\"Abstract, Lyon\" sans \"Bistrot\"), ou faire vivre le descripteur sans le signe. Un Berlin, demain, serait la même marque relue localement, pas un nouveau logo.\n\n## 6. Couleur, fonds et interdits\n\nLe signe vit dans les neutres, encre et papier. Il ne prend jamais la couleur d'un arôme : sur une surface Framboise, l'arôme possède le champ, le signe garde sa signature neutre. Il peut se poser sur un aplat de couleur, un dégradé ou une photo, tant qu'il reste bien détaché du fond ; si une photo ne le tient pas, on pose un cartouche clair ou foncé sous lui. Il reste toujours à l'écart de la \"couture\" qui signe la couche image : cette signature-là appartient à l'image, pas au signe.\n\nCe qu'on ne fait jamais au signe : contour, ombre portée, lueur, biseau, dégradé à l'intérieur, recoloration, étirement, rotation, recadrage, ou mise dans un badge ou un conteneur. Le signe ne reçoit rien.\n\n## 7. Le signe en mouvement\n\nUne seule animation possible : le flux se joue, puis se résout dans le signe statique - l'état final, c'est toujours le signe net et immobile. Pas de zoom, de rotation, de morphing, de clignotement, ni de boucle. Le mouvement doit se lire comme un geste maîtrisé - une impression qu'on tire d'un écran de sérigraphie - jamais comme une caméra ivre ou une double vision. Il respecte les réglages d'accessibilité (mouvement réduit = signe fixe) et ne se lance jamais avec du son. Et, comme pour le flou fixe, tant que l'évaluation loi Evin n'est pas rendue, aucun mouvement flou n'est publié : le signe reste statique en communication.\n\n## 8. Comment le signe circule\n\nUne seule source officielle, un pack de fichiers validé, et une trace des usages : un fichier qui ne vient pas du pack validé n'est pas officiel (ni capture d'écran, ni export improvisé, ni pièce jointe d'email). En interne - menus, decks, documents - on se sert directement dans le pack. Vers l'extérieur - presse, partenaires, ambassadeurs - l'usage passe par une demande et une validation, et chaque usage exposé au public passe par le contrôle conformité avant publication. Le parrainage, lui, est interdit par la loi Evin : jamais de signe sur un support de parrainage, quelle que soit la situation.\n\n## Ce qui reste à trancher\n\n- Le feu vert loi Evin sur le flou : à valider avec le référent juridique. Tant qu'il n'est pas rendu, version nette partout en communication.\n- Le dessin lui-même - lettres, profondeur du flou, forme réduite : revient à Rémy et à la direction artistique.\n- L'architecture \"marque chapeau + Lab et Bistrot sœurs\" : à valider avec Rémy.\n- Un symbole ou monogramme séparable, en plus du logotype : à décider (Rémy et la direction artistique).\n"}, {"id": "brand-book/lisible/07-voix-ton.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/07-voix-ton.md", "title_en": "Voice & tone", "title_fr": "Voix & ton", "en": "# Voice & tone\n\nThis chapter says how Abstract writes and speaks: the language rules that make a text \"sound\" like Abstract, whoever writes it. The voice never changes; the tone adjusts to the channel and the audience.\n\n> Status: readable draft, pieces to challenge. It follows the 2026-07-04 review directions, which take precedence over older versions. Points flagged \"to validate\" go through Rémy.\n\n## Where the voice comes from\n\nThe voice is not a matter of stylistic taste. It is the sentence-level form of what the brand already is. Each voice principle descends from an experience principle: we say less because we reveal by removing; we translate rather than describe; we hand over the brush; we evoke honestly; we write as humans because the relationship is part of the product.\n\nThree anchors hold it together: the essence, \"the medium of flavor\" (2026-07-04 direction: flavor rather than taste, to reconcile with the platform); the signature, \"Compose with flavor.\"; and a manifesto line, \"We make the paint. You make the work.\"\n\n## The five voice principles\n\n**1. Say less.** Short, declarative sentences. Concrete nouns over adjectives. One idea per sentence. What you leave out lets the product speak.\n- Do: \"A butter aroma. Sampled from the paint. Compose.\"\n- Avoid: stacking superlatives and exclamation marks (\"an explosion of unforgettable flavor!\"). Simple check: a sentence should stand up once every adjective is removed.\n\n**2. Translate, don't describe.** We do not boast; we give a sensory anchor: flavor rendered through color, shape, texture. Poetic evocation is central - it is our terrain. But it stays simple and shareable, never tasting-note jargon or one more technical radar.\n- Do: \"Acidity that reads as lemon-yellow.\" \"A bitter note, the color of black olive.\"\n- Avoid: \"delicious\", \"gourmet\", \"a taste sensation\" - generic praise that teaches nothing.\n\n**3. Hand the brush.** We address the person who creates - pro or amateur - and invite them to compose. We provide the material, the tools, and the language; the work is theirs. We make people authors, not spectators. Abstract is never the hero of the sentence.\n- Do: \"Compose with it.\" \"Your medium.\" \"Make the work.\"\n- Avoid: dictating the final drink or dish, talking down, putting Abstract in the spotlight (\"our award-winning product...\").\n\n**4. Evoke honestly.** Our game is not to spell out a lemon by its grams of acid: it is to render its evocation. Two honesties keep it clean. First, we say \"evoked\", not \"present\": the Beurre Monochrome evokes fat, but distillation removed the fat - we suggest it, we do not claim it is there. Second, the Evin law: we speak of the fruit itself (the raspberry, the heart of the product), never of alcohol or of an effect - which keeps us both true and compliant. This reverses an older version (\"show the measure\", \"sell the liquid, not the legend\"), judged to run against the brand: precision stays a value, but it serves the evocation, it does not replace it.\n\n**5. Made by humans.** Signed, warm, but precise. We stand behind the words, we have a point of view. This is our anti-machine-text guardrail: no faceless corporate hedging, no generic smoothing.\n- Do: \"we\", an attribution, a voice a person would sign.\n- Avoid: the flat, interchangeable register of generated copy.\n\n## Personality in three words\n\n**Precise. Understated. Generous.** And what we are not: precise without being clinical or cold; understated without being dull or evasive; generous without being effusive or salesy. Warmth and connection are carried by the address (we hand the brush) and by writing as humans, more than by a fourth adjective. The exact set is still to settle with Nico.\n\n## How we write\n\n- **English is authoritative, French follows faithfully.** Copy is thought in English first (deployment is international), then French gives a faithful register: idiomatic, never a literal calque. French stays first-class for the venues and the French heritage.\n- **Address:** \"vous\" in French, out of respect for the craft and to match \"Compose with flavor.\"\n- **Technicality modulated, never dumbed down:** we can go deep and precise with an expert audience, stay simple with a beginner, without ever being patronizing.\n- **Punctuation:** no em dash (use \" - \" or a period); prefer periods to commas; no exclamation stacking, no ALL CAPS for emphasis.\n\n## How we name things\n\n- **Abstract** = the umbrella brand. Always capitalized.\n- **Abstract Lab** = the kitchen, where we make things. **Abstract Bistrot** = the salon, where we welcome (the venues, Lyon and Paris). \"Abstract Bistrot\" on first mention, \"the Bistrot\" after. Lab and Bistrot are two sister expressions, not a parent house and its subsidiary (2026-07-04 direction, to validate with Rémy).\n- **Monochrome** = the product unit, capitalized, named by its aroma: the Beurre Monochrome, the Framboise Monochrome (FR: le Monochrome Beurre). The aroma name keeps its French form as a proper name in both languages (Beurre, Framboise, Citron de Menton, Po
