<script>
const DOCS = [{"id": "brand-book/lisible/01-introduction-manifeste.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/01-introduction-manifeste.md", "title_en": "Introduction & manifesto", "title_fr": "Introduction & manifeste", "en": "# Introduction & manifesto\n\n> **Foundations (emotional) version, 2026-07-05: a piece to break.**\n>\n> A ground-up rewrite after the Ismaïl + Nico review: we raise the altitude and the emotion, with the ingredient at the heart. This is a finished first draft, not a final text: a human writing pass will follow, especially on the tone of the manifesto.\n\n## How to read this book\n\nThis book is the brand's bible. It is written for the people who build the brand, and for the partners who work closely alongside it. It reads along one thread: first the why (the manifesto, what we stand for), then the how (the strategy and the experience principles), then the embodiments (the product, the places, the voice). Everything starts from the founding emotion; the truth of the product flows from it, never the other way around.\n\nTwo bearings for the road:\n\n- The foundations set the direction, and everything else attaches to them: nothing ships unless it serves a clear principle.\n- But we do not write in a waterfall: when an embodiment reveals something the foundations had not seen, we go back up, adjust, and come back down. The rigor is in the thread, not in the order.\n\n## The manifesto\n\nTake a lemon.\n\nWe think we know it: yellow, bright, sharp. Then we pause for a moment. The seed that became a tree. The patience of seasons. The hands that pick. Suddenly, \"a lemon\" is not simple at all. It is a world. An ordinary miracle of nature, and it does not leave the same trace in you as in me: each of us finds our own story in it.\n\nBecause taste is not information. It is emotion attached to time. Morning coffee, and all the silence and promise it carries. The first raspberry of summer, a whole season returning in one bite. Our most stubborn memories travel through taste; it is how memory catches up with us.\n\nBut the world moves too fast to taste. The lemon becomes \"lemon flavor,\" the strawberry \"red and sweet.\" We were taught to consume flavors; no one teaches us to read them anymore. Our senses fall silent for want of being listened to.\n\nWe refuse to forget.\n\nAbstract exists to give everyone back the power over their senses: to perceive, to name, to remember, and to play. Not a privilege for insiders: a universal right. Taste belongs to everyone, and everyone deserves to express themselves through it.\n\nNature does things well. Producers draw the best from it. We are only messengers: we capture a fleeting instant - the raspberry at its peak, the butter just before it browns - and we keep it alive long enough to cross paths with your memory.\n\nThen we hand it to you, with no lesson and no instructions: here is what we captured, play with it. What you make of it is not ours.\n\nYou are not consumers. You are authors.\n\n## What we stand for\n\nOur subject is not what we sell. Our subject is the ingredient: the lemon, the raspberry, the butter. Speak of the lemon truly enough, long enough - its origin, its season, what it evokes, what it awakens - and whoever is looking for the purest lemon will end up finding us, without our ever needing to push ourselves forward. That is why the bottle shows the evocation of the lemon before it shows the brand: the ingredient first, us second.\n\nWhat we build around it is a standard: a library of flavor, shared and accessible, where everyone comes to see, name and share what they taste. And a stance underneath it all: we share. What we learn from the ingredient - an approach, a language, a way of extracting - is made to circulate.\n\n## Who we speak to\n\nEveryone. The professional and the curious, the starred chef and the person rediscovering a fruit from their childhood. A brand that speaks of memory and senses does not choose its audience: it speaks to what is most shared in all of us.\n\nTo the pro, we do not re-explain their craft: we hand them a new, faithful material. To the general public, we offer wonder, and the means to learn to read their own flavors. To both, the same freedom: neat, in a simple mix, in a complex composition, there is no right or wrong way, only a field of possibilities. All authors.\n\n## The genesis of the Monochromes\n\nIn the beginning, there is a lover's frustration: the ingredients we love are fleeting. Aromatic compounds are volatile; because they are, they can be captured, and for the same reason they can be lost. The perfect raspberry lasts a day. Beurre noisette, a few seconds.\n\nThe Monochrome was born there: a spirit that gives pride of place to a single ingredient, sourced at the best of its moment, translated as faithfully as possible, to bring back a memory to each person. Not the definitive truth of the lemon - we do not believe there is one - but our memory of a perfect instant, made clear enough to become yours.\n\nThat fidelity comes with its own honesties. What a Monochrome evokes, it does not always contain: butter evokes a fat that distillation has precisely removed. We evoke it; we never claim it is there. And when we speak, we speak of the fruit itself - the raspberry, the lemon - never of alcohol or its effects. That is what keeps us true, to the ingredient and to the law.\n\n## One brand, two expressions\n\nAbstract is the umbrella brand: it carries the manifesto, the vision, the ingredient at the heart. Beneath it, two sister expressions of one house. Abstract Lab, the kitchen: where we capture, where we make. Abstract Bistrot, the living room: where we welcome, where we let people taste. Neither is the other's mother house: they are two ways of embodying the same promise, from the gesture of capture to the shared moment. The precise cascade - how we descend from the manifesto into each expression - is being written.\n\n## To settle / to challenge\n\n- The manifesto text itself: an assumed first draft; the human writing pass (tone, rhythm) is still to come.\n- The architecture (umbrella brand + Lab and Bistrot as sister expressions): Nico holds the cascade, to confirm with Rémy.\n- The brand essence and signature: still open, to lock with the platform.\n- The chronology (Lyon, Paris, the order in which the Monochromes appeared): biographical, to fill in with the founders.\n", "fr": "# Introduction & manifeste\n\n> **Version fondations (émotionnelle) du 2026-07-05 : pièce à casser.**\n>\n> Réécriture de fond après la relecture Ismaïl + Nico : on remonte en hauteur et en émotion, avec l'ingrédient au cœur. C'est un premier jet abouti, pas un texte final : une passe d'écriture humaine viendra, surtout sur le ton du manifeste.\n\n## Comment lire ce livre\n\nCe livre est la bible de la marque. Il s'adresse à celles et ceux qui la construisent, et aux partenaires qui l'accompagnent de près. Il se lit dans le sens du fil : d'abord le pourquoi (le manifeste, ce qu'on défend), puis le comment (la stratégie et les principes d'expérience), puis les incarnations (le produit, les lieux, la voix). Tout part de l'émotion fondatrice ; la vérité du produit en découle, jamais l'inverse.\n\nDeux repères pour la route :\n\n- Les fondations donnent la direction, et tout le reste s'y rattache : rien ne sort s'il ne sert pas un principe clair.\n- Mais on n'écrit pas en cascade : quand une incarnation révèle quelque chose que les fondations n'avaient pas vu, on remonte, on ajuste, on redescend. La rigueur est dans le fil, pas dans l'ordre.\n\n## Le manifeste\n\nPrenez un citron.\n\nOn croit le connaître : jaune, vif, acide. Puis on s'arrête un instant. La graine devenue arbre. La patience des saisons. Les mains qui cueillent. Soudain, « un citron » n'est plus simple du tout. C'est un monde. Un miracle ordinaire de la nature, et il ne laisse pas la même trace en vous qu'en moi : chacun y retrouve sa propre histoire.\n\nCar le goût n'est pas une information. C'est une émotion attachée au temps. Le café du matin, et tout ce qu'il porte de silence et de promesse. La première framboise de l'été, une saison entière qui revient en une bouchée. Nos souvenirs les plus tenaces passent par le goût ; c'est par lui que la mémoire nous rattrape.\n\nMais le monde va trop vite pour goûter. Le citron devient « arôme citron », la fraise « rouge et sucrée ». On nous a appris à consommer les saveurs ; plus personne ne nous apprend à les lire. Nos sens se taisent, faute d'être écoutés.\n\nNous refusons d'oublier.\n\nAbstract existe pour rendre à chacun le pouvoir sur ses sens : percevoir, nommer, se souvenir, et jouer avec. Pas un privilège d'initiés : un droit universel. Le goût appartient à tout le monde, et tout le monde mérite de s'exprimer par lui.\n\nLa nature fait bien les choses. Les producteurs en tirent le meilleur. Nous ne sommes que des messagers : nous capturons un instant volatil - la framboise à son pic, le beurre juste avant de brunir - et nous le faisons vivre assez longtemps pour qu'il croise votre mémoire.\n\nPuis nous vous le tendons, sans leçon ni mode d'emploi : voilà ce que nous avons capturé, amusez-vous avec. Ce que vous en ferez ne nous appartient pas.\n\nVous n'êtes pas des consommateurs. Vous êtes des auteurs.\n\n## Ce que nous défendons\n\nNotre sujet n'est pas ce que nous vendons. Notre sujet, c'est l'ingrédient : le citron, la framboise, le beurre. Parlez du citron assez juste, assez longtemps - son origine, sa saison, ce qu'il évoque, ce qu'il réveille - et celui qui cherche le citron le plus pur finira par arriver jusqu'à nous, sans qu'on ait eu besoin de se mettre en avant. C'est pour cela que la bouteille montre l'évocation du citron avant de montrer la marque : l'ingrédient d'abord, nous ensuite.\n\nCe que nous construisons autour, c'est un standard : une bibliothèque de la saveur, commune et accessible, où chacun vient voir, nommer et partager ce qu'il goûte. Et une posture de fond : on partage. Ce qu'on apprend de l'ingrédient - une approche, un langage, une manière d'extraire - est fait pour circuler.\n\n## À qui l'on parle\n\nÀ tout le monde. Au professionnel comme au curieux, au chef étoilé comme à celui qui redécouvre un fruit de son enfance. Une marque qui parle de mémoire et de sens ne choisit pas son public : elle parle à ce qu'il y a de plus partagé en nous.\n\nAu pro, on ne réexplique pas son métier : on lui tend une matière nouvelle et fidèle. Au grand public, on offre l'émerveillement, et de quoi apprendre à lire ses propres saveurs. Aux deux, la même liberté : pur, en mélange simple, en composition complexe, il n'y a pas de bon ou de mauvais usage, seulement un champ de possibles. Tous auteurs.\n\n## La genèse des Monochromes\n\nAu commencement, il y a une frustration amoureuse : les ingrédients qu'on aime sont fugaces. Les composés aromatiques sont volatils ; c'est parce qu'ils le sont qu'on peut les capturer, et c'est pour la même raison qu'on les perd. La framboise parfaite dure un jour. Le beurre noisette, quelques secondes.\n\nLe Monochrome est né de là : un spiritueux qui fait la part belle à un seul ingrédient, sourcé au meilleur de son instant, traduit au plus juste, pour rappeler un souvenir à chacun. Pas la vérité définitive du citron - nous ne croyons pas qu'elle existe - mais notre mémoire d'un instant parfait, rendue assez claire pour devenir la vôtre.\n\nCette fidélité a ses honnêtetés. Ce qu'un Monochrome évoque, il ne le contient pas toujours : le beurre évoque un gras que la distillation a justement retiré. On l'évoque, on ne prétend jamais qu'il est là. Et quand on prend la parole, on parle du fruit lui-même - la framboise, le citron - jamais de l'alcool ni de ses effets. C'est ce qui nous garde justes, envers l'ingrédient comme envers la loi.\n\n## Une marque, deux expressions\n\nAbstract est la marque chapeau : elle porte le manifeste, la vision, l'ingrédient au cœur. En dessous, deux expressions sœurs d'une même maison. Abstract Lab, la cuisine : on y capture, on y fabrique. Abstract Bistrot, le salon : on y accueille, on y fait goûter. Aucune n'est la maison mère de l'autre : ce sont deux manières d'incarner la même promesse, du geste de capture au moment partagé. La cascade précise - comment on redescend du manifeste vers chaque expression - est en cours d'écriture.\n\n## À trancher / à challenger\n\n- Le texte du manifeste : premier jet assumé ; la passe d'écriture humaine (ton, rythme) reste à faire.\n- L'architecture (marque chapeau + Lab et Bistrot en expressions sœurs) : Nico tient la cascade, à confirmer avec Rémy.\n- L'essence et la signature de marque : encore ouvertes, à verrouiller avec la plateforme.\n- La chronologie (Lyon, Paris, l'ordre d'apparition des Monochromes) : biographique, à remplir avec les fondateurs.\n"}, {"id": "brand-book/lisible/02-strategie-experience.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/02-strategie-experience.md", "title_en": "Abstract experience strategy (readable)", "title_fr": "Stratégie d'expérience Abstract (version lisible)", "en": "# Abstract experience strategy (readable)\n\n> **v foundations (emotional), 2026-07-05 - a piece to challenge.**\n>\n> Deep rewrite after the two-person read-through: put emotion and essence back at the center, with a clear backbone - the ingredient. This is not a final text: a human writing pass will follow. This is the document we re-read and challenge together; all the operational detail is regenerated from it, never the other way around.\n\n## 1. The starting insight\n\nEverything begins with an ingredient. A lemon, a raspberry, a butter. A miracle of nature, with its own expression, that leaves a different trace in each of us: the lemon of your childhood is not mine, and that is precisely what makes it precious. Taste is not information; it is emotion attached to time.\n\nAnd yet almost no one was ever given the tools to play with that. Not just bartenders under the pressure of their menus: all of us. We lack material, words, bearings to be masters of our own creativity through taste. The professional, whose craft nobody needs to explain to them, lacks new, reliable material to compose with. The curious enthusiast lacks the pedagogy to understand what they feel and dare to use it.\n\nAbstract's insight fits in one sentence: give people back the means to express themselves through taste, and they will create things we cannot imagine. That is why our proposition is essentialist and the use versatile. A Monochrome can be sipped neat, mixed in two moves, or enter a complex composition; there is no right or wrong use, there is a field of possibilities. Like a Lego brick: the piece is simple, almost elementary, and that is exactly what opens the infinity of constructions. Returning to the essential does not impoverish creativity: it opens it.\n\nOur posture follows: \"here is what we made, have fun with it.\" The people who join us are neither clients nor consumers: they are authors.\n\n## 2. What Abstract is\n\nWe are messengers. Nature does things well; the growers draw the best from it; we receive that material and pay it tribute by finding the essence of the ingredient again. Our craft: capturing a fleeting instant. The raspberry at its exact peak of ripeness, the butter just before it burns. Aromatic compounds are volatile - it is because they are that we can capture them, and that we can lose them. We seize that moment and keep it alive through time, so it can go and wake a memory in someone else.\n\nThat is why our subject is not the Monochrome, nor the art metaphor. Our subject is the ingredient. If everything starts from the lemon and its purest taste - the product, the words, the identity - then whoever looks for the truest lemon on the market arrives at our door naturally, without us ever having to put ourselves forward. The entry point is the ingredient, not what we sell.\n\nWhat we build around it is a standard of flavor: a common, accessible base, almost a library, where everyone can find themselves and draw from. And we edit it the way a publishing house edits books: by putting those who create in the light - the growers upstream, the creators downstream. Editors of flavor: our place is between the two ends of the chain, never above it.\n\nFlavor is our ground, more elusive and richer than taste alone; but we speak of both, because aroma is a combination of flavors and taste, and as soon as you compose, everything counts.\n\nAnd a deeper posture: we share. The art of flavor deserves to be accessible and popular; we share the approach, the knowledge, the language. It is the gesture of a messenger: what we received from nature does not belong to us.\n\n## 3. Who we speak to\n\nEveryone. The brand speaks to the professional and to the general public alike; starting with the pros is a deployment question, not an identity one. Two audiences, one brand, different depths:\n\n- To the pro, we do not explain their craft: we bring them new material to compose with.\n- To the general public, we bring wonder and pedagogy: understanding what you feel, reproducing it simply, daring to play.\n\nIn both cases, the same shift: from spectator to author.\n\nGeography in circles: France first, where we already exist, then Europe, then the world.\n\n## 4. The promise\n\n> **If everyone had the power to express themselves through taste, in all simplicity, they would open new creative fields.**\n\nThis is the conviction that carries everything; the wording is still to be chiseled, but it already holds our four words: **everyone** (not an elite), **simplicity** (not one more technique), **creative fields** (not one more product), and behind them the **author** (not the client). The experience contract - one watchword per value, learned by heart - is the conclusion of this strategy; it lives in its own chapter.\n\n## 5. The five experience principles\n\nFive rules everything else descends from. Each one exists to serve the ingredient, and whoever takes hold of it.\n\n### 1. Reveal by removing\n\nIt is the very meaning of our name: to abstract, to remove the superfluous and leave only the sensation. Nothing added in the bottle - no sugar, no additive, no shortcut. Nothing to hide behind either: no false complexity, no borrowed frame (\"it's like a gin\"). What remains is the ingredient and its translation. And here is the reversal that matters: the essential is not a deprivation, it is an opening. A material brought back to its essence can become anything; it is by removing that we make possible.\n\n### 2. Translate, do not describe\n\nThe anchor is the ingredient. We do not describe it, we translate what it made us feel: it becomes color, form, motion, texture. Color carries that translation - a Monochrome is not \"one color\" but a range, the shades of a single color, the way an ingredient is a thousand instants of a single thing - and the other modalities orbit around it. One guardrail: the translation must stay simple and accessible, an evocation you can pass on to a team or to a friend, never one more technical radar chart.\n\n### 3. Hand the brush\n\nThe hero is the creation. Not ours: that of the person we hand the material to. The bartender signing their menu, the chef composing a plate, the enthusiast daring a gesture at home: each becomes an author. Abstract is the faithful, named material behind the work - a means, never an end. Never the star, never interchangeable either: the material has a name.\n\n### 4. Evoke accurately\n\nWe talk about the lemon. About what it evokes, the memory it wakes, the instant it was captured. That is our way of being accurate: rendering the evocation of an ingredient, its felt translation, rather than its technical sheet. And it is the entry point of everything we tell: we talk about the lemon, never the \"lemon Monochrome\"; the product only arrives at the end, like a signature. Two clarities keep this principle honest. \"Evoked, not present\": the butter Monochrome evokes fat, but distillation removed it; we offer the sensation, not the substance, and we say so. And no legend pasted on: the emotion comes from the ingredient itself, the story we tell is the one the glass can hold. Where the law frames what can be said (the Evin law), this nature serves us: speaking of the fruit is already who we are.\n\n### 5. The relationship is part of the product\n\nHospitality is not the product's decor: it is part of it. The cocktail world can be pompous and technical; the Bistrot makes it simple and warm. You come to live a moment, not to prove you know your way around. Depth is there, on demand: the passionate can go very deep into the material, the curious can stay at the surface and be received with the same care. The frame of the old, almost cliché bistrot is a choice: the most familiar of living rooms for the most radical of products. The place's ambition is obviousness - everything is so fluid that you never question it, because the enormous work behind it does not show.\n\n## 6. The moments of truth\n\nFive moments, from encounter to transmission. The thread is the same for everyone; the levers and the depth change with the audience. So this journey needs two versions: one pro, one general public.\n\n| Moment | The pro | The general public |\n|---|---|---|\n| Discover | \"It is like nothing else, and it can feed my work\" | \"A lemon, really? I want to taste that\" - wonder, almost naive |\n| Understand | \"I trust the rigor; I am given a material, not a finished object\" | \"I understand what I am tasting, and it is explained without lecturing me\" |\n| Taste | Accuracy first, then the reveal: something to compose with | The memory rising: \"that, that is the lemon of...\" |\n| Make it yours | \"I can create, reproduce, explain it to my team\" | \"I can redo it at home, simply, and have others taste it\" |\n| Pass it on | \"It makes my creation shine, and the language travels\" | \"I have a story to tell, and the urge to share it\" |\n\nThis journey already largely exists in the place; what is missing is structuring it - in its two versions, each with its own levers.\n\n## 7. The architecture, in a word\n\nAbstract is the umbrella brand: it carries the vision and the voice. Below it, two sibling expressions of a single house: the Lab, the kitchen, where we make and where we search; the Bistrot, the living room, where we welcome. The full cascade - how we descend from the vision into each expression - lives in its own chapter.\n\n## 8. What makes the whole hard to copy\n\nNot a trick: a combination.\n\n- **Mastery of the capture**: maceration, low-temperature vacuum distillation - a science that serves the ingredient without ever showing itself.\n- **Freedom** from market conventions: we do what the big groups do not allow themselves.\n- **Instinct and humanity**: we do it because we believe in it, for ourselves first. Our share of imperfection is our strength.\n- **Hospitality**: Abstract is a bartenders' brand, and what a bartender knows best is how to welcome. The network - all those bars, all those people who know us and trust us - is not a separate pillar: it is the natural consequence of that hospitality.\n\nThe language and the approach, we give away; generosity is part of the system. What cannot be copied is the whole.\n\n## To settle / to challenge\n\n- **The promise sentence**: direction set, wording to chisel.\n- **Essence, signature, values**: to lock at platform level (two values are already set verbatim; the rest is being written).\n- **The architecture** (umbrella brand + sibling expressions): to confirm with Rémy; Nico holds the cascade.\n- **The general-public moments of truth**: a first-intention version here, to be tested in the place.\n- **The hard-to-copy combination**: confirm the pillars, and decide what in the relationship deserves to be structured.\n\n---\n\n*Readable version, kept with Nico. The operational detail is regenerated from this document, never the other way around. A human writing pass will follow on the tone.*\n", "fr": "# Stratégie d'expérience Abstract (version lisible)\n\n> **v fondations (émotionnelle) du 2026-07-05 - pièce à casser.**\n>\n> Réécriture de fond après la relecture à deux : remettre l'émotion et l'essence au centre, avec une colonne vertébrale claire - l'ingrédient. Ce n'est pas un texte final : une passe d'écriture humaine viendra. C'est ce document qu'on relit et qu'on casse ensemble ; tout le détail opérationnel se régénère à partir de lui, jamais l'inverse.\n\n## 1. L'intuition de départ\n\nTout commence par un ingrédient. Un citron, une framboise, un beurre. Un miracle de la nature, avec sa propre expression, qui laisse en chacun de nous une trace différente : le citron de votre enfance n'est pas le mien, et c'est précisément ce qui le rend précieux. Le goût n'est pas une information ; c'est une émotion attachée au temps.\n\nEt pourtant, presque personne n'a reçu les outils pour jouer avec ça. Pas seulement les barmen sous la pression de leurs cartes : nous tous. On manque de matière, de mots, de repères pour être maîtres de notre créativité par le goût. Le professionnel, à qui personne n'a besoin d'expliquer son métier, manque d'une matière nouvelle et fiable pour composer. L'amateur curieux manque de pédagogie pour comprendre ce qu'il ressent et oser s'en servir.\n\nL'intuition d'Abstract tient en une phrase : si on redonne aux gens de quoi s'exprimer par le goût, ils créeront des choses qu'on n'imagine pas. C'est pour ça que notre proposition est essentialiste et l'usage versatile. Un Monochrome se boit pur, se mixe en deux gestes ou entre dans une composition complexe ; il n'y a pas de bon ou de mauvais usage, il y a un champ de possibles. Comme une brique de Lego : la pièce est simple, presque élémentaire, et c'est exactement ce qui ouvre l'infini des constructions. Revenir à l'essentiel n'appauvrit pas la créativité : il l'ouvre.\n\nNotre posture suit : « voilà ce qu'on a sorti, amusez-vous avec. » Les gens qui nous rejoignent ne sont ni des clients ni des consommateurs : ce sont des auteurs.\n\n## 2. Ce qu'est Abstract\n\nOn est des messagers. La nature fait bien les choses ; les producteurs en tirent le meilleur ; nous recevons cette matière et lui rendons hommage en retrouvant l'essence de l'ingrédient. Notre métier : capturer un instant volatil. La framboise à son pic exact de maturité, le beurre juste avant qu'il ne brûle. Les composés aromatiques sont volatils - c'est parce qu'ils le sont qu'on peut les capturer, et qu'on peut les perdre. Nous saisissons ce moment et le faisons vivre dans le temps, pour qu'il aille réveiller un souvenir chez quelqu'un d'autre.\n\nC'est pourquoi notre sujet n'est pas le Monochrome, ni la métaphore de l'art. Notre sujet, c'est l'ingrédient. Si tout part du citron et de son goût le plus pur - le produit, la parole, l'identité - alors celui qui cherche le citron le plus juste du marché arrive chez nous naturellement, sans qu'on ait eu besoin de se mettre en avant. Le point d'entrée est l'ingrédient, pas ce qu'on vend.\n\nCe qu'on construit autour, c'est un standard de la saveur : une base commune, accessible, presque une bibliothèque, dans laquelle chacun se retrouve et puise. Et on l'édite comme une maison d'édition édite des livres : en mettant en lumière ceux qui créent - les producteurs en amont, les créateurs en aval. Éditeurs de saveurs : notre place est entre les deux bouts de la chaîne, jamais au-dessus.\n\nLa saveur est notre terrain, plus insaisissable et plus riche que le goût seul ; mais on parle des deux, car l'arôme est une combinaison de saveurs et de goût, et dès qu'on compose, tout compte.\n\nEt une posture de fond : on partage. L'art de la saveur mérite d'être accessible et populaire ; on partage l'approche, la connaissance, le langage. C'est le geste d'un messager : ce qu'on a reçu de la nature ne nous appartient pas.\n\n## 3. À qui on s'adresse\n\nÀ tout le monde. La marque parle au professionnel comme au grand public ; commencer par les pros est une question de déploiement, pas d'identité. Deux publics, une même marque, des profondeurs différentes :\n\n- Au pro, on n'explique pas son métier : on lui apporte une matière nouvelle pour composer.\n- Au grand public, on apporte l'émerveillement et la pédagogie : comprendre ce qu'on ressent, refaire simplement, oser jouer.\n\nDans les deux cas, la même bascule : de spectateur à auteur.\n\nGéographie en cercles : la France d'abord, là où on existe déjà, puis l'Europe, puis le monde.\n\n## 4. La promesse\n\n> **Si chacun avait le pouvoir de s'exprimer par le goût, en toute simplicité, il ouvrirait de nouveaux champs créatifs.**\n\nC'est la conviction qui porte tout ; la formulation reste à ciseler, mais elle tient déjà nos quatre mots : **chacun** (pas une élite), la **simplicité** (pas une technique de plus), les **champs créatifs** (pas un produit de plus), et derrière eux l'**auteur** (pas le client). Le contrat d'expérience - un mot d'ordre par valeur, qu'on retient par cœur - est la conclusion de cette stratégie ; il vit dans son propre chapitre.\n\n## 5. Les cinq principes d'expérience\n\nCinq règles dont tout le reste découle. Chacune existe pour servir l'ingrédient, et celui ou celle qui s'en saisit.\n\n### 1. Révéler en retirant\n\nC'est le sens même de notre nom : abstraire, retirer le superflu pour ne laisser que la sensation. Rien d'ajouté dans la bouteille - pas de sucre, pas d'additif, pas de raccourci. Rien pour se cacher non plus : ni fausse complexité, ni cadre emprunté (« c'est comme un gin »). Il reste l'ingrédient et sa traduction. Et c'est là le renversement qui compte : l'essentiel n'est pas une privation, c'est une ouverture. Une matière ramenée à l'essentiel peut tout devenir ; c'est en retirant qu'on rend possible.\n\n### 2. Traduire, pas décrire\n\nL'ancrage, c'est l'ingrédient. On ne le décrit pas, on traduit ce qu'il nous a fait vivre : il devient couleur, forme, mouvement, texture. La couleur porte cette traduction - un Monochrome n'est d'ailleurs pas « une couleur » mais une gamme, les nuances d'une même couleur, comme un ingrédient est mille instants d'une même chose - et les autres modalités gravitent autour. Un garde-fou : la traduction doit rester simple et accessible, une évocation qu'on peut transmettre à une équipe comme à un ami, jamais un radar technique de plus.\n\n### 3. Tendre le pinceau\n\nLe héros, c'est la création. Pas la nôtre : celle de la personne à qui on tend la matière. Le barman qui signe sa carte, le chef qui compose une assiette, l'amateur qui ose un geste chez lui : chacun devient auteur. Abstract est la matière fidèle et nommée derrière l'œuvre - un moyen, jamais une finalité. Jamais la vedette, jamais interchangeable non plus : la matière a un nom.\n\n### 4. Évoquer juste\n\nOn parle du citron. De ce qu'il évoque, du souvenir qu'il réveille, de l'instant où on l'a capturé. C'est notre façon d'être justes : rendre l'évocation d'un ingrédient, sa traduction sensible, plutôt que sa fiche technique. Et c'est la porte d'entrée de tout ce qu'on raconte : on parle du citron, jamais du « Monochrome de citron » ; le produit n'arrive qu'à la fin, comme une signature. Deux clartés gardent ce principe honnête. « Évoqué, pas présent » : le Monochrome beurre évoque le gras, mais la distillation l'a retiré ; on offre la sensation, pas la substance, et on le dit. Et pas de légende plaquée : l'émotion vient de l'ingrédient lui-même, l'histoire qu'on raconte est celle que le verre peut tenir. Là où la loi encadre la parole (loi Evin), cette nature nous sert : parler du fruit, c'est déjà nous.\n\n### 5. La relation fait partie du produit\n\nL'hospitalité n'est pas le décor du produit : elle en fait partie. Le monde du cocktail sait être pompeux et technique ; le Bistrot le rend simple et chaleureux. On y vient vivre un moment, pas prouver qu'on s'y connaît. La profondeur est là, sur demande : le passionné peut descendre très loin dans la matière, le curieux rester en surface et être reçu avec le même soin. Le cadre du vieux bistrot, presque cliché, est un choix : le plus familier des salons pour le plus radical des produits. L'ambition du lieu est l'évidence - tout y est si fluide qu'on ne se pose pas de question, parce que l'énorme travail derrière ne se voit pas.\n\n## 6. Les moments de vérité\n\nCinq moments, de la rencontre à la transmission. Le fil est le même pour tous ; les leviers et la profondeur changent selon le public. Il faut donc deux versions de ce parcours : une pro, une grand public.\n\n| Moment | Le pro | Le grand public |\n|---|---|---|\n| Découvrir | « Ça ne ressemble à rien d'autre, et ça peut nourrir mon travail » | « Un citron, vraiment ? Je veux goûter ça » - l'émerveillement, presque naïf |\n| Comprendre | « Je fais confiance à la rigueur ; on me donne une matière, pas un objet fini » | « Je comprends ce que je sens, on me l'explique sans me faire la leçon » |\n| Goûter | La justesse d'abord, puis la révélation : de quoi composer | Le souvenir qui remonte : « ça, c'est le citron de... » |\n| S'approprier | « Je peux créer, reproduire, l'expliquer à mon équipe » | « Je peux le refaire chez moi, simplement, et le faire goûter » |\n| Transmettre | « Ça fait briller ma création, et le langage voyage » | « J'ai une histoire à raconter, et l'envie de la partager » |\n\nCe parcours existe déjà en grande partie dans le lieu ; ce qui manque, c'est de le structurer - dans ses deux versions, chacune avec ses leviers.\n\n## 7. L'architecture, en un mot\n\nAbstract est la marque chapeau : c'est elle qui porte la vision et la voix. En dessous, deux expressions sœurs d'une même maison : le Lab, la cuisine, où l'on fabrique et où l'on cherche ; le Bistrot, le salon, où l'on accueille. La cascade complète - comment on redescend de la vision vers chaque expression - vit dans son propre chapitre.\n\n## 8. Ce qui rend l'ensemble difficile à copier\n\nPas un artifice : une combinaison.\n\n- **La maîtrise de la capture** : macération, distillation sous vide à basse température - une science qui sert l'ingrédient sans jamais se montrer.\n- **La liberté** vis-à-vis des conventions : on fait ce que les grands groupes ne se permettent pas.\n- **L'instinct et l'humanité** : on le fait parce qu'on y croit, pour nous d'abord. Notre part d'imperfection est notre force.\n- **L'hospitalité** : Abstract est une marque de barmen, et ce qu'un barman sait le mieux faire, c'est accueillir. Le réseau - tous ces bars, toutes ces personnes qui nous connaissent et nous font confiance - n'est pas un pilier à part : c'est la conséquence naturelle de cette hospitalité.\n\nLe langage et l'approche, on les donne ; la générosité fait partie du système. Ce qui ne se copie pas, c'est l'ensemble.\n\n## À trancher / à challenger\n\n- **La phrase de promesse** : direction posée, formulation à ciseler.\n- **Essence, signature, valeurs** : à verrouiller au niveau plateforme (deux valeurs sont déjà posées verbatim ; le reste s'écrit).\n- **L'architecture** (marque chapeau + expressions sœurs) : à confirmer avec Rémy ; Nico tient la cascade.\n- **Les moments de vérité grand public** : version posée ici en première intention, à éprouver dans le lieu.\n- **La combinaison difficile à copier** : confirmer les piliers, et décider ce qui, dans la relation, mérite d'être structuré.\n\n---\n\n*Version lisible, tenue avec Nico. Le détail opérationnel se régénère à partir de ce document, jamais l'inverse. Une passe d'écriture humaine viendra sur le ton.*\n"}, {"id": "brand-book/lisible/03-architecture-frontiere-moat.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/03-architecture-frontiere-moat.md", "title_en": "Brand architecture, frontier & moat", "title_fr": "Architecture de marque, frontière & moat", "en": "# Brand architecture, frontier & moat\n\n> **Readable version, for human review. Draft of 2026-07-04.**\n>\n> This chapter covers three linked things: how Abstract, the Lab and the Bistrot fit together (the architecture); what is shared across all venues and what each venue makes its own (the frontier); and what makes our advantage durable (the moat). It is a draft: the architecture and the moat are proposals to break, and rollout runs through Rémy.\n\n## 1. The architecture: one umbrella brand, two sister expressions\n\n*(Orientation 2026-07-04, to validate with Rémy. It revises the repo's earlier decision, which held \"Abstract = the Lab, parent house\".)*\n\nAbstract is an **umbrella brand.** Beneath it, **two sister expressions**:\n\n- **Abstract Lab**: the kitchen. Where we make things, produce the Monochromes, experiment.\n- **Abstract Bistrot**: the living room. Where we welcome people (two venues today: Lyon and Paris).\n\nThe Lab is not \"the parent house\" just because it produces. Both are expressions of the same brand, on equal footing.\n\n**The architecture archetype: endorsed brands.** Three models were on the table: the *branded house* (a single brand, almost no variation between entities), *sub-brands* (sub-brands tightly tied to the center), and *endorsed brands* (living child brands, each with its own identity, endorsed by the parent brand). We keep the **endorsed brands** model: it is the one that gives each venue a real identity of its own while keeping the link to Abstract visible.\n\nConcretely: a **shared base** - a graphic and editorial signature such that you can feel you are in the Abstract galaxy - AND, for each venue, an **expression of its own, alive.** It is this endorsement that lets a future Abstract Berlin be a **local reinterpretation** (its sense of place), not a copy of the Lyon bistrot.\n\nOut of scope: Rémy Savage's other establishments (Shapes, Bar Nouveau, Baguette 3000, Indigo) are separate brands, not part of the Abstract architecture.\n\nStatus: a piece to break. We will win alignment by doing work others want to adopt, not by imposing it.\n\n## 2. The frontier: the shared base and the venue's own expression\n\nThe frontier answers a simple question: what does every Abstract venue share (so it stays one brand), and what can each venue make its own (so it stays alive)?\n\n### The shared base (identical everywhere)\n\n- **Positioning.** We sell material and tools people make their own, not finished objects. We talk about **flavor** (the aromatic terrain), not just taste.\n- **The brand's values and principles**: reveal by removing, translate rather than describe, hand over the brush, evoke honestly, the relationship is part of the product.\n- **Product truth.** We say \"evoked\", not \"present\" (the butter Monochrome evokes the fat that distillation has removed). In regulated markets we talk about the fruit itself, never the alcohol or an effect (Evin law).\n- **The identity system.** A single wordmark, the distortion visual language, and above all the flavor-to-color link: a raspberry reads **the same color in Lyon and in Paris.** That consistency is load-bearing - it is a building block of the moat.\n- **The Monochrome catalog** and its naming logic.\n- **The voice**: what we can and cannot say (the register, no promise of an effect, never a principle preached as dogma).\n\n### The venue's own expression (what each place makes its own)\n\n- **The venue itself**: architecture, ambiance, materials, the character of the room. This is the familiar frame (the old bistrot) that makes a radical product legitimate and accessible.\n- **Hospitality**: service style, rituals, the team, the venue's own intent. This is the largest zone of freedom.\n- **The menu**: the compositions built from the Monochromes, the signatures (Lyon has its own, Paris has its own).\n- **Register and warmth**, local idiom, FR/EN adaptation.\n- **The ambient palette** (walls, materials), distinct from the aroma color system.\n- **Endorsement**: the wordmark followed by a descriptor (\"Bistrot, Lyon\" / \"Bistrot, Paris\"), inside the shared system. No separate logo per venue.\n\n**Lyon and Paris, today.** Lyon is the purest original: the distillery, the barely-changed old bistrot, the place where the material is made; its register leans toward origin and restraint. Paris is the newer venue: a livelier room, more of the network's meeting point; its register leans toward scene and connection. Same foundations, different intent.\n\n*Orientation note (2026-07-04).* The repo's earlier model said \"the core locks everything, the Bistrot can only flex the frame\". We soften it: shared base + a living expression of its own per venue. The exact degree of freedom left to each venue is still **to confirm with Rémy.** Also to settle: is \"distilled in Lyon\" simply a place story, or a protected claim of the shared base?\n\n## 3. The moat: what makes the advantage durable\n\nStarting rule: **what you give away cannot also be the wall that protects you.** Two things we give freely, out of generosity - the language of flavor and the extraction approach - are therefore not the moat on their own. They are the bait that wins the category.\n\n**The pillars** *(orientation 2026-07-04)*:\n\n- **Technical mastery** of vacuum extraction: we are among the best.\n- **Freedom** from market conventions: we can do what the big groups do not.\n- **Instinct and humanity**: we do it because we believe in it, for ourselves first, before the business. A big, market-research-driven group has already tried, and failed.\n- **Hospitality**: Abstract is a brand of bartenders; welcoming people is what a bartender knows best.\n- **The network.**\n\n**What deepens every time we share** (the real wall, the one that grows instead of being given away):\n\n- **The network of credited co-creators.** A bartender or a chef co-creates a Monochrome or a limited release; it is publicly credited to them by name and catalogued; they keep a real stake in it (shared rights); and the credit travels with the work wherever it goes. A competitor, even a better-funded one, can neither have been the first to credit these makers, nor detach a co-author from a work that already carries their name. To leave, they would have to walk away from their own credited work: that is the switching cost.\n- **The standard, ours.** The language is open and shared; but the standard itself - the Monochrome catalog, the flavor-to-color link, the naming, the tasting ritual - stays Abstract's. We give the language, we keep the standard.\n- **Reference status**: being the brand others measure themselves against, known before the first contact.\n\nWhy it holds: generosity is not a leak, it is the pump. Every time the language spreads, reference status strengthens, the ritual ties back to Abstract, and the network gains a node. Giving feeds the layer we own instead of eroding it.\n\n## Still to settle (with Nico, then Rémy)\n\n- **Architecture**: validate \"umbrella brand + Lab and Bistrot as sisters\".\n- **Frontier**: confirm the degree of freedom for each venue; \"distilled in Lyon\", a story or a protected claim?\n- **Moat**: accept that giving away the language and the extraction is a strategy, not just generosity; frame the rights-share on co-creations (margin cost versus the value of the tie) - a finance and legal question.\n- **The moat's central assumption**: a credited co-creator tied to the rights will not defect. To verify - can a competitor simply out-pay for the relationship?\n\n---\n\n*This document is the readable source, kept up to date with Nico. The detailed agent version will be regenerated from it, never the other way around.*\n", "fr": "# Architecture de marque, frontière & moat\n\n> **Version lisible, pour relecture humaine. Brouillon du 2026-07-04.**\n>\n> Ce chapitre pose trois choses liées : comment Abstract, le Lab et le Bistrot s'articulent (l'architecture) ; ce qui est commun à tous les lieux et ce que chaque lieu s'approprie (la frontière) ; et ce qui rend notre avantage durable (le moat). C'est un brouillon : l'architecture et le moat sont des propositions à casser, et l'application passe par Rémy.\n\n## 1. L'architecture : une marque chapeau, deux expressions sœurs\n\n*(Orientation 2026-07-04, à valider avec Rémy. Elle révise la décision précédente du repo, qui posait « Abstract = le Lab, maison mère ».)*\n\nAbstract est une **marque chapeau.** En dessous, **deux expressions sœurs** :\n\n- **Abstract Lab** : la cuisine. On y fabrique, on produit les Monochromes, on essaie.\n- **Abstract Bistrot** : le salon. On y accueille (deux lieux aujourd'hui : Lyon et Paris).\n\nLe Lab n'est pas « la maison mère » sous prétexte qu'il produit. Les deux sont des expressions de la même marque, à parts égales.\n\n**L'archétype d'architecture : les marques endossées (endorsed brands).** Trois modèles étaient sur la table : la *branded house* (une seule marque, presque aucune variation entre les entités), les *sub-brands* (des sous-marques très rattachées au centre) et les *endorsed brands* (des marques filles vivantes, chacune avec sa propre identité, mais endossées par la marque mère). On retient les **endorsed brands** : c'est le modèle qui donne à chaque lieu une vraie identité propre tout en gardant visible le lien à Abstract.\n\nConcrètement : un **socle commun** - une signature graphique et éditoriale telle qu'on sent qu'on est dans la galaxie Abstract - ET, pour chaque lieu, une **expression propre et vivante.** C'est cet endossement qui autorise un futur Abstract Berlin à être une **réinterprétation locale** (son « sense of place »), et non la copie du bistrot lyonnais.\n\nHors périmètre : les autres établissements de Rémy Savage (Shapes, Bar Nouveau, Baguette 3000, Indigo) sont des marques séparées, pas de l'architecture Abstract.\n\nStatut : pièce à casser. On gagnera l'alignement en faisant un travail que les autres auront envie d'adopter, pas en l'imposant.\n\n## 2. La frontière : le socle commun et l'expression propre\n\nLa frontière répond à une question simple : qu'est-ce que tout lieu Abstract partage (pour rester une seule marque), et qu'est-ce que chaque lieu peut faire sien (pour rester vivant) ?\n\n### Le socle commun (identique partout)\n\n- **Le positionnement.** On vend de la matière et des outils que chacun s'approprie, pas des objets finis. On parle de **saveur** (le terrain aromatique), pas seulement de goût.\n- **Les valeurs et les principes** de la marque : révéler en retirant, traduire plutôt que décrire, tendre le pinceau, évoquer juste, la relation fait partie du produit.\n- **La vérité produit.** On dit « évoqué », pas « présent » (le Monochrome beurre évoque le gras que la distillation a retiré). Sur les marchés réglementés, on parle du fruit lui-même, jamais de l'alcool ni d'un effet (loi Evin).\n- **Le système d'identité.** Un seul logotype (le wordmark), le langage visuel de distorsion, et surtout le lien saveur-couleur : une framboise a **la même couleur à Lyon et à Paris.** Cette constance est porteuse - c'est une brique du moat.\n- **Le catalogue des Monochromes** et leur logique de nommage.\n- **La voix** : ce qu'on peut et ne peut pas dire (le registre, pas de promesse d'effet, jamais un principe asséné comme un dogme).\n\n### L'expression propre (ce que chaque lieu s'approprie)\n\n- **Le lieu lui-même** : l'architecture, l'ambiance, les matériaux, le caractère de la salle. C'est le cadre familier (le vieux bistrot) qui rend le produit radical légitime et accessible.\n- **L'hospitalité** : le style de service, les rituels, l'équipe, l'intention propre du lieu. C'est la plus grande zone de liberté.\n- **La carte** : les compositions bâties à partir des Monochromes, les signatures (Lyon a la sienne, Paris la sienne).\n- **Le registre et la chaleur**, l'idiome local, l'adaptation FR/EN.\n- **La palette d'ambiance** (murs, matières), distincte du système couleur des arômes.\n- **L'endossement** : le wordmark suivi d'un descripteur (« Bistrot, Lyon » / « Bistrot, Paris »), dans le système commun. Pas de logo propre par lieu.\n\n**Lyon et Paris, aujourd'hui.** Lyon est l'original le plus pur : la distillerie, le vieux bistrot à peine retouché, le lieu où la matière naît ; son registre penche vers l'origine et la retenue. Paris est le lieu plus récent : une salle plus vivante, davantage le rendez-vous du réseau ; son registre penche vers la scène et la connexion. Mêmes fondations, intention différente.\n\n*Note d'orientation (2026-07-04).* L'ancien modèle du repo disait « le cœur verrouille tout, le Bistrot ne peut flexer que le cadre ». On l'assouplit : socle commun + expression propre et vivante par lieu. Le degré exact de liberté laissé à chaque lieu reste **à confirmer avec Rémy.** À trancher aussi : « distillé à Lyon » est-il une simple histoire de lieu, ou une revendication protégée du socle ?\n\n## 3. Le moat : ce qui rend l'avantage durable\n\nRègle de départ : **ce qu'on donne ne peut pas être le mur qui protège.** Deux choses qu'on donne volontiers, par générosité - le langage de la saveur et l'approche de l'extraction - ne sont donc pas le moat à elles seules. Elles sont l'appât qui gagne la catégorie.\n\n**Les piliers** *(orientation 2026-07-04)* :\n\n- **La maîtrise technique** de l'extraction sous vide : on est parmi les meilleurs.\n- **La liberté** vis-à-vis des conventions de marché : on peut faire ce que les grands groupes ne font pas.\n- **L'instinct et l'humanité** : on le fait parce qu'on y croit, pour nous d'abord, avant le business. Un grand groupe très « études de marché » a déjà essayé, et échoué.\n- **L'hospitalité** : Abstract est une marque de barmen ; accueillir est ce qu'un barman connaît le mieux.\n- **Le réseau.**\n\n**Ce qui se renforce à chaque fois qu'on partage** (le vrai mur, celui qui se creuse au lieu de se donner) :\n\n- **Le réseau des co-créateurs crédités.** Un barman ou un chef co-crée un Monochrome ou une édition limitée ; c'est publiquement crédité à son nom et catalogué ; il en garde une vraie part (partage des droits) ; et le crédit voyage avec l'œuvre partout où elle circule. Un concurrent, même mieux financé, ne peut ni avoir été le premier à créditer ces créateurs, ni détacher un co-auteur d'une œuvre qui porte déjà son nom. Pour partir, il devrait renoncer à son propre travail crédité : c'est ça, le coût de sortie.\n- **Le standard, à nous.** Le langage est ouvert et partagé ; mais le standard lui-même - le catalogue des Monochromes, le lien saveur-couleur, le nommage, le rituel de dégustation - reste celui d'Abstract. On donne le langage, on garde le standard.\n- **Le statut de référence** : être la marque à laquelle les autres se comparent, connue avant même le premier contact.\n\nPourquoi ça tient : la générosité n'est pas une fuite, c'est la pompe. Chaque fois que le langage se diffuse, le statut de référence se renforce, le rituel se rattache à Abstract, et le réseau gagne un nœud. Le don nourrit la couche qu'on possède au lieu de l'éroder.\n\n## Ce qui reste à trancher (avec Nico, puis Rémy)\n\n- **Architecture** : valider « marque chapeau + Lab et Bistrot sœurs ».\n- **Frontière** : confirmer le degré de liberté de chaque lieu ; « distillé à Lyon », simple histoire ou revendication protégée ?\n- **Moat** : accepter que donner le langage et l'extraction est une stratégie, pas seulement de la générosité ; cadrer le partage des droits sur les co-créations (coût de marge contre valeur du lien) - une question finance et juridique.\n- **L'hypothèse centrale du moat** : un co-créateur crédité et associé aux droits ne partira pas. À vérifier - un concurrent peut-il simplement surpayer la relation ?\n\n---\n\n*Ce document est la source lisible, tenue à jour avec Nico. La version détaillée pour les agents sera régénérée à partir de celle-ci, jamais l'inverse.*\n"}, {"id": "brand-book/lisible/04-plateforme-essence-valeurs.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/04-plateforme-essence-valeurs.md", "title_en": "Platform, essence & values", "title_fr": "Plateforme, essence & valeurs", "en": "# Platform, essence & values\n\n> **Human-readable version, for human review. 2026-07-05: foundations pass (emotional), a piece to break.**\n>\n> Deep rewrite after the Ismaïl + Nico read-through: the previous version had lost the emotion and the essence to a descriptive tone. This one puts the ingredient and memory back at the center, and lets everything flow from them. **The essence, the signature and the values are to be locked**: what follows is a deliberate proposal, written to be discussed and broken, not canon. A human writing pass will come after.\n\n## 1. It all begins with an ingredient\n\nTake a lemon. We think we know it: yellow, bright, sharp. Then we pause. We picture the seed becoming a tree, the patience of seasons, the grower's hands, the journey from branch to knife. Suddenly, \"a lemon\" is not simple at all. It is a world.\n\nEvery ingredient is a miracle of nature. It has its own expression, and it leaves in each of us a different trace, tied to our own story. The smell of coffee in the morning, and everything it carries of silence and promise. The first raspberry of summer: an entire season returning in one bite. Taste is not information: it is emotion attached to time.\n\nThat is why our subject is not what we sell. Our subject is the ingredient: the lemon, the raspberry, the butter. And the memory it awakens, which belongs to you alone.\n\n## 2. Our craft: capturing the volatile instant\n\nThe problem is that this instant passes. The raspberry at its exact peak of ripeness. The butter just before it browns. Aromatic compounds are volatile: it is because they are that we can capture them, and it is because they are that we can lose them. The world moves too fast for them. We forget.\n\nWe refuse to forget. That is where our craft lives: capturing a volatile instant, as faithfully as possible, and making it live on through time. Not freezing it: keeping it alive, readable, real. Nature does things well; the growers draw the best from it; we receive that matter and pay homage to it by finding the essence of the ingredient again. **We are messengers.**\n\nEverything else flows from this choice. If everything we do starts from the ingredient and returns to it, then whoever looks for the purest, truest, most alive lemon arrives naturally at what we make: the Monochrome becomes the logical answer, without our needing to push it forward. That is why we speak of the lemon, never of the \"lemon Monochrome.\" The ingredient first, the brand stepping back: the obviousness does the work.\n\nAnd the horizon, in the end, is simple: a world where people taste with intention, where a single ingredient can slow time and reopen memory.\n\n## 3. The essence (to be locked)\n\n> **\"The living memory of the ingredient.\"**\n\nOur internal north star: what everything at Abstract must serve. Three anchors, whatever the final wording:\n\n- **The ingredient**: our subject, our starting point and our destination.\n- **Living**: the captured instant is not frozen; it keeps living through time, and in the hands of those who take it up.\n- **Memory**: every flavor reopens a memory, different for each person. We do not say what to feel; we awaken what each person already carries.\n\n\"Abstract\" means to extract: to reach for the essential behind the appearance. The name and the essence rhyme.\n\n*A deliberate proposal to fill a gap left open; the essence belongs to Nico.*\n\n## 4. Our values (to be locked)\n\nFive values, and one ground running through them: **memory**. Memory is not one more value; it is the soil the five stand on. Each value is a way of honoring the ingredient and the trace it leaves.\n\n**Wonder.** Not mysticism: attention. The world passes by without seeing the butter turning golden, the raspberry at its exact hour. We stop. We look closely, we study, we fall in love with what is already there. It is the gaze we owe the ingredient: never generic, never rushed.\n\n**Precision.** Being a messenger binds us: we do not distort the message. The faithful extraction, the exact word, the honest claim. We say \"evoked\" when it is evoked, \"present\" when it is present. Fidelity to the captured instant is our way of respecting both the ingredient and the person who will remember it.\n\n**Restraint.** Removing the superfluous so the essential stands. Science that serves, never performs. And restraint is also a courtesy: what remains must be simple, accessible, graspable by everyone, never an exercise reserved for insiders.\n\n**Generosity.** We are publishers of flavor: we put forward those who create, from the grower who raises the ingredient to the creator who turns it into a work. We share the language, the knowledge, the approach: a library of flavor, open. And we hand it all over without instructions or judgment: here is what we have made, have fun with it. There is no right or wrong use, only a field of possibilities. The people who pass through Abstract are not customers: they are authors.\n\n**Connection.** Taste connects. The same lemon awakens a thousand different memories, and telling them to each other brings us closer. So the relationship is part of what we make: from the Lab (the kitchen) to the Bistrot (the living room), two sister expressions of one house, it is the same welcome. A brand of people whose first craft is hospitality.\n\n## 5. The signature and the promise (direction, to validate)\n\nThe promise is still being found, but its direction is set:\n\n> **\"If everyone had the power to express themselves through taste, in complete simplicity, they would open new creative fields.\"**\n\nA sentence to chisel, but it already holds everything it must keep:\n\n- **everyone**: the brand speaks to all, the professional and the amateur alike;\n- **express themselves through taste**: we give back the power to express oneself through taste;\n- **in complete simplicity**: accessibility is not a concession, it is the project;\n- **new creative fields**: giving people the opportunity to be more creative.\n\nBehind it, the image that holds everything: Abstract as a publishing house of flavor. We publish; others write.\n\nThe public signature will be the short line that distills this promise, to be written once the promise is locked. Two candidates to break: **\"Express yourself through taste.\"** and **\"Taste belongs to everyone.\"**\n\nRegister: all these lines speak of the fruit, of expression and of making; never of consumption or an effect. Every public line will pass the Evin review before release.\n\n## To settle / to challenge\n\n- **The essence**: lock \"The living memory of the ingredient,\" or reword it while keeping the three anchors (the ingredient, living, memory). Nico's call.\n- **The values**: confirm the five and their emotional rewrite; confirm that memory stays the ground carried by the essence, rather than a sixth value.\n- **The promise**: chisel the direction sentence without losing its four anchors (everyone, expressing oneself through taste, simplicity, new creative fields).\n- **The signature**: choose or rewrite the public line; Evin review before any release.\n- **Universality**: as written, it lives in \"everyone,\" in restraint and in generosity; confirm it does not need to be a named value.\n\n---\n\n*This document is the readable source, kept up to date with Nico. The detailed agent version will be regenerated from it, once these foundations are locked.*\n", "fr": "# Plateforme, essence & valeurs\n\n> **Version lisible, pour relecture humaine. 2026-07-05 : v fondations (émotionnelle), pièce à casser.**\n>\n> Réécriture de fond après la relecture Ismaïl + Nico : la version précédente avait perdu l'émotion et l'essence au profit d'un ton descriptif. Celle-ci remet l'ingrédient et le souvenir au centre, et en fait tout découler. **L'essence, la signature et les valeurs sont à verrouiller** : ce qui suit est une proposition assumée, écrite pour être discutée et cassée, pas un canon. Une passe d'écriture humaine viendra ensuite.\n\n## 1. Tout commence par un ingrédient\n\nPrenez un citron. On croit le connaître : jaune, vif, acide. Puis on s'arrête. On imagine la graine devenue arbre, la patience des saisons, les mains du producteur, le chemin de la branche au couteau. Soudain, « un citron » n'est plus simple du tout. C'est un monde.\n\nChaque ingrédient est un miracle de la nature. Il a sa propre expression, et il laisse en chacun de nous une trace différente, liée à notre histoire. L'odeur du café le matin, et tout ce qu'elle transporte de silence et de promesse. La première framboise de l'été : une saison entière qui revient dans une bouchée. Le goût n'est pas une information : c'est une émotion accrochée au temps.\n\nC'est pour cela que notre sujet n'est pas ce que nous vendons. Notre sujet, c'est l'ingrédient : le citron, la framboise, le beurre. Et le souvenir qu'il réveille, qui n'appartient qu'à vous.\n\n## 2. Notre métier : capturer l'instant volatil\n\nLe problème, c'est que cet instant passe. La framboise à son pic exact de maturité. Le beurre juste avant de brunir. Les composés aromatiques sont volatils : c'est parce qu'ils le sont qu'on peut les capturer, et c'est parce qu'ils le sont qu'on peut les perdre. Le monde va trop vite pour eux. On oublie.\n\nNous refusons d'oublier. Notre métier est là : capturer un instant volatil, au plus juste, et le faire vivre dans le temps. Pas le figer : le garder vivant, lisible, réel. La nature fait bien les choses ; les producteurs en tirent le meilleur ; nous recevons cette matière et nous lui rendons hommage en retrouvant l'essence de l'ingrédient. **Nous sommes des messagers.**\n\nDe ce choix découle tout le reste. Si tout, chez nous, part de l'ingrédient et y revient, alors celui qui cherche le citron le plus pur, le plus juste, le plus vivant, arrive naturellement à ce que nous faisons : le Monochrome devient la réponse logique, sans qu'on ait besoin de le mettre en avant. C'est pourquoi nous parlons du citron, jamais du « Monochrome de citron ». L'ingrédient d'abord, la marque en retrait : l'évidence fait le travail.\n\nEt l'horizon, au fond, est simple : un monde où l'on goûte avec intention, où un seul ingrédient peut ralentir le temps et rouvrir la mémoire.\n\n## 3. L'essence (à verrouiller)\n\n> **« La mémoire vivante de l'ingrédient. »**\n\nNotre étoile polaire interne : ce que tout, chez Abstract, doit servir. Trois ancres, quelle que soit la formulation finale :\n\n- **L'ingrédient** : notre sujet, notre point de départ et notre point d'arrivée.\n- **Vivant** : l'instant capturé n'est pas figé ; il continue de vivre dans le temps, et entre les mains de ceux qui s'en emparent.\n- **La mémoire** : chaque saveur rouvre un souvenir, différent pour chacun. Nous ne disons pas quoi ressentir ; nous réveillons ce que chacun porte déjà.\n\n« Abstract », c'est extraire : aller chercher l'essentiel derrière l'apparence. Le nom et l'essence riment.\n\n*Proposition assumée pour combler un vide laissé ouvert ; l'essence appartient à Nico.*\n\n## 4. Nos valeurs (à verrouiller)\n\nCinq valeurs, et un socle qui les traverse : **le souvenir**. La mémoire n'est pas une valeur de plus ; elle est le sol sur lequel les cinq se tiennent. Chaque valeur est une manière d'honorer l'ingrédient et la trace qu'il laisse.\n\n**L'émerveillement.** Pas le mysticisme : l'attention. Le monde passe sans voir le beurre qui dore, la framboise à son heure exacte. Nous, on s'arrête. On regarde de près, on étudie, on tombe amoureux de ce qui est déjà là. C'est le regard qu'on doit à l'ingrédient : jamais générique, jamais pressé.\n\n**La précision.** Être messager engage : on ne déforme pas le message. L'extraction juste, le mot exact, la revendication honnête. On dit « évoqué » quand c'est évoqué, « présent » quand c'est présent. La fidélité à l'instant capturé est notre façon de respecter et l'ingrédient, et celui qui s'en souviendra.\n\n**La retenue.** Retirer le superflu pour que l'essentiel tienne debout. La science qui sert, jamais qui parade. Et la retenue est aussi une politesse : ce qui reste doit être simple, accessible, saisissable par chacun, jamais un exercice réservé aux initiés.\n\n**La générosité.** Nous sommes des éditeurs de saveurs : nous mettons en valeur ceux qui créent, du producteur qui cultive l'ingrédient au créateur qui en fait une œuvre. On partage le langage, la connaissance, l'approche : une bibliothèque de la saveur, ouverte. Et on tend le tout sans mode d'emploi ni jugement : voilà ce qu'on a sorti, amusez-vous avec. Il n'y a pas de bon ou de mauvais usage, seulement un champ de possibles. Les gens qui traversent Abstract ne sont pas des clients : ce sont des auteurs.\n\n**La connexion.** Le goût relie. Un même citron réveille mille souvenirs différents, et se les raconter nous rapproche. La relation fait donc partie de ce que nous fabriquons : du Lab (la cuisine) au Bistrot (le salon), deux expressions sœurs d'une même maison, c'est le même accueil. Une marque de gens dont le premier métier est l'hospitalité.\n\n## 5. La signature et la promesse (direction, à valider)\n\nLa promesse se cherche encore, mais sa direction est posée :\n\n> **« Si chacun avait le pouvoir de s'exprimer par le goût, en toute simplicité, il ouvrirait de nouveaux champs créatifs. »**\n\nPhrase à ciseler, mais qui contient déjà tout ce qu'elle doit garder :\n\n- **chacun** : la marque parle à tous, au professionnel comme à l'amateur ;\n- **s'exprimer par le goût** : on redonne le pouvoir de s'exprimer par le goût ;\n- **en toute simplicité** : l'accessibilité n'est pas une concession, c'est le projet ;\n- **de nouveaux champs créatifs** : donner l'opportunité aux gens d'être plus créatifs.\n\nDerrière elle, l'image qui tient tout : Abstract comme une maison d'édition de la saveur. Nous éditons ; les autres écrivent.\n\nLa signature publique, elle, sera la ligne courte qui distille cette promesse, à écrire une fois la promesse verrouillée. Deux pistes à casser : **« S'exprimer par le goût. »** et **« Le goût est à tout le monde. »**\n\nRegistre : toutes ces lignes parlent du fruit, de l'expression et du faire ; jamais de consommation ni d'effet. Chaque ligne publique passera la relecture Evin avant de sortir.\n\n## À trancher / à challenger\n\n- **L'essence** : verrouiller « La mémoire vivante de l'ingrédient », ou la reformuler en gardant les trois ancres (l'ingrédient, le vivant, la mémoire). Décision de Nico.\n- **Les valeurs** : confirmer les cinq et leur réécriture émotionnelle ; confirmer que la mémoire reste le socle porté par l'essence, plutôt qu'une sixième valeur.\n- **La promesse** : ciseler la phrase-direction sans perdre ses quatre ancres (chacun, s'exprimer par le goût, simplicité, nouveaux champs créatifs).\n- **La signature** : choisir ou réécrire la ligne publique ; relecture Evin avant toute sortie.\n- **L'universalité** : telle qu'écrite, elle vit dans « chacun », dans la retenue et dans la générosité ; confirmer qu'elle n'a pas besoin d'être une valeur nommée.\n\n---\n\n*Ce document est la source lisible, tenue à jour avec Nico. La version détaillée pour les agents sera régénérée à partir de celle-ci, une fois ces fondations verrouillées.*\n"}, {"id": "brand-book/lisible/04a-contrat-experience.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/04a-contrat-experience.md", "title_en": "The experience contract", "title_fr": "Le contrat d'expérience", "en": "# The experience contract\n\n> **Draft of 2026-07-05 - foundations version (emotional), a piece to break.** From the Ismail + Nico review: the experience contract is the conclusion of the experience strategy, not a chapter that paraphrases it. Four watchwords and one promise, to know by heart. A human writing pass will follow.\n\nEverything at Abstract begins with an ingredient. A lemon, a raspberry, a butter: a miracle of nature, which leaves in each of us a different memory, tied to our own story. Our craft holds in one gesture: capturing the instant when the ingredient is at its truest - the raspberry at its peak, the butter just before it burns - and keeping it alive. We are its messengers. Those who take hold of it are its authors.\n\nOf the whole experience strategy, this is what to remember. Four values, one watchword each, and a promise.\n\n## The four values\n\n**Meaning value: the essence of flavor.**\nReturn to the essential: a flavor faithful to its ingredient, simple to grasp, impossible to forget.\n\n**Relational value: publisher of flavors.**\nLike a publishing house, we bring to light those who create: the grower who brings the ingredient into the world, the author who turns it into a work.\n\n**Transactional value: we give people back the power to express themselves through taste.**\nWe do not sell a bottle: we hand back a voice.\n\n**Experience value: giving people the opportunity to be more creative.**\nHere is what we have made: have fun with it.\n\n## The promise: the contract\n\nWhere the four values meet, one sentence - the one we promise to keep:\n\n**\"Give everyone, in all simplicity, the power to express themselves through taste, and open new creative fields.\"** *(proposal to chisel, to validate)*\n\nEveryone, because taste belongs to everybody. Simplicity, because the essential needs no instruction manual. New creative fields, because a true flavor opens more than it imposes. And behind the sentence, the posture of a publishing house: we prepare the matter and keep the library of flavor; the works, for their part, bear the signature of their authors.\n\n## To decide / to challenge\n\n- The promise sentence: the version above is chiseled from the direction set in the review (\"if everyone had the power to express themselves through taste, in all simplicity, they would open new creative fields\"). Keep the promise form (\"give everyone...\") or the vision form (\"if everyone had...\")?\n- The watchwords of the first two values (the essence, the publisher): are these the sentences we will remember by heart after three readings? The last two are locked as they are.\n- The chapter's place: a conclusion folded into the end of the experience strategy, or a short page that closes it, as here?\n\n---\n\n*This document is the readable source, kept up to date with Nico. The detailed version for agents will be regenerated from it.*\n", "fr": "# Le contrat d'expérience\n\n> **Brouillon du 2026-07-05 - v fondations (émotionnelle), pièce à casser.** Issu de la relecture Ismaïl + Nico : le contrat d'expérience est la conclusion de la stratégie d'expérience, pas un chapitre qui la reparaphrase. Quatre mots d'ordre et une promesse, à retenir par cœur. Une passe d'écriture humaine viendra ensuite.\n\nTout, chez Abstract, commence par un ingrédient. Un citron, une framboise, un beurre : un miracle de la nature, qui laisse en chacun un souvenir différent, lié à sa propre histoire. Notre métier tient en un geste : capturer l'instant où l'ingrédient est le plus juste - la framboise à son pic, le beurre juste avant qu'il ne brûle - et le faire vivre. Nous en sommes les messagers. Ceux qui s'en saisissent en sont les auteurs.\n\nDe toute la stratégie d'expérience, voici ce qu'il faut retenir. Quatre valeurs, un mot d'ordre chacune, et une promesse.\n\n## Les quatre valeurs\n\n**Valeur de sens : l'essence de la saveur.**\nRevenir à l'essentiel : une saveur fidèle à son ingrédient, simple à saisir, impossible à oublier.\n\n**Valeur relationnelle : éditeur de saveurs.**\nComme une maison d'édition, on met en lumière ceux qui créent : le producteur qui fait naître l'ingrédient, l'auteur qui en fait une œuvre.\n\n**Valeur transactionnelle : on redonne le pouvoir de s'exprimer par le goût.**\nOn ne vend pas une bouteille : on rend une voix.\n\n**Valeur d'expérience : donner l'opportunité aux gens d'être plus créatifs.**\nVoilà ce qu'on a sorti : amusez-vous avec.\n\n## La promesse : le contrat\n\nÀ l'endroit où les quatre valeurs se rejoignent, une phrase - celle qu'on se promet de tenir :\n\n**« Donner à chacun, en toute simplicité, le pouvoir de s'exprimer par le goût, et ouvrir de nouveaux champs créatifs. »** *(proposition à ciseler, à valider)*\n\nChacun, parce que le goût appartient à tout le monde. La simplicité, parce que l'essentiel se passe de mode d'emploi. Les nouveaux champs créatifs, parce qu'une saveur juste ouvre plus qu'elle n'impose. Et derrière la phrase, une posture de maison d'édition : nous préparons la matière et tenons la bibliothèque de la saveur ; les œuvres, elles, portent la signature de leurs auteurs.\n\n## À trancher / à challenger\n\n- La phrase-promesse : la version ci-dessus est ciselée depuis la direction posée en relecture (« si chacun avait le pouvoir de s'exprimer par le goût, en toute simplicité, il ouvrirait de nouveaux champs créatifs »). Garder la forme promesse (« donner à chacun... ») ou la forme vision (« si chacun avait... ») ?\n- Les mots d'ordre des deux premières valeurs (l'essence, l'éditeur) : sont-ce les phrases qu'on retiendra par cœur après trois lectures ? Les deux dernières sont verrouillées telles quelles.\n- La place du chapitre : conclusion intégrée à la fin de la stratégie d'expérience, ou page courte qui la referme, comme ici ?\n\n---\n\n*Ce document est la source lisible, tenue à jour avec Nico. La version détaillée pour les agents sera régénérée à partir de celle-ci.*\n"}, {"id": "brand-book/lisible/04b-personnalite-archetype.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/04b-personnalite-archetype.md", "title_en": "Brand personality & archetype", "title_fr": "Personnalité & archétype de marque", "en": "# Brand personality & archetype\n\n> Deepened v2, a piece to break. 2026-07-05. This version takes sides: an owned dominant archetype, six actionable traits, concrete implications for voice, design and hospitality. Gaps are filled with hypotheses marked \"(hypothesis to validate)\", not left blank. To be broken with Nico; fidelity to Rémy to be confirmed with him.\n\nThis chapter gives Abstract a named character: the archetype that orients the brand and the traits that make it recognizable, so that everyone - from the copy on a Monochrome to the service on the floor - embodies the same person. Abstract is the umbrella brand; the Lab (the kitchen) and the Bistrot (the lounge) are two sister expressions of that same character. And the brand speaks to everyone, professional and enthusiast alike: starting with professionals is a deployment question, not a personality one.\n\n## The dominant archetype: the Creator who hands the brush\n\nWe commit: Abstract's dominant archetype is **the Creator**, and we own it on every surface. Three proofs, not an intuition:\n\n1. **The name and the product were born from art.** The Monochromes are named after abstract art; the cocktails are composed like a screen print, one color laid over another. This is not a marketing veneer, it is the birth certificate.\n2. **The thesis fits in one sentence from Rémy**: we do not sell paintings, we sell paint. Abstract makes matter and a medium, not finished objects.\n3. **The creative gesture is singular**: it is a gesture of removal. Extract, take away the superfluous, keep only the essence of an ingredient. Few things, but what remains is powerful, and there is nowhere to hide.\n\nBut our Creator has a singularity that sets it apart from almost every brand of this archetype: **it does not create to be admired, it creates so that others create.** The finished work is never its own. It belongs to the bartender who lays the Framboise over a Negroni structure, to the chef who slips the Olive noire de Nyons into a dessert, to the enthusiast trying the Concombre at home. We make people authors, not spectators. It is a generous Creator, one who hands the brush instead of signing the painting.\n\n## The second: the Sage, in its librarian version\n\nIn support, **the Sage**. Abstract is building a standard, a library of flavor: a shared language, open knowledge, an approach to extraction that we give away instead of guarding (we share the method, we keep the exact recipe). But it is a sage at the counter, kept warm by hospitality: it welcomes, it never lectures. Depth is there on request, never imposed.\n\nProposed dosage: the Creator leads everywhere; the Sage speaks on the learning surfaces - the lexicon, the method sheets, the workshops, team training - roughly one third of the brand's expression (hypothesis to validate).\n\n## What we are not: three refusals\n\n- **Not the Magician.** Vacuum extraction looks like magic; we refuse mystery. The Beurre Monochrome evokes fat, but distillation removed the fat: we say \"evoked\", not \"present\". Our mastery is made of technique and attention, not tricks.\n- **Not the Ruler.** We do not pose as \"the reference\" that dominates its category. We build a shared standard, one everyone can find themselves in and draw from.\n- **Not the Explorer.** The most tempting wrong turn: \"the territory of flavor\" sounds like an adventure. But our gesture is the opposite of exoticism: we do not bring back an ingredient from the far side of the world, we look closely at what everyone walks past - a butter, a cucumber, a banana. The adventure is in the attention, not in the distance.\n\n## The personality in one sentence\n\n> **A precise, free creator who looks at flavor up close and hands over the brush: radical in the matter, familiar in the welcome.**\n\n## Six actionable traits\n\n1. **Precise.** Faithful to what is really there.\n   We do: name exactly (\"a bitterness that reads olive noire de Nyons\", a lemon that comes from Menton and we say so).\n   We do not: one word for two flavors, a generic \"lemon taste\", claiming as present what the process removed.\n2. **Restrained.** We remove until only the powerful remains.\n   We do: sentences and labels that stand without decoration; one idea at a time.\n   We do not: superla
