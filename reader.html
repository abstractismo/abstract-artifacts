s.** FR et EN sur chaque pièce. On écrit l'anglais d'abord, le français suit en registre fidèle : une vraie voix, pas un calque. Quelle langue se lit en premier se décide pièce par pièce : la France mène en FR, le Royaume-Uni en EN. Le Luxembourg reste à trancher ; la Belgique n'est pas encore cadrée (à soulever avec Nico et le juridique).\n\n**Loi Evin.** Le message sanitaire apparaît dès qu'un acheteur du marché français peut voir la pièce : c'est une règle de marché, pas de langue. La zone légale reste toujours nette, jamais floutée, distordue ni condensée. Elle a une taille plancher ; si elle ne rentre pas, on agrandit la pièce, on ne rétrécit jamais la mention. Et le gabarit ne remplace pas la relecture : chaque pièce passe la revue Evin avant publication.\n\n**À valider avec le référent juridique :** la formulation exacte des mentions, l'identité légale de la société, et les mentions commerciales obligatoires (TVA, accises, importateur pour le Royaume-Uni). Une case non confirmée reste non confirmée, jamais \"sans doute pas nécessaire\".\n\n## La fiche produit (une par Monochrome)\n\nUne page recto qui reprend la logique de la page web du Monochrome, recoupée pour une feuille. Elle porte : le nom de l'arôme (FR + EN), une **ligne sensible qui évoque la saveur**, la provenance et la méthode (peint à la main, distillé sous vide, sans additif), deux ou trois rôles de composition (ce que la matière fait **dans** un verre, jamais un cocktail fini), la rampe de couleur du Monochrome, quelques accords, et un appel à l'action (échantillon ou commande, avec un lien ou QR vers la suite).\n\nUn seul gabarit, autant de déclinaisons que de Monochromes : le contenu propre à chacun est rempli ailleurs. La discipline : la ligne sensible **évoque** ; les faits, eux, restent vrais et vérifiables. On évoque, on ne survend pas, et on parle du fruit, pas de l'alcool ni d'un effet. La fiche ne recopie pas le site : elle renvoie vers la profondeur (composition, rigueur), elle ne la reproduit pas.\n\n## Le dossier de presse\n\nUn passage compressé de l'histoire, pour les journalistes - un public à part entière, pas un \"client B2B\". Les sections : ce que c'est, le positionnement (la matière et le langage de la saveur), la gamme, la rigueur et la méthode, l'angle du pro crédité, les contacts, les assets (logo, photos), et la mention légale.\n\nLa règle centrale : **on n'ouvre pas sur un mythe du fondateur** (\"qui est Rémy, pourquoi il a commencé\"). On ouvre sur la saveur et l'idée de matière-langage, évoquées honnêtement. La légitimité passe par le travail - la méthode, la rigueur -, pas par une légende personnelle. C'est cohérent avec l'idée que l'avantage d'Abstract ne se résume pas à une seule personne.\n\nSi une citation du fondateur apparaît, elle est courte, attribuée, centrée sur le produit ou la méthode, jamais en ouverture ni en récit d'origine (à trancher avec Nico). Le pro crédité, lui, passe en premier : son nom d'abord, Abstract nommé comme la matière derrière, jamais la vedette, et toujours avec son consentement. Enfin, une seule histoire : le dossier et le site racontent la même chose, on n'écrit jamais deux fois la même affirmation.\n\nLa section Bistrot reste en attente : elle dépend de la frontière entre le Lab (la cuisine, où l'on fabrique) et le Bistrot (le salon, où l'on accueille), encore à trancher (orientation 2026-07-04 : socle commun + expression propre par lieu, à valider avec Rémy).\n\n## L'outil \"comment composer\" (pour la vente)\n\nUn livret que l'équipe laisse au pro pour l'aider à **composer, reproduire et transmettre** avec les Monochromes. La méthode, c'est la cascade de Rémy : le **goût** est la structure sur laquelle on s'appuie (old fashioned, sour, Negroni) ; l'**arôme** est une frise dans le temps (attaque, corps, finale, sillage) ; la **texture** est l'outillage (température, gras, CO2). Même méthode, mêmes mots que sur le site.\n\nLe point clé : **la matière, pas la recette.** Le Monochrome est de la peinture, pas un tableau fini ; les exemples illustrent la méthode, ils ne sont pas un catalogue à recopier. On rend le pro auteur. Ici, la technicité est bienvenue : c'est le moment de la plongée, pas de la découverte.\n\nCôté Evin : dès qu'il est distribué, l'outil devient public. On dit ce que la matière fait dans le verre, jamais un effet sur la personne ; le message sanitaire figure sur toute édition destinée au marché français. À confirmer avec le juridique : le cas où l'outil atteint un lecteur non-pro (laissé sur un comptoir, photographié). La forme de l'objet - pages, reliure, typographie - est la main du directeur artistique.\n\n## Ce qui reste à trancher\n\n- Mentions légales exactes, identité de la société, mentions commerciales (juridique).\n- Extension au print de la règle \"par marché\" (juridique).\n- Luxembourg (texte sanitaire) et Belgique (cadrage à ouvrir).\n- Taille du message sanitaire sur un deck : deux gabarits se contredisent (plancher fixe vs mise à l'échelle), à trancher avec Nico et le juridique.\n- Citation du fondateur dans le dossier de presse (Nico).\n- Section Bistrot : dépend de la frontière Lab/Bistrot.\n"}, {"id": "brand-book/lisible/14-gouvernance.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/14-gouvernance.md", "title_en": "Governance & maintenance", "title_fr": "Gouvernance & maintenance", "en": "# Governance & maintenance\n\n> Readable version, for human review. Status: proposal, a piece to challenge.\n>\n> This chapter says how the brand book stays true over time: how we name versions and how often we maintain it. We have removed all the agent-facing machinery (tests, thresholds, coded cross-references, reviewer names); only the rules a human needs remain.\n\n## The source is the readable document\n\nSince the review of July 4, 2026, one rule comes first: for each topic, the readable version (the one you are reading) is authoritative. The detailed, technical, agent-facing version is regenerated from it - never the other way around. We review and evolve the human document; the agent layer follows. *(2026-07-04 orientation, to validate)*\n\nThis governance covers the whole book: the common Abstract core and each of its sister expressions, Abstract Lab and Abstract Bistrot.\n\n## The four states of a document\n\nEvery brand-book document carries a single state, shown at the top:\n\n- **Proposal**: a first draft, a piece to challenge.\n- **Signed**: the topic has passed its review and its decider has ruled.\n- **Canon**: signed and merged into the shared trunk - the official book.\n- **Superseded**: a successor has taken over; we keep the old one, never delete it.\n\nTwo simple rules: no two documents may claim the same topic as canon at the same time, and a superseded document must always name, at the top, the one that replaces it.\n\n## How we number versions\n\nAt the document level, the version is its history (its git history). No hand-typed numbers: what matters is the change of state, recorded in the single decisions log.\n\nAt the level of the assembled book (the one we export for the team), a three-notch number:\n\n- **Major**: a foundation change - the platform, the experience strategy, the brand architecture. This goes through the founders.\n- **Minor**: a new topic becomes canon, or a rule is added or extended.\n- **Patch**: a factual correction that does not change the meaning.\n\nThe changelog is not written by hand: it is derived from the decisions log and the history between two versions.\n\n## When an error slips in\n\nA factual error found in a signed document is never silently smoothed over. We flag it in the document that cites it, fix it at the source, and log it. Transparency beats touch-ups.\n\n## Where things live\n\n- The repo (Git) is the engine: the only place versions live. Never on Drive.\n- Notion is the index: it lists topics and their state, with no authority over content.\n- Drive holds the readable, exported deliverables (docx, pdf), stamped with a version number. A Drive file with no number is not an official export.\n\n## The maintenance rhythm\n\n- **For every document**: a review before any change of state (at least two sets of eyes).\n- **For every new canon rule**: we check it does not contradict what is already settled (the red-thread).\n- **For every communication wave**: we run the Evin filter over everything public.\n- **Regularly**: we recheck that our commitments stay concrete and verifiable.\n- **After a major decision**: every document that relied on it updates or flags itself.\n- **Once a year** (or at a launch): a full audit - states current, successors named, no dead links, tools still running.\n\n## To settle\n\n- The line between minor and major for foundation-adjacent rules: to be sharpened with the founders.\n- The sync with Notion: kept by hand for now; we will automate only if real drift appears.\n- Export tooling (text to stamped docx/pdf): to be built at the first publication wave, not before.\n\n---\n\n*This chapter is the readable source. The detailed agent version will be regenerated from it. No jargon, no coded cross-references: that is deliberate.*\n", "fr": "# Gouvernance & maintenance\n\n> Version lisible, pour relecture humaine. Statut : proposition, pièce à casser.\n>\n> Ce chapitre dit comment le brand book reste vrai dans le temps : comment on nomme les versions et à quel rythme on l'entretient. On a retiré tout l'outillage destiné aux agents (tests, seuils, renvois codés, noms de relecteurs) ; il ne reste que les règles utiles à un humain.\n\n## La source, c'est le document lisible\n\nDepuis la relecture du 4 juillet 2026, une règle prime : pour chaque sujet, c'est la version lisible (celle que vous lisez) qui fait foi. La version détaillée, technique, destinée aux agents, est régénérée à partir d'elle - jamais l'inverse. On relit et on fait évoluer le document humain ; la couche agent suit. *(orientation 2026-07-04, à valider)*\n\nCette gouvernance couvre tout le livre : le socle commun Abstract et chacune de ses expressions sœurs, Abstract Lab et Abstract Bistrot.\n\n## Les quatre états d'un document\n\nChaque document du brand book porte un seul état, affiché en tête :\n\n- **Proposition** : un premier jet, une pièce à casser.\n- **Validé** : le sujet a passé sa relecture et son décideur a tranché.\n- **Canon** : validé et intégré au tronc commun - c'est le livre officiel.\n- **Remplacé** : un successeur a pris le relais ; on garde l'ancien, on ne le supprime jamais.\n\nDeux règles simples : jamais deux documents ne peuvent revendiquer le même sujet comme canon en même temps, et un document remplacé doit toujours nommer, en tête, celui qui le remplace.\n\n## Comment on numérote les versions\n\nAu niveau d'un document, la version c'est son historique (l'historique git). Pas de numéro saisi à la main : ce qui compte, c'est le changement d'état, noté dans le journal unique des décisions.\n\nAu niveau du livre assemblé (celui qu'on exporte pour l'équipe), un numéro à trois crans :\n\n- **Majeur** : un changement de fondation - la plateforme, la stratégie d'expérience, l'architecture de marque. Ça passe par les fondateurs.\n- **Mineur** : un nouveau sujet devient canon, ou une règle est ajoutée ou étendue.\n- **Correctif** : une correction factuelle qui ne change pas le sens.\n\nLe journal des modifications ne se rédige pas à la main : il se déduit du journal des décisions et de l'historique entre deux versions.\n\n## Quand une erreur se glisse\n\nUne erreur factuelle repérée dans un document validé n'est jamais lissée en silence. On la signale dans le document qui la cite, on la corrige à la source, et on la note au journal. La transparence prime sur le maquillage.\n\n## Où vivent les choses\n\n- Le repo (Git) est le moteur : c'est le seul endroit où vivent les versions. Jamais sur Drive.\n- Notion sert d'index : il liste les sujets et leur état, sans autorité sur le contenu.\n- Drive reçoit les livrables lisibles et exportés (docx, pdf), tamponnés d'un numéro de version. Un fichier Drive sans numéro n'est pas un export officiel.\n\n## Le rythme d'entretien\n\n- **À chaque document** : une relecture avant tout changement d'état (au moins deux regards).\n- **À chaque nouvelle règle canon** : on vérifie qu'elle ne contredit pas ce qui est déjà acquis (le fil rouge).\n- **À chaque vague de communication** : on repasse le filtre Evin sur tout ce qui est public.\n- **Régulièrement** : on revérifie que nos engagements restent concrets et vérifiables.\n- **Après une grande décision** : chaque document qui s'appuyait dessus se met à jour ou se signale.\n- **Une fois par an** (ou à un lancement) : un audit complet - états à jour, remplacements bien nommés, pas de lien mort, les outils tournent encore.\n\n## À trancher\n\n- La frontière entre mineur et majeur pour les règles proches de la fondation : à préciser avec les fondateurs.\n- La synchro avec Notion : tenue à la main pour l'instant ; on n'automatisera que si un décalage réel apparaît.\n- L'outillage d'export (du texte vers docx/pdf tamponnés) : à construire à la première vague de publication, pas avant.\n\n---\n\n*Ce chapitre est la source lisible. La version détaillée pour les agents sera régénérée à partir de lui. Pas de jargon, pas de renvois codés : c'est volontaire.*\n"}, {"id": "brand-book/lisible/15-loi-evin.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/15-loi-evin.md", "title_en": "Evin law", "title_fr": "Loi Evin", "en": "# Evin law\n\n> **Readable version, for human review. Draft of 2026-07-04.** We removed the agent tooling (test protocols, grids, coded cross-references, review roles). What remains is what actually helps: what the law lets us say and show, and how we hold to it without losing our own way of speaking.\n\nThis chapter says what the Evin law allows, and how we comply. It is not a brake on our poetry: it is the frame that keeps that poetry honest.\n\n## 1. What the Evin law is\n\nIn France, the Evin law governs advertising and communication about alcoholic beverages. For a spirits brand, any communication that can reach the public is concerned: website, packaging, out-of-home, social, menus, sales materials, public statements.\n\nThe brand speaks to everyone, the professional as much as the general public, so this rule applies everywhere, not only on \"general public\" surfaces in the narrow sense. Its spirit fits in one line: we may describe the product, we may not sell an effect, a mood, or a social promise.\n\n## 2. The principle: speak of the product, not the effect\n\nThe law sets a closed list of what a communication about alcohol may mention. Anything outside it is not a style choice, it is a legal risk. We are allowed to speak of:\n\n- origin (provenance, terroir);\n- the product's name and category;\n- composition (what is in it, and what is not: no added sugar, no additive);\n- the producer;\n- the alcoholic strength;\n- the production method (vacuum extraction, distillation);\n- how it is sold and how it is used;\n- the olfactory and flavor characteristics, as long as they stay objective and verifiable (not a \"delicious\" verdict, not an effect on body or mood).\n\nGood news: our natural register sits entirely inside this list. Purity, the absence of additives, the fidelity of the extraction, the role a Monochrome plays in a composition, the aromatic profile: all of it is authorized ground. We ask for no exception; what falls outside the list (an effect, a lifestyle, an unproven superlative) is exactly what we strip away.\n\n## 3. Evoke honestly, without breaking the rule\n\nThe sensory, poetic evocation of flavor is at the heart of the brand *(orientation 2026-07-04, to validate: this reverses the old watchword \"sell the liquid, not the legend\")*. The Evin law does not force us to write flat. It frames what we evoke, not the manner: the last category above, the flavor characteristics, is precisely the ground where our poetry is allowed to live.\n\nTwo honesties keep it clean:\n\n- **We say \"evoked,\" not \"present.\"** The butter Monochrome evokes the fat that distillation has in fact removed: we suggest it, we do not claim it is there.\n- **We speak of the fruit, not the alcohol or its effect.** We evoke the raspberry, the heart of the product, never drunkenness, euphoria, or the party. That is what keeps us both true and compliant.\n\nIn other words: we can be as evocative as we like about the aroma and the material; we never tip over into the effect.\n\n## 4. What we avoid\n\nFour families of words and stagings are banned. The rule is not to find a softer synonym for the forbidden word: it is to steer the sentence back to the product (the material, the method, the aroma). If a sentence survives only by hiding the forbidden idea under other words, we cut it.\n\n- **Effect and state**: drunkenness, euphoria, \"let go,\" intoxicating, \"goes down easy.\" We speak of precision, purity, composition.\n- **Incitement**: irresistible, addictive, \"one more,\" \"another round.\" We redirect to the extraction, the balance, the profile.\n- **Lifestyle**: the party, seduction, social success, the toast. We speak of the method and the material, or we cut.\n- **Health**: \"good for you,\" relaxing, stress relief. Banned outright, with no possible softening.\n\nThe surfaces the end customer sees (menu, in-venue signage) are the most exposed: that is where we are strictest, never more relaxed.\n\n## 5. The health warning\n\nThe mandatory legal message, carried verbatim on the supports (this is the French statutory wording, not translated):\n\n> L'abus d'alcool est dangereux pour la santé. À consommer avec modération.\n\nIt is permanently present on every page of the French storefront (in the footer, not hidden in a pop-up), and on any communication support aimed at the French market (an ad, a sell sheet, a deck shown to a buyer). The rule is judged by market, not by language: an English-language page served from the French storefront still carries the French text.\n\n## 6. Blur, imagery, and the wordmark\n\nOur visual language rests on distortion and blur. That is also its sensitive point: a blur can read as vision altered by alcohol. This is not a ban, it is a risk to frame.\n\n- **Photography**: we never show the act of drinking, the signs of drunkenness (glazed eyes, slumped posture), or the party or seduction tied to alcohol. A blur that, once shown to a few people, reads as \"drunk vision\" rather than as a stylistic choice does not pass. A photo of a bottle on its own is the least risky case; a bar-counter scene with people is the most watched.\n- **Wordmark**: the retained path is a directional flow, an assumed blur. The Evin risk (a blur read as drunkenness) must pass a legal assessment. Decision pending: to frame, not to forbid (to validate with the legal referent).\n\n## 7. The working rule\n\nOne simple rule: anything that will be seen or heard outside the team passes an Evin review before publication. We keep a record of what was reviewed and cleared; a support without that record does not count as cleared.\n\nReview lead: Ismaïl. A named legal referent is still missing: that is the biggest open piece of this chapter.\n\n## 8. Still to decide\n\n- **Name a legal referent.** They confirm the exact wording of the legal list, settle the blurred-wordmark case, and frame markets outside France.\n- **The legal assessment of the wordmark** (directional flow, assumed blur): decision pending.\n- **Other markets** (the UK and beyond): each country has its own alcohol-advertising rules, to be worked out when we go there.\n\n---\n\n*This document is the readable source, kept up to date with the team. The detailed agent version will be regenerated from it, never the other way around.*\n", "fr": "# Loi Evin\n\n> **Version lisible, pour relecture humaine. Brouillon du 2026-07-04.** On a retiré l'outillage pour agents (protocoles de test, grilles, renvois codés, rôles de relecture). Il reste ce qui sert vraiment : ce que la loi nous autorise à dire et à montrer, et comment on s'y tient sans rien perdre de notre manière.\n\nCe chapitre dit ce que la loi Evin nous permet, et comment on la respecte. Ce n'est pas un frein à notre poésie : c'est le cadre dans lequel elle reste juste.\n\n## 1. Ce qu'est la loi Evin\n\nEn France, la loi Evin encadre la publicité et la communication sur les boissons alcoolisées. Pour une marque de spiritueux, toute communication qui peut atteindre le public est concernée : site, packaging, affichage, réseaux, menus, supports de vente, prises de parole.\n\nLa marque parle à tout le monde, au pro comme au grand public ; cette règle s'applique donc partout, pas seulement sur les surfaces « grand public » au sens étroit. Son esprit tient en une phrase : on a le droit de décrire le produit, on n'a pas le droit de vendre un effet, une ambiance ou une promesse sociale.\n\n## 2. Le principe : parler du produit, pas de l'effet\n\nLa loi fixe une liste fermée de ce qu'une communication sur l'alcool peut mentionner. Tout ce qui en sort n'est pas un choix de style, c'est un risque juridique. On a le droit de parler de :\n\n- l'origine (provenance, terroir) ;\n- le nom et la catégorie du produit ;\n- la composition (ce qu'il y a, et ce qu'il n'y a pas : sans sucre ajouté, sans additif) ;\n- le producteur ;\n- le degré d'alcool ;\n- la méthode de fabrication (l'extraction sous vide, la distillation) ;\n- la façon dont on le vend et dont on l'utilise ;\n- les caractéristiques olfactives et de saveur, tant qu'elles restent objectives et vérifiables (pas un jugement « délicieux », pas un effet sur le corps ou l'humeur).\n\nBonne nouvelle : notre registre naturel tient tout entier dans cette liste. La pureté, l'absence d'additif, la fidélité de l'extraction, le rôle d'un Monochrome dans une composition, le profil aromatique : tout ça est du terrain autorisé. On ne demande aucune exception ; ce qui est hors liste (un effet, un style de vie, un superlatif non prouvé) est exactement ce qu'on retire.\n\n## 3. Évoquer juste, sans enfreindre\n\nL'évocation sensible et poétique de la saveur est au cœur de la marque *(orientation 2026-07-04, à valider : on renverse l'ancien mot d'ordre « vendre le liquide, pas la légende »)*. La loi Evin ne nous oblige pas à écrire plat. Elle encadre ce qu'on évoque, pas la manière : la dernière catégorie ci-dessus, les caractéristiques de saveur, est justement le terrain où notre poésie a le droit de vivre.\n\nDeux honnêtetés la gardent propre :\n\n- **On dit « évoqué », pas « présent ».** Le Monochrome beurre évoque le gras que la distillation a justement retiré : on le suggère, on ne prétend pas qu'il est là.\n- **On parle du fruit, pas de l'alcool ni de son effet.** On évoque la framboise, cœur du produit, jamais l'ivresse, l'euphorie ou la fête. C'est ce qui nous garde à la fois justes et conformes.\n\nAutrement dit : on peut être aussi évocateurs qu'on veut sur l'arôme et la matière ; on ne bascule jamais du côté de l'effet.\n\n## 4. Ce qu'on évite\n\nQuatre familles de mots et de mises en scène sont à bannir. La règle n'est pas de trouver un synonyme plus doux au mot interdit : c'est de ramener la phrase vers le produit (la matière, la méthode, l'arôme). Si une phrase ne survit qu'en cachant l'idée interdite sous d'autres mots, on la coupe.\n\n- **L'effet et l'état** : ivresse, euphorie, « lâchez-vous », enivrant, « ça se boit tout seul ». On parle de précision, de pureté, de composition.\n- **L'incitation** : irrésistible, addictif, « encore un », « une tournée ». On redirige vers l'extraction, l'équilibre, le profil.\n- **Le style de vie** : la fête, la séduction, la réussite sociale, le toast. On parle de la méthode et de la matière, ou on coupe.\n- **La santé** : « bon pour la santé », relaxant, anti-stress. Interdit sec, aucun adoucissement possible.\n\nLes surfaces vues par le client final (menu, signalétique en lieu) sont les plus exposées : c'est là qu'on est le plus strict, jamais le plus relâché.\n\n## 5. Le message sanitaire\n\nLe message légal obligatoire, à porter tel quel sur les supports (c'est la formulation légale française, on ne la traduit pas) :\n\n> L'abus d'alcool est dangereux pour la santé. À consommer avec modération.\n\nIl est présent en permanence sur toutes les pages de la boutique française (en pied de page, pas caché dans une fenêtre surgissante), et sur tout support de communication destiné au marché français (annonce, fiche de vente, deck montré à un acheteur). La règle se juge par marché, pas par langue : une page en anglais servie depuis la boutique française porte quand même le texte français.\n\n## 6. Le flou, l'image et le logotype\n\nNotre langage visuel repose sur la distorsion et le flou. C'est aussi son point sensible : un flou peut se lire comme une vision troublée par l'alcool. Ce n'est pas une interdiction, c'est un risque à cadrer.\n\n- **Photo** : on ne montre jamais l'acte de boire, les signes d'ivresse (regard vitreux, posture avachie), ni la fête ou la séduction associées à l'alcool. Un flou qui, une fois montré à quelques personnes, se lit comme « vision d'ivrogne » plutôt que comme un choix esthétique ne passe pas. Une photo de bouteille seule est le cas le moins risqué ; une scène de comptoir avec des gens est le plus surveillé.\n- **Logotype** : la piste retenue est un flux directionnel, un flou assumé. Le risque Evin (un flou lu comme ivresse) doit passer une évaluation juridique. Décision en attente : à cadrer, pas à proscrire (à valider avec le référent juridique).\n\n## 7. La règle de travail\n\nUne seule règle simple : toute chose qui sera vue ou entendue en dehors de l'équipe passe une relecture Evin avant publication. On garde une trace de ce qui a été relu et validé ; un support sans cette trace n'est pas considéré comme validé.\n\nResponsable de la relecture : Ismaïl. Il manque encore un référent juridique nommé : c'est la plus grosse pièce ouverte de ce chapitre.\n\n## 8. À trancher\n\n- **Nommer un référent juridique.** Il confirme la formulation exacte de la liste légale, tranche le cas du logotype flou et cadre les marchés hors France.\n- **L'évaluation juridique du logotype** (flux directionnel, flou assumé) : décision en attente.\n- **Les autres marchés** (Royaume-Uni et au-delà) : chaque pays a ses propres règles de publicité sur l'alcool, à instruire quand on y va.\n\n---\n\n*Ce document est la source lisible, tenue à jour avec l'équipe. La version détaillée pour les agents sera régénérée à partir de celle-ci, jamais l'inverse.*\n"}];

// ---------- markdown -> html (inline, self-contained) ----------
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function inlineMd(t){
  // t is already HTML-escaped
  return t
    .replace(/`([^`]+)`/g, (m,c)=>'<code>'+c+'</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function renderMd(md){
  if(!md) return '<div class="empty">Pas de version dans cette langue pour ce document.</div>';
  // protect fenced code
  const code=[];
  md = md.replace(/```[a-z]*\n?([\s\S]*?)```/g, (m,c)=>{code.push(c.replace(/\n$/,''));return '\nCODEBLK'+(code.length-1)+'\n';});
  const lines = md.split('\n');
  let out=[], i=0;
  const isTableSep = s => /^\s*\|?[\s:|-]+\|[\s:|-]*$/.test(s) && s.includes('-');
  while(i<lines.length){
    let line = lines[i];
    // code placeholder
    let cm = line.match(/^CODEBLK(\d+)\s*$/);
    if(cm){ out.push('<pre><code>'+esc(code[+cm[1]])+'</code></pre>'); i++; continue; }
    // blank
    if(/^\s*$/.test(line)){ i++; continue; }
    // heading
    let h = line.match(/^(#{1,6})\s+(.*)$/);
    if(h){ const n=h[1].length; out.push('<h'+n+'>'+inlineMd(esc(h[2]))+'</h'+n+'>'); i++; continue; }
    // hr
    if(/^\s*(---+|\*\*\*+)\s*$/.test(line)){ out.push('<hr>'); i++; continue; }
    // table: current line has |, next line is a separator
    if(line.includes('|') && i+1<lines.length && isTableSep(lines[i+1])){
      const parseRow = s => s.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(c=>c.trim());
      const head = parseRow(line); i+=2;
      let rows=[];
      while(i<lines.length && lines[i].includes('|') && !/^\s*$/.test(lines[i])){ rows.push(parseRow(lines[i])); i++; }
      let t='<div class="tablewrap"><table><thead><tr>'+head.map(c=>'<th>'+inlineMd(esc(c))+'</th>').join('')+'</tr></thead><tbody>';
      for(const r of rows){ t+='<tr>'+r.map(c=>'<td>'+inlineMd(esc(c))+'</td>').join('')+'</tr>'; }
      t+='</tbody></table></div>'; out.push(t); continue;
    }
    // blockquote (consecutive > lines)
    if(/^\s*>/.test(line)){
      let buf=[];
      while(i<lines.length && /^\s*>/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,'')); i++; }
      out.push('<blockquote>'+renderMd(buf.join('\n'))+'</blockquote>'); continue;
    }
    // list (consecutive - * or 1.)
    if(/^\s*([-*]|\d+\.)\s+/.test(line)){
      const ordered = /^\s*\d+\.\s/.test(line);
      let items=[];
      while(i<lines.length && /^\s*([-*]|\d+\.)\s+/.test(lines[i])){
        let it = lines[i].replace(/^\s*([-*]|\d+\.)\s+/,'');
        i++;
        // continuation lines (indented, not a new item/blank)
        while(i<lines.length && /^\s+\S/.test(lines[i]) && !/^\s*([-*]|\d+\.)\s+/.test(lines[i]) && !/^\s*$/.test(lines[i])){
          it += ' ' + lines[i].trim(); i++;
        }
        items.push('<li>'+inlineMd(esc(it))+'</li>');
      }
      out.push((ordered?'<ol>':'<ul>')+items.join('')+(ordered?'</ol>':'</ul>')); continue;
    }
    // paragraph (consecutive normal lines)
    let buf=[line]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#{1,6})\s/.test(lines[i]) && !/^\s*>/.test(lines[i])
          && !/^\s*(---+|\*\*\*+)\s*$/.test(lines[i]) && !/^\s*([-*]|\d+\.)\s+/.test(lines[i])
          && !/^CODEBLK\d+/.test(lines[i]) && !(lines[i].includes('|') && i+1<lines.length && isTableSep(lines[i+1]))){
      buf.push(lines[i]); i++;
    }
    out.push('<p>'+inlineMd(esc(buf.join(' ')))+'</p>');
  }
  return out.join('\n');
}

// ---------- nav ----------
function buildNav(){
  const nav=document.getElementById('nav');
  let html='', lastG=null;
  for(const d of DOCS){
    if(d.group!==lastG){ html+='<div class="grp" data-g="'+d.group+'">'+d.group+'</div>'; lastG=d.group; }
    const title = LANG==='fr'? d.title_fr : d.title_en;
    html+='<button class="navitem" data-id="'+encodeURIComponent(d.id)+'"><span class="tt">'+esc(title)+'</span><span class="fn">'+d.file+'</span></button>';
  }
  nav.innerHTML=html;
  nav.querySelectorAll('.navitem').forEach(b=>b.onclick=()=>{ select(decodeURIComponent(b.dataset.id)); if(window.innerWidth<=820) document.getElementById('side').classList.remove('open'); });
  document.getElementById('count').textContent = DOCS.length+' documents · bilingue EN/FR';
}
function refreshNavTitles(){
  document.querySelectorAll('.navitem').forEach(b=>{
    const d=DOCS.find(x=>x.id===decodeURIComponent(b.dataset.id));
    b.querySelector('.tt').textContent = LANG==='fr'? d.title_fr : d.title_en;
  });
  document.querySelectorAll('.navitem').forEach(b=>b.classList.toggle('on', decodeURIComponent(b.dataset.id)===curId));
}
function select(id){
  curId=id; const d=DOCS.find(x=>x.id===id); if(!d) return;
  const md = LANG==='fr'? d.fr : d.en;
  document.getElementById('doc').innerHTML = renderMd(md);
  document.getElementById('crumb').innerHTML = '<b>'+esc(d.group)+'</b> &nbsp;/&nbsp; '+esc(d.file);
  document.getElementById('main').scrollTop=0;
  refreshNavTitles();
  try{ location.hash = encodeURIComponent(id); }catch(e){}
}
function setLang(l){
  LANG=l;
  document.getElementById('btFR').classList.toggle('on', l==='fr');
  document.getElementById('btEN').classList.toggle('on', l==='en');
  document.documentElement.lang = l;
  if(curId) select(curId); else refreshNavTitles();
}
// search
document.getElementById('q').addEventListener('input', e=>{
  const q=e.target.value.trim().toLowerCase();
  let shownByGroup={};
  document.querySelectorAll('.navitem').forEach(b=>{
    const d=DOCS.find(x=>x.id===decodeURIComponent(b.dataset.id));
    const hay=((LANG==='fr'?d.title_fr:d.title_en)+' '+d.file+' '+(LANG==='fr'?d.fr:d.en)).toLowerCase();
    const show = !q || hay.includes(q);
    b.classList.toggle('hide', !show);
    if(show) shownByGroup[d.group]=true;
  });
  document.querySelectorAll('.grp').forEach(g=>g.classList.toggle('hide', q && !shownByGroup[g.dataset.g]));
});
document.getElementById('btFR').onclick=()=>setLang('fr');
document.getElementById('btEN').onclick=()=>setLang('en');
document.getElementById('btConfort').onclick=function(){ document.body.classList.toggle('dense'); this.classList.toggle('on', !document.body.classList.contains('dense')); };
document.getElementById('burger').onclick=()=>document.getElementById('side').classList.toggle('open');
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('abx-theme',t);}catch(e){}const b=document.getElementById('btTheme');if(b){b.innerHTML=t==='dark'?'☀':'◐';b.classList.toggle('on',t==='dark');}}
applyTheme((function(){try{return localStorage.getItem('abx-theme');}catch(e){return null;}})()||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
document.getElementById('btTheme').onclick=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

// init
buildNav();
const start = decodeURIComponent((location.hash||'').replace(/^#/,'')) || DOCS[0].id;
select(DOCS.find(d=>d.id===start)? start : DOCS[0].id);
</script>
</html>
