ivron jaune, Concombre, Olive noire de Nyons, Banane).\n- **Medium, paint, material** = our category. We sell material and tools that anyone makes their own, not finished objects, and never \"syrup\", \"flavoring\", or \"additive\".\n- **Evin:** the product is an ingredient and a medium. Alcohol, drunkenness, excess are never the subject (\"no development without alcohol\" is a production fact, not a comms theme).\n\n## One voice, two expressions\n\nAbstract speaks with a single voice, expressed in two sister forms. They share a common base (the same editorial DNA: understated, translating rather than describing, evoking honestly) and each keeps its own living expression:\n- **The Lab** speaks from the making: to the maker, precise, led by the material and the method.\n- **The Bistrot** speaks from the welcome: to the guest, with the warmth of the place, without ever falling into the golden-bistro kitsch (which we subvert rather than embrace) and without losing the sobriety of the base.\n\nAn Abstract Berlin, tomorrow, would not copy the Lyon bistro: it would be a local reinterpretation (the \"sense of place\"). The older model (\"locked core, the venue flexes only the frame\") softens here into \"common base + own expression\" (architecture to confirm with Rémy).\n\n## Tone by channel\n\nThe brand speaks to everyone: to the professional as much as to the general public. Starting with B2B in 2025 is a deployment question (budget, volume), not a definition: we do not shrink the voice. The tone, though, adjusts.\n\n- **Trade (deck, sell sheet, email):** highest technicality, method and provenance lead.\n- **Newsletter:** warmer, still restrained, one idea per send.\n- **Instagram:** visual-led, minimal caption, one translated line plus the invitation.\n- **Product site:** the pattern below.\n\n## Writing a Monochrome\n\nWe describe the material and hand it over; we never dictate the drink or the dish. The pattern: the Monochrome's name; one sensory line (flavor rendered through color); one provenance and method line; the invitation to compose.\n\n> **Framboise Monochrome.** A sweetness that reads as deep raspberry-pink. Aroma hand-painted on the bottle, color sampled from the paint. Compose with flavor.\n\nThe copy stops at the material and the invitation: no ratio, no occasion imposed. The maker composes.\n\n## Words to favor, words to avoid\n\n**Favor:** medium, compose, aroma, note, extraction, method, provenance, sampled, Monochrome, material, hand-painted, translate, flavor, scale.\n\n**Avoid:**\n- *hype:* revolutionary, disruptive, game-changing, elevate, luxury, premium, the finest, delicious, gourmet, \"explosion of flavor\", \"unforgettable\".\n- *category error:* syrup, flavoring, additive.\n- *generated-text tells:* \"in today's fast-paced world\", \"unlock\", \"seamless\", \"at the end of the day\", adjective triplets, hedging filler.\n- *Evin:* any mention of drunkenness, excess, or health benefit, any incitement to consume.\n\n## How we validate\n\nNothing ships without a simple pass: copy drafted, read against the five principles, run through the Evin filter if it is comms-facing, settled in English then rendered in French, then validated. This chapter and the lexicon are living: new words are added as they arise, and the copy library grows only with validated lines.\n\n**To settle:** the set of adjectives (should connection be named explicitly?); the status of French (faithful register or co-authoritative voice for the venues, to discuss with Nico); the Lab/Bistrot architecture and the \"flavor / medium\" vocabulary, to reconcile with the platform and validate with Rémy.\n", "fr": "# Voix & ton\n\nCe chapitre dit comment Abstract écrit et parle : les règles de langage qui font qu'un texte \"sonne\" Abstract, quelle que soit la personne qui l'écrit. La voix ne change pas ; le ton s'ajuste au canal et au public.\n\n> Statut : brouillon lisible, pièces à casser. Il reprend les orientations de relecture du 2026-07-04, qui priment sur les versions plus anciennes. Les points signalés \"à valider\" passent par Rémy.\n\n## D'où vient la voix\n\nLa voix n'est pas une affaire de goûts stylistiques. C'est la forme, à l'échelle de la phrase, de ce que la marque est déjà. Chaque principe de voix découle d'un principe d'expérience : on dit moins parce qu'on révèle en retirant ; on traduit plutôt qu'on décrit ; on tend le pinceau ; on évoque juste ; on écrit en humains parce que la relation fait partie du produit.\n\nTrois repères tiennent le tout : l'essence, \"le medium de la saveur\" (orientation 2026-07-04 : saveur plutôt que goût, à réconcilier avec la plateforme) ; la signature, \"À vous de composer.\" ; et une ligne de manifeste, \"On fait la peinture. À vous l'œuvre.\"\n\n## Les cinq principes de voix\n\n**1. En dire moins.** Phrases courtes, déclaratives. Des noms concrets plutôt que des adjectifs. Une idée par phrase. Ce qu'on n'écrit pas laisse parler le produit.\n- À faire : \"Un arôme de beurre. Prélevé sur la peinture. Composez.\"\n- À éviter : empiler les superlatifs et les points d'exclamation (\"une explosion de saveur inoubliable !\"). Repère simple : une phrase doit tenir debout une fois tous ses adjectifs retirés.\n\n**2. Traduire, pas décrire.** On ne vante pas, on donne un ancrage sensible : la saveur rendue par la couleur, la forme, la texture. L'évocation poétique est centrale - c'est notre terrain. Mais elle reste simple et partageable, jamais un jargon de dégustation ni un radar technique de plus.\n- À faire : \"Une acidité qui se lit jaune citron.\" \"Une note amère, couleur olive noire.\"\n- À éviter : \"délicieux\", \"gourmet\", \"une sensation gustative\" - l'éloge générique qui n'apprend rien.\n\n**3. Tendre le pinceau.** On s'adresse à celui qui crée - pro ou amateur - et on l'invite à composer. On fournit la matière, les outils et le langage ; l'œuvre est à lui. On rend les gens auteurs, pas spectateurs. Abstract n'est jamais le héros de la phrase.\n- À faire : \"Composez avec.\" \"Votre medium.\" \"À vous l'œuvre.\"\n- À éviter : dicter le cocktail ou le plat final, parler de haut, se mettre en vedette (\"notre produit primé...\").\n\n**4. Évoquer juste.** Notre jeu n'est pas de chiffrer un citron par ses grammes d'acide : c'est d'en rendre l'évocation. Deux honnêtetés la gardent propre. D'abord, on dit \"évoqué\", pas \"présent\" : le Monochrome Beurre évoque le gras, mais la distillation l'a retiré - on le suggère, on ne prétend pas qu'il est là. Ensuite la loi Evin : on parle du fruit lui-même (la framboise, cœur du produit), jamais de l'alcool ni d'un effet - ce qui nous garde à la fois justes et conformes. Ceci inverse une version plus ancienne (\"montrer la mesure\", \"vendre le liquide pas la légende\"), jugée à contre-sens : la précision reste une valeur, mais elle sert l'évocation, elle ne la remplace pas.\n\n**5. Fait par des humains.** Signé, chaleureux, mais précis. On assume les mots, on a un point de vue. C'est notre garde-fou anti-texte de machine : pas de ton corporate évasif, pas de lissage générique.\n- À faire : le \"on\", une attribution, une voix qu'une personne signerait.\n- À éviter : le registre plat, interchangeable, d'une copy générée.\n\n## La personnalité en trois mots\n\n**Précis. Sobre. Généreux.** Et ce qu'on n'est pas : précis sans être clinique ni froid ; sobre sans être terne ni évasif ; généreux sans être effusif ni trop commercial. La chaleur et la connexion passent par l'adresse (on tend le pinceau) et par le fait d'écrire en humains, plus que par un quatrième adjectif. Le jeu exact reste à trancher avec Nico.\n\n## Comment on écrit\n\n- **L'anglais fait foi, le français suit fidèlement.** La copy se pense d'abord en anglais (le déploiement est international), puis le français en donne un registre fidèle : idiomatique, jamais un calque littéral. Le français reste de premier rang pour les lieux et l'héritage français.\n- **Adresse :** le \"vous\", par respect du métier et cohérence avec \"À vous de composer.\"\n- **Technicité modulée, jamais édulcorée :** on peut aller loin et pointu avec un public averti, rester simple avec un débutant, sans jamais rendre bête.\n- **Ponctuation :** pas de tiret cadratin (on utilise \" - \" ou le point) ; préférer les points aux virgules ; pas d'empilement de \"!\" ni de capitales d'emphase.\n\n## Comment on nomme les choses\n\n- **Abstract** = la marque chapeau. Toujours avec une majuscule.\n- **Abstract Lab** = la cuisine, là où on fabrique. **Abstract Bistrot** = le salon, là où on accueille (les lieux, Lyon et Paris). \"Abstract Bistrot\" à la première mention, \"le Bistrot\" ensuite. Lab et Bistrot sont deux expressions sœurs, pas une maison mère et sa filiale (orientation 2026-07-04, à valider avec Rémy).\n- **Monochrome** = l'unité produit, avec une majuscule, nommée par son arôme : le Monochrome Beurre, le Monochrome Framboise (EN : the Beurre Monochrome). Le nom d'arôme garde sa forme française dans les deux langues (Beurre, Framboise, Citron de Menton, Poivron jaune, Concombre, Olive noire de Nyons, Banane).\n- **Medium, peinture, matière** = notre catégorie. On vend de la matière et des outils que chacun s'approprie, pas des objets finis, et surtout jamais du \"sirop\", de l'\"aromatisant\" ou de l'\"additif\".\n- **Evin :** le produit est un ingrédient et un medium. L'alcool, l'ivresse, l'excès ne sont jamais le sujet (\"pas de développement sans alcool\" est une contrainte de production, pas un thème de comms).\n\n## Une voix, deux expressions\n\nAbstract parle d'une seule voix, déclinée en deux expressions sœurs. Elles partagent un socle commun (le même ADN éditorial : sobre, traduit plutôt que décrit, évoqué juste) et gardent chacune une expression propre et vivante :\n- **Le Lab** parle depuis la fabrication : au créateur, précis, porté par la matière et la méthode.\n- **Le Bistrot** parle depuis l'accueil : au client, avec la chaleur du lieu, sans jamais tomber dans le kitsch du vieux bistrot doré (qu'on détourne plutôt qu'on assume) et sans perdre la sobriété du socle.\n\nUn Abstract Berlin, demain, ne copierait pas le bistrot lyonnais : il en serait une réinterprétation locale (le \"sense of place\"). L'ancien modèle \"cœur verrouillé, le lieu ne flexe que le cadre\" s'assouplit ici en \"socle commun + expression propre\" (architecture à confirmer avec Rémy).\n\n## Le ton selon le canal\n\nLa marque parle à tout le monde : au professionnel comme au grand public. Commencer par le B2B en 2025 est une question de déploiement (budget, volume), pas de définition : on ne rétrécit pas la voix. Le ton, lui, s'ajuste.\n\n- **Trade (deck, sell sheet, email) :** technicité maximale, la méthode et la provenance mènent.\n- **Newsletter :** plus chaleureux, toujours retenu, une idée par envoi.\n- **Instagram :** porté par le visuel, légende minimale, une ligne traduite plus l'invitation.\n- **Site produit :** le patron ci-dessous.\n\n## Écrire un Monochrome\n\nOn décrit la matière et on la transmet ; on ne dicte jamais le cocktail ni le plat. Le patron : le nom du Monochrome ; une ligne sensible (la saveur rendue par la couleur) ; une ligne de provenance et de méthode ; l'invitation à composer.\n\n> **Monochrome Framboise.** Une douceur qui se lit rose framboise profond. Arôme peint à la main sur la bouteille, couleur prélevée sur la peinture. À vous de composer.\n\nLa copy s'arrête à la matière et à l'invitation : ni dosage, ni occasion imposés. C'est le créateur qui compose.\n\n## Mots à privilégier, mots à éviter\n\n**À privilégier :** medium, composer, arôme, note, extraction, méthode, provenance, prélevé, Monochrome, matière, peint à la main, traduire, saveur, échelle.\n\n**À éviter :**\n- *le hype :* révolutionnaire, disruptif, qui change la donne, sublimer, luxe, premium, le meilleur, délicieux, gourmet, \"explosion de saveur\", \"inoubliable\".\n- *l'erreur de catégorie :* sirop, aromatisant, additif.\n- *les tics de texte généré :* \"dans le monde trépidant d'aujourd'hui\", \"débloquer\", \"fluide\", \"au final\", les triplets d'adjectifs, le remplissage évasif.\n- *Evin :* toute mention d'ivresse, d'excès ou de bénéfice santé, toute incitation à consommer.\n\n## Comment on valide\n\nRien ne sort sans un passage simple : copy rédigée, relue à l'aune des cinq principes, passée au filtre Evin si elle est destinée à communiquer, arrêtée en anglais puis déclinée en français, enfin validée. Ce chapitre et le lexique sont vivants : les nouveaux mots s'ajoutent au fil de l'eau, la bibliothèque de copy ne grandit qu'avec des lignes validées.\n\n**À trancher :** le jeu d'adjectifs (faut-il nommer la connexion explicitement ?) ; le statut du français (registre fidèle ou voix co-autoritative pour les lieux, à voir avec Nico) ; l'architecture Lab/Bistrot et le vocabulaire \"saveur / medium\", à réconcilier avec la plateforme et à valider avec Rémy.\n"}, {"id": "brand-book/lisible/08-typographie.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/08-typographie.md", "title_en": "Typography", "title_fr": "Typographie", "en": "# Typography\n\nThis chapter says how Abstract writes: which typefaces, for which voice, and the few rules that keep the text clear and honest everywhere - on screen, in print, on a label.\n\n## The idea: two voices\n\nAbstract writes with two typefaces, two complementary voices.\n\n- **A precise sans serif**: the factual voice. It carries running text, interfaces, captions, numbers, data, and every legal notice. Neutral and legible, it steps back so the content leads. It is the \"standard\" side of the brand, the part that earns trust.\n- **An expressive serif**: the sensory voice, the voice of evocation. It carries headlines, the manifesto, the essence, the line that translates a flavor. Drawn and warm, it shows a human wrote this. We use it sparingly, so it lands.\n\nThis duality comes from the essence, \"the medium of flavor,\" which already holds two meanings: the material (the standard, the library of flavor) and the maker's act (composition, the studio). The sans carries the material; the serif carries the act. The sensory evocation of flavor is central to how the brand speaks, and the serif is what carries it.\n\nWhy a serif and a sans, rather than something else? A single sans would read cold and clinical, with no home for the human hand. Two sans faces are the fallback if no suitable serif can be found. A serif in body copy would tire the reader. Serif + sans is the right balance.\n\n## The image distorts, the words do not\n\nThe rule that overrides everything else: **the text stays sharp.** Distortion is reserved for the image; the text is never blurred, warped, or animated. It sits sharp, on its own layer, over or beside the worked image.\n\nThe only exception is the logo (the word \"Abstract\" itself), which carries its own designed motion. That license extends to no other text.\n\nThis is not just a matter of style. A word that is legible but blurred could read as impaired legibility - a risk under the Evin law. Keeping the words sharp keeps the brand both trustworthy and compliant, while the image is free to be radical.\n\n## Who writes what\n\nAssignment is by **role**, not by taste. Every piece of text sits in one voice.\n\n- **The sans** carries: running text, interfaces, captions, prices, numbers, technical mentions, and **every legal, allergen, and Evin notice.** A factual or legal statement is never carried by the serif alone.\n- **The serif** carries: large headlines, the manifesto, the essence and signature, the line that evokes a flavor. Used sparingly.\n\nOn Evin, the logic is simple: we speak of the **fruit** (the raspberry), never of the alcohol or an effect; and we say \"evoked,\" not \"present\" (the butter evokes the fat that distillation removed). Mandatory notices always live in the sans, sharp and at a guaranteed size.\n\n## Choosing the two typefaces\n\nThe pair is not chosen yet (to settle, a creative call to validate with Rémy and Nico). What is fixed is the criteria each face must meet:\n\n- The serif must read editorial and distinctive (not a template serif), hold a large headline, and stay sharp even small.\n- The sans must be neutral and highly legible, with tabular figures (for tables and price lists) and excellent behavior at small sizes.\n- Both must cover French (accents, the œ ligature, guillemets), with a real web and print license path.\n\nA short candidate list exists, offered as pieces to challenge, never as the answer: on the serif side, editorial faces with strong contrast; on the sans side, neutral grotesques with a wide weight range. The final choice is made on specimens, by the art director's eye.\n\n## Scale and hierarchy\n\nThe brand has a proportional size scale, from the large headline down to the legal notice, expressed in ratios (not fixed pixels) so it holds even before the typefaces are chosen.\n\nEach level has its voice: large headlines in the serif; body, captions, and legal notices in the sans; the levels in between follow the role of the content. The logo is off this scale: it has its own size.\n\n## The legal floor and legibility\n\nLegal and Evin notices have a **minimum size** we never go below, set by law and by accessibility. We do not shrink them, distort them, or set them in the serif. On packaging, labeling law imposes a minimum height (on the order of 1.2mm); if the block does not fit, we enlarge the label, never the notice. The exact minimum is still to confirm with legal counsel, per market.\n\nOver an image or a photo, the text must stay readable: enough contrast, or else a plate or panel behind it. On screen, the size adapts fluidly (mobile, 200% zoom) without ever breaking legibility; in print, the leading tightens a little, the hierarchy stays the same. If the web font fails to load, a system font takes over - and legal notices stay readable in every case. Sizes are named by role, authored once in the repo and pushed to web, print, and Figma, never hand-copied.\n\n## A shared base, living expressions\n\nAbstract, Abstract Lab, and Abstract Bistrot share the same type system: the same two typefaces, the same scale, the same sharp-text rule, the same named sizes. It is this shared base that makes them feel part of the same galaxy.\n\nEach expression keeps its own life: it can lead with one voice or the other depending on the surface (a menu, a sign), play with warmth and weights, run its own local menus. An Abstract Berlin, tomorrow, would be a local reinterpretation, not a copy. What no one does: invent a third typeface, invert the roles, or shrink the legal floor. (The \"shared base + sister expressions\" architecture: 2026-07-04 orientation, to validate with Rémy.)\n\n## Still to settle\n\n- The choice of the two typefaces (specimens, license), to validate with Rémy and Nico.\n- The exact scale ratio and final sizes, once the typefaces are chosen.\n- The legal minimum size for notices (Evin, labeling), to confirm per market with legal counsel.\n- The \"shared base + sister expressions\" architecture (to validate with Rémy).\n", "fr": "# Typographie\n\nCe chapitre dit comment Abstract écrit: quelles polices, pour quelle voix, et les quelques règles qui gardent le texte clair et juste partout - à l'écran, à l'imprimé, sur une étiquette.\n\n## Le principe: deux voix\n\nAbstract écrit avec deux caractères, deux voix complémentaires.\n\n- **Une linéale précise** (sans serif): la voix factuelle. Elle porte le texte courant, les interfaces, les légendes, les chiffres, les données et toutes les mentions légales. Neutre et lisible, elle s'efface pour laisser parler le contenu. C'est le côté \"standard\" de la marque, la part qui inspire confiance.\n- **Une serif expressive**: la voix sensible, celle de l'évocation. Elle porte les titres, le manifeste, l'essence, la ligne qui traduit une saveur. Dessinée, chaleureuse, elle montre qu'un humain a écrit là. On l'emploie peu, pour qu'elle frappe.\n\nCette dualité vient de l'essence, \"le médium de la saveur\", qui a déjà deux sens: la matière (le standard, la bibliothèque de la saveur) et le geste d'auteur (la composition, l'atelier). La linéale porte la matière; la serif porte le geste. L'évocation sensible de la saveur est centrale dans la voix de la marque, et c'est la serif qui la porte.\n\nPourquoi une serif et une linéale, plutôt qu'autre chose? Une seule linéale rendrait tout froid et clinique, sans place pour la main humaine. Deux linéales, c'est le repli de secours si aucune serif convenable n'est trouvée. Une serif en texte courant fatiguerait la lecture. Le duo serif + linéale est le bon équilibre.\n\n## L'image se déforme, pas les mots\n\nRègle qui prime sur tout le reste: **le texte reste net.** La distorsion, la marque la réserve à l'image; le texte, lui, n'est jamais flouté, tordu ni animé. On le pose net, sur son propre plan, par-dessus ou à côté de l'image travaillée.\n\nLa seule exception est le logo (le mot \"Abstract\" lui-même), qui porte son mouvement dessiné. Cette licence ne s'étend à aucun autre texte.\n\nCe n'est pas qu'une question de style. Un mot lisible mais flou pourrait se lire comme une lisibilité empêchée - un risque au regard de la loi Evin. Garder les mots nets, c'est garder la marque à la fois digne de confiance et conforme, pendant que l'image, elle, peut être radicale.\n\n## Qui écrit quoi\n\nL'attribution se fait par **rôle**, pas par goût. Chaque texte est dans une seule voix.\n\n- **La linéale** porte: le texte courant, les interfaces, les légendes, les prix, les chiffres, les mentions techniques, et **toutes les mentions légales, allergènes et Evin.** Une information factuelle ou légale n'est jamais portée par la serif seule.\n- **La serif** porte: les grands titres, le manifeste, l'essence et la signature, la ligne d'évocation d'une saveur. Employée avec parcimonie.\n\nCôté Evin, la logique est simple: on parle du **fruit** (la framboise), jamais de l'alcool ni d'un effet; et on dit \"évoqué\", pas \"présent\" (le beurre évoque le gras que la distillation a retiré). Les mentions obligatoires vivent toujours dans la linéale, nettes et à taille garantie.\n\n## Choisir les deux polices\n\nLe duo n'est pas encore choisi (à trancher, choix créatif à valider avec Rémy et Nico). Ce qui est fixé, ce sont les critères que chaque police doit remplir:\n\n- La serif doit lire \"éditoriale\" et singulière (pas une serif de gabarit), tenir un grand titre et rester nette même petite.\n- La linéale doit être neutre et très lisible, avec des chiffres tabulaires (pour les tableaux et les prix) et une excellente tenue aux petites tailles.\n- Les deux doivent couvrir le français (accents, ligature œ, guillemets), avec une licence web et impression réelle.\n\nUne courte liste de candidates existe, offerte comme pièces à casser, jamais comme réponse: côté serif, des caractères éditoriaux à fort contraste; côté linéale, des grotesques neutres à large gamme de graisses. Le choix final se fait sur specimen, à l'œil du directeur artistique.\n\n## L'échelle et la hiérarchie\n\nLa marque a une échelle de tailles proportionnelle, du grand titre à la mention légale, exprimée en proportions (pas en pixels figés) pour tenir avant même le choix des polices.\n\nChaque niveau a sa voix: les grands titres en serif; le corps, les légendes et les mentions légales en linéale; les niveaux intermédiaires suivent le rôle du contenu. Le logo, lui, ne fait pas partie de cette échelle: il a sa propre taille.\n\n## Le plancher légal et la lisibilité\n\nLes mentions légales et Evin ont une **taille plancher** qu'on ne descend jamais, dictée par la loi et par l'accessibilité. On ne les rétrécit pas, on ne les déforme pas, on ne les met pas en serif. Sur un packaging, l'étiquetage impose une hauteur minimale (de l'ordre de 1,2 mm); si le bloc ne rentre pas, on agrandit l'étiquette, jamais la mention. Le minimum exact reste à confirmer avec le conseil juridique, par marché.\n\nSur une image ou une photo, le texte doit rester lisible: assez de contraste, sinon un aplat ou un cartouche derrière lui. À l'écran, la taille s'adapte de façon fluide (mobile, zoom 200%) sans jamais casser la lisibilité; à l'imprimé, l'interlignage se resserre un peu, la hiérarchie reste la même. Si la police web ne se charge pas, une police système prend le relais - et les mentions légales restent lisibles dans tous les cas. Les tailles sont nommées par rôle, écrites une fois dans le dépôt et diffusées vers le web, l'impression et Figma, jamais recopiées à la main.\n\n## Un socle commun, des expressions vivantes\n\nAbstract, Abstract Lab et Abstract Bistrot partagent le même système typographique: mêmes deux polices, même échelle, même règle du texte net, mêmes tailles nommées. C'est ce socle commun qui fait sentir qu'on est dans la même galaxie.\n\nChaque expression garde sa vie propre: elle peut mettre en avant l'une ou l'autre voix selon la surface (une carte, une enseigne), jouer sur la chaleur et les graisses, décliner ses menus locaux. Un Abstract Berlin, demain, serait une réinterprétation locale, pas une copie. Ce que personne ne fait: inventer une troisième police, inverser les rôles, ou rétrécir le plancher légal. (Architecture \"socle commun + expressions soeurs\": orientation 2026-07-04, à valider avec Rémy.)\n\n## Ce qui reste à trancher\n\n- Le choix des deux polices (specimen, licence), à valider avec Rémy et Nico.\n- Le rapport exact de l'échelle et les tailles définitives, une fois les polices choisies.\n- Le minimum légal de taille des mentions (Evin, étiquetage), à confirmer par marché avec le conseil juridique.\n- L'architecture \"socle commun + expressions soeurs\" (à valider avec Rémy).\n"}, {"id": "brand-book/lisible/09-couleur.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/09-couleur.md", "title_en": "Colour", "title_fr": "Couleur", "en": "# Colour\n\n> **Readable version, for human review. Draft of 2026-07-04.** The agent machinery has been removed (test protocols, numeric thresholds, coded cross-references, reviewer names). What remains is the thread: where colour comes from, how we build it, how we combine it. Pieces to challenge.\n\nThis chapter is how Abstract chooses, builds and combines its colours. Colour is not decoration: it is the foundation of the whole system. We are literally named after it.\n\n## Colour is our anchor\n\nAbstract translates flavour into several registers (colour, shape, movement and more), but colour is the anchor: it is how you recognise an aroma at a glance. Every Monochrome carries a signature made of two things: its colour and its distortion (covered in the distortion chapter). Together they form the fingerprint of an ingredient.\n\n## Where the colour comes from: the paint splotch\n\nA Monochrome's colour is not picked off a swatch book: it is sampled from the paint splotch hand-painted on the bottle. It is real paint, made by an artist. So the colour comes from the material, not from a marketing team.\n\nTwo things have to agree: the paint (the artist's gesture) and our colour-to-flavour intuition (red calls sweet, yellow calls acid, green calls vegetal, and so on). When the two disagree, that is something to discuss, not a detail to smooth over.\n\nThis is where colour evokes flavour, sensitively and honestly. We evoke, we do not claim: the colour suggests the aroma, it does not describe it gram by gram. We deliberately avoid the cliché of the organoleptic radar chart. The painted splotch is exactly a more human, more accessible expression than a technical graph (2026-07-04 orientation). And on comms surfaces the Evin law holds the line: we talk about the fruit (the raspberry), never the alcohol or an effect.\n\n## The Monochromes and their scales\n\nFrom that starting colour we build a full scale, from a very pale wash to the deepest shade. A Monochrome's signature colour is one of the tones in its scale.\n\nThese scales are a shared standard of flavour: a clear, accessible library of colour anyone can draw from. We were careful not to define ourselves by another brand: this is a standard, not \"the Pantone of flavour.\"\n\nSix Monochromes have a settled scale today: Beurre, Framboise, Fraise, Citron de Menton, Poivron jaune, Concombre. Two are still to be defined from their real paint: Olive noire de Nyons and Banane. Two useful corrections: Poivron jaune is orange-amber (not yellow-green), and Concombre is a true green (not teal).\n\n## Legible for everyone\n\nColour must stay legible and inclusive on every screen and every medium. The system is built for it: the farther apart two tones sit in a scale, the stronger the contrast. Legibility can almost be read off the numbers.\n\nOne simple, important rule: never let hue alone carry meaning. Two aromas of the same lightness look alike in greyscale and to a colour-blind viewer. So we always add a cue beyond colour: a word, an icon, a position, a difference in tone.\n\n## Combining colours\n\nA Monochrome is one colour. By default a surface carries a single aroma plus the neutrals (ink and paper); hierarchy comes from the tones of one scale, not from a second hue.\n\nWhen several aromas share a surface, it is because we are depicting a composition: a cocktail, a menu, a pairing. Rémy puts it like screen printing: you lay one colour over another. One aroma leads, the others support, and never more than three voices at once. Three ways of meeting are allowed: the seam (colours overlap slightly off-register, the house \"printed\" signature), the weave (a scale where each step is a different aroma), and the field (a soft gradient, in the background only).\n\nTwo guardrails: no accent colour from outside the roster, there is no ninth colour; and an association must always tell a real composition, never decoration. On Evin: colour describes the aroma, never the state of the person drinking (no \"stimulating\" red, no \"relaxing\" blue).\n\n## From screen to bottle\n\nAn Abstract colour lives in several worlds: the screen, print, the pigment painted on the bottle. One identity, several faces. The reference is the paint: when a print or a screen value drifts from the painted splotch, the paint wins.\n\nSome very vivid colours (Framboise's deep fuchsia, for instance) are hard to reproduce faithfully in print or pigment. When that happens we say so honestly rather than slipping in a \"close enough\" colour: we note \"target colour, not achieved,\" and decide case by case. The exact production tolerances are still to confirm with Nico.\n\n## Lab and Bistrot\n\nThe colour system is common ground across the whole Abstract galaxy: the aroma-to-colour match, the way tones combine, the legibility floor. A raspberry should read as the same raspberry everywhere. That is what makes the brand recognisable.\n\nOn that shared ground, each expression keeps its own life: a venue chooses which aromas it features and composes its own atmosphere (walls, materials, room tones), its \"sense of place.\" A future Abstract Berlin would reinterpret locally rather than copy. (2026-07-04 orientation: Abstract is the umbrella brand, with Lab and Bistrot as sister expressions; architecture to confirm with Rémy.)\n\n## Still to decide\n\n- Lock the starting colours of the 8 Monochromes from the real paint (Olive noire and Banane are the most provisional).\n- Confirm the method used to build the scales.\n- Fix the neutrals (ink and paper) and the production tolerances (with Nico).\n- Validate the Lab/Bistrot architecture with Rémy.\n\n---\n\n*Readable version, kept up to date with Nico. The detailed agent version will be regenerated from this one, never the other way around.*\n", "fr": "# Couleur\n\n> **Version lisible, pour relecture humaine. Brouillon du 2026-07-04.** On a retiré l'outillage pour agents (protocoles de test, seuils chiffrés, renvois codés, noms de relecteurs). Il reste le fil : d'où vient la couleur, comment on la construit, comment on la combine. Pièces à casser.\n\nCe chapitre dit comment Abstract choisit, construit et combine ses couleurs. La couleur n'est pas une décoration : c'est le socle du système. On est littéralement nommés d'après elle.\n\n## La couleur est notre ancre\n\nAbstract traduit la saveur dans plusieurs registres (couleur, forme, mouvement...), mais la couleur est l'ancrage : c'est par elle qu'on reconnaît un arôme au premier regard. Chaque Monochrome porte une signature faite de deux choses : sa couleur et sa distorsion (traitée au chapitre distorsion). Ensemble, elles forment l'empreinte d'un ingrédient.\n\n## D'où vient la couleur : la tache de peinture\n\nLa couleur d'un Monochrome n'est pas choisie sur un nuancier : elle est prélevée sur la tache de peinture peinte à la main sur le flacon. C'est une vraie peinture, faite par un artiste. La couleur vient donc de la matière, pas d'un service marketing.\n\nDeux choses doivent s'accorder : la peinture (le geste de l'artiste) et notre intuition couleur-saveur (le rouge appelle le sucré, le jaune l'acide, le vert le végétal...). Quand les deux divergent, c'est un sujet de discussion, pas un détail à lisser.\n\nC'est ici que la couleur évoque la saveur, de façon sensible et honnête. On évoque, on ne prétend pas : la couleur suggère l'arôme, elle ne le décrit pas au gramme près. On fuit volontairement le cliché du radar organoleptique. La tache peinte est justement une expression plus humaine et plus accessible qu'un graphique technique (orientation 2026-07-04). Et sur les surfaces de comm, la loi Evin tient la ligne : on parle du fruit (la framboise), jamais de l'alcool ni d'un effet.\n\n## Les Monochromes et leurs gammes\n\nÀ partir de cette couleur de départ, on construit une gamme complète, du lavis très clair jusqu'à la teinte la plus profonde. La couleur signature d'un Monochrome est l'un des tons de sa gamme.\n\nCes gammes forment un standard partagé de la saveur : une bibliothèque de couleurs claire, accessible, dans laquelle chacun peut puiser. On tenait à ne pas se définir par une autre marque : c'est un standard, pas « le Pantone de la saveur ».\n\nSix Monochromes ont aujourd'hui une gamme arrêtée : Beurre, Framboise, Fraise, Citron de Menton, Poivron jaune, Concombre. Deux restent à définir à partir de leur vraie peinture : Olive noire de Nyons et Banane. Deux corrections utiles : le Poivron jaune est orange-ambré (pas jaune-vert), et le Concombre est vert franc (pas turquoise).\n\n## Lisible par tous\n\nLa couleur doit rester lisible et inclusive sur tous les écrans et tous les supports. Le système est construit pour ça : plus deux tons sont éloignés dans la gamme, plus le contraste est fort. La lisibilité se lit presque dans les chiffres.\n\nUne règle simple et importante : ne jamais faire porter un sens par la seule teinte. Deux arômes de même clarté se ressemblent en niveaux de gris et pour une personne daltonienne. On ajoute donc toujours un repère autre que la couleur : un mot, une icône, une position, un écart de ton.\n\n## Combiner les couleurs\n\nUn Monochrome, c'est une couleur. Par défaut, une surface porte un seul arôme, plus les neutres (encre et papier) ; la hiérarchie se fait avec les tons d'une même gamme, pas avec une deuxième teinte.\n\nQuand plusieurs arômes partagent une surface, c'est qu'on représente une composition : un cocktail, une carte, un accord. Rémy le dit comme une sérigraphie : on pose une couleur sur l'autre. Un arôme mène, les autres accompagnent, et jamais plus de trois voix à la fois. Trois façons de se rencontrer sont permises : la couture (les couleurs se superposent légèrement en décalé, la signature « imprimée » maison), le tissage (une gamme où chaque marche est un arôme différent), et le fondu (un dégradé doux, en fond seulement).\n\nDeux garde-fous : pas de couleur d'accent venue d'ailleurs, il n'y a pas de neuvième couleur ; et une association doit toujours raconter une vraie composition, jamais du décor. Côté Evin : la couleur décrit l'arôme, jamais l'état de celui qui boit (pas de rouge « stimulant » ni de bleu « relaxant »).\n\n## De l'écran au flacon\n\nUne couleur Abstract vit dans plusieurs mondes : l'écran, l'impression, le pigment peint sur le flacon. Une seule identité, plusieurs visages. La référence, c'est la peinture : quand une impression ou une valeur écran s'écarte de la tache peinte, c'est la peinture qui a raison.\n\nCertaines couleurs très vives (le fuchsia profond de la Framboise, par exemple) sont difficiles à reproduire fidèlement en impression ou en pigment. Dans ce cas, on le dit honnêtement plutôt que de glisser une couleur « à peu près » : on note « couleur cible, non atteinte », et on tranche au cas par cas. Les tolérances exactes de production restent à valider avec Nico.\n\n## Lab et Bistrot\n\nLe système couleur est un socle commun à toute la galaxie Abstract : la correspondance arôme-couleur, la façon de combiner les teintes, le plancher de lisibilité. Une framboise doit se lire comme la même framboise partout. C'est ce qui rend la marque reconnaissable.\n\nSur ce socle, chaque expression garde sa vie propre : un lieu choisit quels arômes il met en avant et compose son ambiance (murs, matières, tons de la salle), son « sense of place ». Un Abstract Berlin, demain, réinterpréterait localement plutôt que de copier. (Orientation 2026-07-04 : Abstract = marque chapeau, Lab et Bistrot en expressions sœurs ; architecture à confirmer avec Rémy.)\n\n## À trancher\n\n- Arrêter les couleurs de départ des 8 Monochromes à partir des vraies peintures (Olive noire et Banane sont les plus provisoires).\n- Confirmer la méthode de construction des gammes.\n- Fixer les neutres (encre et papier) et les tolérances de production (avec Nico).\n- Valider l'architecture Lab/Bistrot avec Rémy.\n\n---\n\n*Version lisible, tenue à jour avec Nico. La version détaillée pour les agents sera régénérée à partir de celle-ci, jamais l'inverse.*\n"}, {"id": "brand-book/lisible/10-photographie.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/10-photographie.md", "title_en": "Photography", "title_fr": "Photographie", "en": "# Photography\n\n> Readable version, for human review. Draft of 2026-07-04. We stripped the agent tooling (automated tests, coded cross-references, review notes) to keep only the thread: what an Abstract photograph shows, what it never shows, and the simple rules that keep every image honest and compliant.\n\n## Photograph the flavor, not the object\n\nAn Abstract photograph follows the same logic as the rest of our visual language: distortion. The aroma calls the image. A photograph does not document a fruit, a bottle, or a process; it renders the sensation an aroma carries - coolness, radiance, drive, persistence.\n\nWe evoke, we do not claim. It is the same honesty as everywhere else: we suggest the idea of a flavor, we never assert it is there. And on regulated markets (the Evin law), we speak of the fruit itself - the raspberry - never of alcohol or an effect.\n\n## Four image families, an open territory\n\nWe work with four families, each carrying a sensation:\n\n- **Transparency**: clarity, reading one thing through another (glass, liquid, reflection).\n- **Lights**: radiance, the brightness of a top note, a flash that fades.\n- **Motion**: drive, the gesture of composing caught in the act.\n- **Blur**: persistence, memory, the instant held rather than frozen.\n\nThese are not four closed boxes or a mandated shot list: they are directions. A new aroma whose profile fits none of the four may call for a fifth family. The territory stays as open as our distortion library.\n\n## The red thread\n\nA photograph, the wordmark, and a Monochrome's rendering must read as one visual family, not three unrelated habits. Two things hold this together: one shared background signature (the slight print misregistration and chromatic aberration running through all our images) and the same vocabulary of sensations. A \"Motion\" photograph and the wordmark's directional blur are, at heart, the same move.\n\n## What we show, what we never show\n\nWe show: translated flavor, and the pro's creation as the hero - Abstract credited as the medium, never staged as the star in its place.\n\nWe never show:\n\n- a consumption act (drinking, a glass to the lips), a sign of drunkenness, a party or seduction scene tying alcohol to success (the Evin law, hard line);\n- the glamour bottle on a black background, \"premium spirit\" style - an object to admire rather than a material to compose with;\n- Abstract as a star that erases the maker;\n- decorative blur or set-dressing that carries no sensation.\n\n## The product: the bottle is material\n\nWe do not sell finished objects, we sell material for each person to make their own. Product photography says so: the hand-painted bottle is shown the way you hand a tube of paint to a painter - something to compose with, not a trophy. The color, the material, is the hero, not the silhouette of the glass.\n\nThe background is neutral or drawn from the photographed Monochrome's own palette, never an off-system color. The Evin risk is near zero (no person, no bar), but a shot implying that someone is drinking stays forbidden.\n\n## Faces and blur\n\nTwo clear lines.\n\n**Faces.** By default, no sharp identifiable face: we play silhouette, soft focus, tight crop, back turned, or absence. One exception: the portrait of a credited professional at work (never consuming), under strict conditions and with the legal referent's sign-off. (Referent to be named; extending this to a named member of a venue's team is still to be validated.)\n\n**Blur.** An evocative soft focus is welcome as long as it reads as a photographic choice (a depth of field, a movement). The moment an image reads as impaired or drunken vision, it is rejected (the Evin law). The wordmark's own assumed blur is its own: a photograph does not borrow it.\n\n## In post-production\n\nA few simple rules:\n\n- Color pushes toward the relevant Monochrome's palette plus the neutrals, never toward a color foreign to the system.\n- Grain is a house grain, recognizable from one image to the next, never an off-the-shelf app filter.\n- One shoot keeps a single treatment from end to end.\n- Type set over a photo always stays sharp and legible, whatever the image treatment.\n\n## The venue: Lab and Bistrot\n\nAbstract Lab (the kitchen, where we make) and Abstract Bistrot (the lounge, where we welcome) share the same photographic base and each keep their own expression (architecture to be confirmed, 2026-07-04 orientation, to validate with Rémy). Each venue photographs its own room, never a generic set; a Berlin, one day, would be its local reinterpretation.\n\nBistrot ambiance is the most delicate photography we make: a warm, convivial counter sits visually close to \"festivity,\" even with no one drinking. An ambiance shot must read as a place, a craft, a counter - never a party rewarded by the product. A person drinking is forbidden there, no exception.\n\n## Before publishing\n\nIn short: each shoot has a brief approved before it runs and a selection approved after. Any identifiable person signs a release the same day; any borrowed location has its own. And every image meant for communication clears the Evin review before publication.\n\n## Still to settle\n\n- The Lab / Bistrot architecture as sister brands (to validate with Rémy).\n- Naming the legal referent (Evin law, releases, portrait exception).\n- The \"professional portrait\" exception for a named member of a venue's team.\n", "fr": "# Photographie\n\n> Version lisible, pour relecture humaine. Brouillon du 2026-07-04. On a retiré l'outillage pour agents (tests automatisés, renvois codés, mentions de relecture) pour ne garder que le fil : ce qu'une photo Abstract montre, ce qu'elle ne montre jamais, et les règles simples qui gardent chaque image juste et conforme.\n\n## Photographier la saveur, pas l'objet\n\nUne photo Abstract obéit à la même logique que tout notre langage visuel : la distorsion. L'arôme appelle l'image. Une photo ne documente pas un fruit, une bouteille ou un procédé ; elle rend la sensation que porte un arôme - la fraîcheur, l'éclat, l'élan, la persistance.\n\nOn évoque, on ne prétend pas. C'est la même honnêteté que partout ailleurs : on suggère l'idée d'une saveur, on n'affirme pas qu'elle est là. Et sur les marchés réglementés (loi Evin), on parle du fruit lui-même - la framboise - jamais de l'alcool ni d'un effet.\n\n## Quatre familles d'images, un terrain ouvert\n\nOn travaille quatre familles, chacune portant une sensation :\n\n- **Transparence** : la clarté, lire une chose à travers une autre (verre, liquide, reflet).\n- **Lumières** : l'éclat, la brillance d'une note de tête, un flash qui s'efface.\n- **Mouvement** : l'élan, le geste de composition saisi en train de se faire.\n- **Flou** : la persistance, la mémoire, l'instant tenu plutôt que figé.\n\nCe ne sont pas quatre cases fermées ni une liste de plans imposés : ce sont des directions. Un nouvel arôme dont le profil n'entre dans aucune des quatre peut appeler une cinquième famille. Le terrain reste aussi ouvert que notre bibliothèque de distorsion.\n\n## Le fil rouge\n\nUne photo, le logotype et le rendu d'un Monochrome doivent se lire comme une même famille visuelle, pas comme trois habitudes sans lien. Deux choses assurent ça : une même signature de fond (le léger décalage d'impression et l'aberration chromatique qui traversent toutes nos images) et le même vocabulaire de sensations. Une photo « Mouvement » et le flou directionnel du logotype sont, au fond, le même geste.\n\n## Ce qu'on montre, ce qu'on ne montre jamais\n\nOn montre : la saveur traduite, et la création du pro comme héros - Abstract est crédité comme le médium, jamais mis en vedette à sa place.\n\nOn ne montre jamais :\n\n- un acte de consommation (boire, porter un verre aux lèvres), un signe d'ivresse, une scène de fête ou de séduction qui associe l'alcool à la réussite (loi Evin, ligne dure) ;\n- la bouteille glamour posée sur fond noir façon « spiritueux premium » - un objet à admirer plutôt qu'une matière à composer ;\n- Abstract en star qui efface le créateur ;\n- du flou décoratif ou un décor qui ne porte aucune sensation.\n\n## Le produit : la bouteille est de la matière\n\nOn ne vend pas des objets finis, on vend de la matière que chacun s'approprie. La photo produit le dit : la bouteille peinte à la main est présentée comme on tend un tube de peinture à un peintre - de quoi composer, pas un trophée. C'est la couleur, la matière, qui est l'héroïne, pas la silhouette du verre.\n\nLe fond est neutre ou tiré de la palette du Monochrome photographié, jamais une couleur hors système. Le risque Evin est quasi nul (pas de personne, pas de bar), mais un plan qui suggère qu'on boit reste interdit.\n\n## Les visages et le flou\n\nDeux lignes de conduite claires.\n\n**Les visages.** Par défaut, pas de visage net et identifiable : on joue la silhouette, le flou, le cadrage serré, le dos tourné, ou l'absence. Une seule exception : le portrait d'un professionnel crédité, au travail (jamais en train de consommer), sous conditions strictes et avec l'accord du référent juridique. (Référent à nommer ; l'extension à un membre nommé de l'équipe d'un lieu reste à valider.)\n\n**Le flou.** Un flou évocateur est le bienvenu tant qu'on lit un choix photographique (une profondeur de champ, un mouvement). Dès qu'une image se lit comme une vision troublée ou ivre, elle est refusée (loi Evin). Le flou assumé du logotype lui est propre : une photo ne l'emprunte pas.\n\n## En post-production\n\nQuelques règles simples :\n\n- La couleur pousse vers la palette du Monochrome concerné plus les neutres, jamais vers une couleur étrangère au système.\n- Le grain est un grain maison, reconnaissable d'une image à l'autre, jamais un filtre tout fait d'application.\n- Une même séance garde un seul traitement de bout en bout.\n- Le texte posé sur une photo reste toujours net et lisible, quel que soit le traitement de l'image.\n\n## Le lieu : Lab et Bistrot\n\nAbstract Lab (la cuisine, on fabrique) et Abstract Bistrot (le salon, on accueille) partagent le même socle photographique et gardent chacun leur expression propre (architecture à confirmer, orientation 2026-07-04, à valider avec Rémy). Chaque lieu photographie sa propre salle, jamais un décor générique ; un Berlin, demain, serait sa réinterprétation locale.\n\nLa photo d'ambiance du Bistrot est la plus délicate qu'on fasse : un comptoir chaleureux et convivial est visuellement voisin de la « fête », même sans personne qui boit. Un plan d'ambiance doit se lire comme un lieu, un métier, un comptoir - jamais comme une fête récompensée par le produit. Une personne en train de boire y est interdite, sans exception.\n\n## Avant de publier\n\nEn bref : chaque séance a un brief validé avant le tournage et une sélection validée après. Toute personne identifiable signe une autorisation le jour même ; tout lieu emprunté a la sienne. Et chaque image destinée à la communication passe la relecture Evin avant publication.\n\n## À trancher\n\n- L'architecture Lab / Bistrot en marques sœurs (à valider avec Rémy).\n- Nommer le référent juridique (loi Evin, autorisations, exception portrait).\n- L'exception « portrait de professionnel » pour un membre nommé d'un lieu.\n"}, {"id": "brand-book/lisible/11-packaging.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/11-packaging.md", "title_en": "Packaging", "title_fr": "Packaging", "en": "# Packaging\n\nThis chapter says what a Monochrome's packaging should be: not a decorated container, but the medium made physical. It sets out the core idea, what the bottle evokes and what it must not say, the handmade part (what is locked, what is free), reproducibility, the Dymo craft code, and the legal frame of the back label. It is a concept frame, not the drawings: the gesture, the hand, the material stay the craft of Nico and Conan.\n\n## The bottle is the medium, not a decorated container\n\nThe hand-painted stain on the glass is not a color applied as decoration: it **is** the expression of the aroma. It is the same distinction as between paint and a painting: we give a material to compose with, not a finished object to admire.\n\nThat stain is also the source of the color system: the digital color is sampled from the real paint, never the other way around. So the packaging is not the last step that applies a color decided elsewhere; it is the **first** step, the origin everything traces back to.\n\nFrom this comes a simple discipline: one stain, nothing else competing. The bottle inherits the minimalism of the rest of the brand - we strip away until only the essential remains, and there is nowhere to hide. Any ornament added beyond the stain and the mandatory legal block breaks that discipline.\n\n## What the bottle evokes, and what it must not say\n\nThe bottle should read as a material a maker reaches for, not as a staged luxury flask. And it carries the trace of a hand: the proof of a person, not an industrial print run.\n\nThe register is **sensitive and poetic** (2026-07-04 orientation): we evoke the aroma, we do not catalog it in technical tasting notes. Two honesties keep that evocation clean. First, we evoke, we do not claim: the butter Monochrome evokes the fat that distillation has precisely removed - we suggest it, we do not say it is there. Second, the Evin law: we speak of the **fruit itself** (the raspberry), never of alcohol or an effect, which keeps us both truthful and compliant.\n\nSo, to avoid: the glamour of the finished object lit on a black background; any claim of consumption or effect; an arbitrary decorative color unrelated to the real stain; a legal mention shrunk or distorted for the sake of aesthetics. Any distortion or blur on a packaging image goes through the Evin check before publication (it could read as an evocation of intoxication).\n\n## Handmade: what is locked, what is free\n\nOnly three things are non-negotiable: the paint does reach its Monochrome's color; the gesture reads as handmade, not as machine regularity; and across the whole set of Monochromes, the same hand is recognizable - a family, even though each aroma carries its own color.\n\nEverything else is craft, and belongs to Nico and Conan (Rémy keeps final creative sign-off): the exact gesture, the tool, the number of passes, the texture, the composition of the stain. The principle we hold: we never prescribe the art, we only set what the result must satisfy.\n\nThere is a tension to hold here, not to remove: too tight, and we kill the hand and the stain becomes a stencil; too loose, and the color drifts and the family no longer reads. The right width lets a real manual variation show while keeping the color true.\n\n## Reproducibility: holding quality without killing the hand\n\nTwo axes, not to be confused. **Color fidelity** is measured: a bottle too far from its reference is repainted, never shipped. **Gesture variation**, on the other hand, is allowed: a stain whose shape differs while the color is true is not a defect, it is the handmade working.\n\nAnd when the color drifts (a new pigment batch, aging), that is a defect to fix on the production side, not a new official color. The reference stays the original paint.\n\n## The Dymo code (to be decided)\n\nThe embossed Dymo tape, applied by hand, signs the workshop rather than the agency: the mark of a person. Two questions remain open. First a factual one: is it still on the bottles, or already removed? To confirm with Nico and Conan. Then the substance: keep it as is, evolve it, or drop it. The proposed leaning is to evolve it - keep the signal (a legible, hand-marked code) but fold it into the same system as the paint, rather than a second mark that competes for attention. **The decision is Conan's.** If kept, it stays small, discreet, limited to factual fields (batch, aroma, date), never marketing copy.\n\n## The back label: the legal frame\n\nThe back label (70x40mm) carries the mandatory mentions across five markets (France, Luxembourg, Switzerland, United Kingdom, Quebec), each with its own regime. Two zones share the space: a **fixed legal zone** (mandatory mentions and the health message, in a clean, legible type) and a **flexible brand zone** (the tone, a possible sensory line, for Nico and Conan).\n\nGolden rule: we never crush, condense, or distort a legal mention to gain room; if it does not fit, we enlarge the label, we do not shrink the law. The detail of the mentions market by market, and the choice between a single label or a label per market, remain to be validated with legal counsel and between Nico and Ismaïl.\n\n## Still to be decided\n\n- The fate of the Dymo code, and its current physical status (Conan).\n- The legal detail of the mentions per market, with legal counsel; single label or per market (Nico + Ismaïl).\n- The glass silhouette, and the exact gesture and material (Nico + Conan, Rémy).\n- How the Bistrot takes up or reinterprets this packaging (architecture to confirm, 2026-07-04 orientation).\n", "fr": "# Packaging\n\nCe chapitre dit ce que doit être l'emballage d'un Monochrome : pas un contenant décoré, mais le medium rendu physique. Il pose l'idée centrale, ce que la bouteille évoque et ce qu'elle ne dit pas, la part faite main (ce qui est verrouillé, ce qui est libre), la reproductibilité, le code artisanal Dymo et le cadre légal de la contre-étiquette. C'est un cadre de concept, pas les dessins : le geste, la main, le matériau restent le métier de Nico et Conan.\n\n## La bouteille est le medium, pas un contenant décoré\n\nLa tache peinte à la main sur le verre n'est pas une couleur posée en décoration : elle **est** l'expression de l'arôme. C'est la même distinction qu'entre de la peinture et un tableau : on donne une matière avec laquelle composer, pas un objet fini à admirer.\n\nCette tache est aussi la source du système de couleur : la couleur numérique est prélevée sur la peinture réelle, jamais l'inverse. L'emballage n'est donc pas la dernière étape qui applique une couleur décidée ailleurs ; c'est la **première**, l'origine à laquelle tout remonte.\n\nDe là, une discipline simple : une seule tache, rien d'autre en concurrence. La bouteille hérite du minimalisme du reste de la marque - on retire jusqu'à ne garder que l'essentiel, et il n'y a nulle part où se cacher. Tout ornement ajouté au-delà de la tache et du bloc légal obligatoire sort de cette discipline.\n\n## Ce que la bouteille évoque, et ce qu'elle ne dit pas\n\nLa bouteille doit se lire comme un matériau qu'un créateur va chercher, pas comme un flacon de luxe mis en scène. Et elle porte la trace d'une main : la preuve d'une personne, pas d'un tirage industriel.\n\nLe registre est **sensible et poétique** (orientation 2026-07-04) : on évoque l'arôme, on ne le catalogue pas en notes techniques. Deux honnêtetés gardent cette évocation propre. D'abord, on évoque, on ne prétend pas : le Monochrome beurre évoque le gras que la distillation a justement retiré - on le suggère, on ne dit pas qu'il est là. Ensuite, la loi Evin : on parle du **fruit lui-même** (la framboise), jamais de l'alcool ni d'un effet, ce qui garde à la fois juste et conforme.\n\nÀ éviter, donc : le glamour de l'objet fini éclairé sur fond noir ; toute allégation de consommation ou d'effet ; une couleur décorative arbitraire sans lien avec la vraie tache ; une mention légale rétrécie ou déformée pour l'esthétique. Une distorsion ou un flou sur une image d'emballage passe par la vérification Evin avant publication (elle pourrait se lire comme une évocation de l'ivresse).\n\n## Fait main : ce qui est verrouillé, ce qui est libre\n\nTrois choses seulement sont non négociables : la peinture atteint bien la couleur de son Monochrome ; le geste se lit comme fait main, pas comme la régularité d'une machine ; et, sur l'ensemble des Monochromes, on reconnaît la même main - une famille, même si chaque arôme porte sa propre couleur.\n\nTout le reste est du métier, et revient à Nico et Conan (Rémy garde la validation créative finale) : le geste exact, l'outil, le nombre de passes, la texture, la composition de la tache. Le principe qu'on tient : on ne prescrit jamais l'art, on ne fixe que ce que le résultat doit vérifier.\n\nIl y a là une tension à tenir, pas à supprimer : trop serré, on tue la main et la tache devient un pochoir ; trop lâche, la couleur dérive et la famille ne se lit plus. La bonne largeur laisse voir une vraie variation manuelle tout en gardant la couleur juste.\n\n## Reproductibilité : tenir la qualité sans tuer la main\n\nDeux axes, à ne pas confondre. La **fidélité de la couleur** est mesurée : une bouteille trop éloignée de sa référence est repeinte, jamais expédiée. La **variation du geste** est, elle, permise : une tache dont la forme diffère alors que la couleur est juste n'est pas un défaut, c'est le fait main qui fonctionne.\n\nEt quand la couleur dérive (nouveau lot de pigment, vieillissement), c'est un défaut à corriger côté production, pas une nouvelle couleur officielle. La référence reste la peinture d'origine.\n\n## Le code Dymo (à trancher)\n\nLe ruban Dymo embossé, appliqué à la main, signe l'atelier plutôt que l'agence : la marque d'une personne. Deux questions restent ouvertes. D'abord un point factuel : est-il encore sur les bouteilles, ou déjà retiré ? À confirmer avec Nico et Conan. Ensuite le fond : le garder tel quel, le faire évoluer, ou l'abandonner. L'inclination proposée penche pour le faire évoluer - garder le signal (un code lisible, marqué à la main) mais l'intégrer au même système que la peinture, plutôt qu'un second signe qui se dispute l'attention. **La décision revient à Conan.** S'il est gardé, il reste petit, discret, cantonné à des champs factuels (lot, arôme, date), jamais de la copy marketing.\n\n## La contre-étiquette : le cadre légal\n\nLa contre-étiquette (format 70x40mm) porte les mentions obligatoires sur cinq marchés (France, Luxembourg, Suisse, Royaume-Uni, Québec), chacun avec son propre régime. Deux zones se partagent l'espace : une **zone légale fixe** (mentions obligatoires et message sanitaire, dans une typo nette et lisible) et une **zone de marque flexible** (le ton, une éventuelle ligne sensorielle, à Nico et Conan).\n\nRègle d'or : on n'écrase, ne condense ni ne déforme jamais une mention légale pour gagner de la place ; si ça ne rentre pas, on agrandit l'étiquette, on ne rétrécit pas la loi. Le détail des mentions marché par marché, et le choix d'une étiquette unique ou d'une étiquette par marché, restent à valider avec le juridique et entre Nico et Ismaïl.\n\n## Ce qui reste à trancher\n\n- Le sort du code Dymo, et son statut physique actuel (Conan).\n- Le détail légal des mentions par marché, avec le juridique ; étiquette unique ou par marché (Nico + Ismaïl).\n- La silhouette du verre, le geste et le matériau exacts (Nico + Conan, Rémy).\n- Comment le Bistrot reprend ou réinterprète cet emballage (architecture à confirmer, orientation 2026-07-04).\n"}, {"id": "brand-book/lisible/12-site-web.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/12-site-web.md", "title_en": "Website", "title_fr": "Site web", "en": "# Website\n\n> Readable version, for human review. All the agent tooling has been removed: the so called falsification tests, source tags, coded cross references, numbered protocols. What remains is what matters for the brand: what the site is for, how people move through it, and the rules that hold it together. Status: draft, pieces to challenge. The site sells alcohol in France, so the Evin law applies everywhere.\n\n## What the site is for\n\nThe site is the front door of the brand. In 2025 we build it first for the professional: that is a deployment choice (budget, effort, volume), not a definition of the brand. **Abstract speaks to everyone**, the pro and the general public alike. The public can look, understand, and want in; the buying paths speak to pros first. We do not shrink the copy to B2B.\n\nThe site's job is simple: take someone from intrigue to a first order, then to fluent, repeated use. It has **one single conversion**: getting the material into someone's hands (a sample kit, a first order). Everything else either feeds that or deepens after it. One discipline: if a page cannot say what it is for, it does not ship.\n\n## The journey\n\nWe support five moments, from discovery to advocacy: **discover** (\"this speaks to me, it looks like nothing else\"), **evaluate** (\"I trust the rigor, and I understand I am given material, not a finished product\"), **taste** (get the liquid into the glass), **integrate** (\"I can create, reproduce, and explain it to my team\"), **advocate** (\"it makes my work shine\"). This journey already exists in the venue; what is missing is the structure, and it has to be adapted per audience.\n\nTwo principles govern it: **entry is effortless** (nothing jars at first contact) and **depth is offered, never forced** (you can dive very deep, you are never made to). Only the \"Compose\" section is allowed to demand effort: there, difficulty is part of the product.\n\n## The main sections of the site\n\nSeven spaces, shallow and easy to hold in mind:\n\n- **Home**: three screens - one that arrests, one that says what Abstract is, one that routes (see the range / learn to compose / order as a pro). No feature soup.\n- **The Monochromes** (the range): every aroma shown as an equal.\n- **A Monochrome page**: the page that carries everything (see below).\n- **Compose**: the language and method of flavor, the part allowed to demand effort.\n- **Pro space**: the verified account and the first order path.\n- **The proof**: the process and its rigor (vacuum distillation, purity, no additives).\n- **The Bistrots**: the venues.\n- **The network**: the prescribers and the credited creations.\n\nWhat we deliberately **leave out**: no founders page (we sell the material, not the legend); no blog (content lives where it is useful); no public shop in 2025 (a deployment choice).\n\nArchitecture note (2026-07-04 orientation, to validate with Rémy): Abstract is an **umbrella brand**, and **Abstract Lab** and **Abstract Bistrot** are **two sister expressions** (a common base plus each venue's own living expression). The Bistrots section should therefore not stay a minimal, bland box: it is a living expression of the brand, to be treated as such once the Lab/Bistrot frontier is confirmed.\n\n## The pages that carry everything\n\nThe **Monochrome page** is the central template. It first shows the aroma rendered (color plus visual signature) and says in one line what it is: we **show**, we do not pile on adjectives. Then: its **composition roles** (what it does *in* a drink, never \"drink me\"), its color system, its pairings (only when motivated), and the pro path (sample / order) reachable from the very first screen. The full aromatic profile is there **in depth, on demand**: never a toll.\n\nThe **home** coheres in five seconds and looks like nothing else. The **proof** is honest: it separates what is measured from what is interpreted, and never lets romance stand in for fact. On **compositions**, the pro's name comes **before** Abstract's: we are a means, not the star.\n\nThe site is **bilingual FR + EN from day one** (France, then the UK and Benelux).\n\n## Staying honest: the sensory register and the Evin law\n\nThe heart of the brand is the **poetic evocation of flavor**: suggesting the idea of an ingredient, not describing it by its grams of acid. Two honesties keep this clean. First, we say \"evoked\", not \"present\": the butter Monochrome evokes the fat that distillation precisely removed. Second, the Evin law: we speak of the **fruit** (the raspberry), never of alcohol or of an effect - which stays both truthful and compliant.\n\nIn practice: an age gate before any product content; the statutory health message on every page, in both languages (it is the French market that triggers the rule, not the language); \"Labs\" releases framed as editions, never as pressure to buy; order tiers worded as logistics, not as encouragement to consume.\n\n## Search (SEO), without betraying the brand\n\nThe site is built around a pro's real questions (\"what is this aroma as an ingredient?\", \"is the process real?\", \"how do I order?\"), with **one page per question**. Two guardrails: the snippets that show in Google appear **before** the age gate, so even there the register stays product and fruit, never effect; and we **never invent** ratings or customer reviews to decorate results. No chasing general public queries in 2025 (deployment).\n\n## Still to settle\n\n- **The Bistrots section** as a true sister expression, not a minimal box (to validate with Rémy).\n- **The flavor profile**: find an accessible, non cliché expression, certainly not one more organoleptic radar.\n- **The number of Monochromes** (7, 7 + 1 edition, or 8) and the essence and signature wording.\n- **Pro price visibility** by market (France / UK).\n- **The prescriber credit mechanism** (Network section), still open.\n", "fr": "# Site web\n\n> Version lisible, pour relecture humaine. On a retiré tout l'outillage destiné aux agents : les tests dits « de falsification », les tags de source, les renvois codés, les protocoles chiffrés. Il ne reste que ce qui compte pour la marque : à quoi sert le site, comment on le parcourt, et les règles qui tiennent l'ensemble. Statut : brouillon, pièces à casser. Le site vend de l'alcool en France, donc la loi Evin s'applique partout.\n\n## À quoi sert le site\n\nLe site est la porte d'entrée de la marque. En 2025, on le construit d'abord pour le professionnel : c'est un choix de déploiement (budget, effort, volume), pas une définition de marque. **Abstract parle à tout le monde**, au pro comme au grand public. Le public peut regarder, comprendre, avoir envie ; les chemins d'achat, eux, s'adressent d'abord aux pros. On ne rétrécit pas la copie au B2B.\n\nLe rôle du site est simple : mener quelqu'un de l'intrigue à la première commande, puis à un usage fluide et répété. Il n'a **qu'une seule conversion** : mettre la matière entre les mains de quelqu'un (un kit d'échantillons, une première commande). Tout le reste ou bien y conduit, ou bien approfondit après. Une règle de discipline : si une page ne sait pas dire à quoi elle sert, elle ne sort pas.\n\n## Le parcours\n\nOn accompagne cinq moments, de la découverte à la recommandation : **découvrir** (« ça me parle, ça ne ressemble à rien d'autre »), **évaluer** (« je fais confiance à la rigueur, et je comprends qu'on me donne de la matière, pas un produit fini »), **goûter** (obtenir le liquide dans le verre), **intégrer** (« je peux créer, reproduire, et l'expliquer à mon équipe »), **recommander** (« ça fait briller mon travail »). Ce parcours existe déjà dans le lieu ; ce qui manque, c'est la structuration, et il faut l'adapter par public.\n\nDeux principes le gouvernent : **l'entrée est sans effort** (rien ne bloque au premier contact) et **la profondeur est offerte, jamais imposée** (on peut plonger très loin, on n'y est jamais forcé). Seule la section « Composer » a le droit de demander de l'effort : c'est là que la difficulté fait partie du produit.\n\n## Les grandes sections du site\n\nSept espaces, peu profonds, faciles à tenir en tête :\n\n- **Accueil** : trois écrans - un qui arrête, un qui dit ce qu'est Abstract, un qui oriente (voir la gamme / apprendre à composer / commander en pro). Pas d'empilement de fonctions.\n- **Les Monochromes** (la gamme) : tous les arômes présentés à égalité.\n- **La page d'un Monochrome** : la page qui porte tout (voir plus bas).\n- **Composer** : la langue et la méthode de la saveur, la partie qui a le droit d'exiger de l'effort.\n- **Espace pro** : le compte vérifié et le chemin de première commande.\n- **La preuve** : le procédé et sa rigueur (extraction sous vide, pureté, sans additif).\n- **Les Bistrots** : les lieux.\n- **Le réseau** : les prescripteurs et les créations créditées.\n\nCe qu'on **ne met pas** : pas de page « fondateurs » (on vend la matière, pas la légende) ; pas de blog (le contenu vit là où il est utile) ; pas de boutique grand public en 2025 (choix de déploiement).\n\nNote d'architecture (orientation 2026-07-04, à valider avec Rémy) : Abstract est une **marque chapeau**, et **Abstract Lab** et **Abstract Bistrot** sont **deux expressions sœurs** (socle commun + expression propre et vivante par lieu). La section Bistrots ne doit donc pas rester un simple encart minimal et fade : c'est une expression vivante de la marque, à traiter comme telle une fois la frontière Lab/Bistrot confirmée.\n\n## Les pages qui portent tout\n\nLa **page d'un Monochrome** est le modèle central. Elle montre d'abord l'arôme rendu (couleur + signature visuelle) et dit en une ligne ce qu'il est : on **montre**, on n'accumule pas les adjectifs. Puis : ses **rôles de composition** (ce qu'il fait *dans* un cocktail, jamais « bois-moi »), son système de couleur, ses accords (seulement s'ils sont justifiés), et le chemin pro (échantillon / commande) accessible dès le premier écran. Le profil aromatique complet est là **en profondeur, sur demande** : jamais un péage.\n\nL'**accueil** cohère en cinq secondes et ne ressemble à rien d'autre. La **preuve** est honnête : on distingue ce qui est mesuré de ce qui est interprété, sans jamais transformer une romance en fait. Sur les **compositions**, le nom du pro passe **avant** celui d'Abstract : on est un moyen, pas la vedette.\n\nLe site est **bilingue FR + EN dès le premier jour** (France, puis Royaume-Uni et Benelux).\n\n## Rester juste : le sensible et la loi Evin\n\nLe cœur de la marque, c'est l'**évocation poétique de la saveur** : suggérer l'idée d'un ingrédient, pas le décrire par ses grammes d'acide. Deux honnêtetés gardent ça propre. D'abord, on dit « évoqué », pas « présent » : le Monochrome beurre évoque le gras que la distillation a justement retiré. Ensuite, la loi Evin : on parle du **fruit** (la framboise), jamais de l'alcool ni d'un effet - ce qui reste à la fois juste et conforme.\n\nConcrètement : contrôle d'âge avant tout contenu produit ; message sanitaire sur toutes les pages, dans les deux langues (c'est le marché français qui déclenche la règle, pas la langue) ; les sorties « Labs » présentées comme des éditions, jamais comme une pression à acheter ; les paliers de commande formulés comme de la logistique, pas comme un encouragement à consommer.\n\n## Le référencement (SEO), sans trahir la marque\n\nLe site est pensé autour des vraies questions d'un pro (« qu'est-ce que cet arôme comme ingrédient ? », « le procédé est-il réel ? », « comment commander ? »), avec **une page par question**. Deux garde-fous : les extraits qui s'affichent dans Google le font **avant** le contrôle d'âge, donc même là, registre du produit et du fruit, jamais d'effet ; et on **n'invente jamais** de notes ou d'avis clients pour décorer les résultats. Pas de course aux requêtes grand public en 2025 (déploiement).\n\n## Ce qui reste à trancher\n\n- **La section Bistrots** comme vraie expression sœur, pas un encart minimal (à valider avec Rémy).\n- **Le profil de saveur** : trouver une expression accessible et non clichée, surtout pas un radar organoleptique de plus.\n- **Le nombre de Monochromes** (7, 7 + 1 édition, ou 8) et les mots d'essence et de signature.\n- **La visibilité des prix pro** selon le marché (France / UK).\n- **Le mécanisme de crédit** des prescripteurs (section Réseau), encore ouvert.\n"}, {"id": "brand-book/lisible/13-print-trade.md", "group": "Brand book", "gorder": 0, "file": "brand-book/lisible/13-print-trade.md", "title_en": "Print & trade", "title_fr": "Print & trade", "en": "# Print & trade\n\nThis chapter covers the printed and sales materials we put in the hands of the team, of clients and of journalists: the product sheet, the press kit, the composition tool, and the legal template common to all print. One principle runs through them all: the legal part is set first and never moves; the brand is composed around it.\n\n## The template common to all print\n\nEvery printed piece is built on three zones:\n\n- a **legal zone**, fixed, locked first;\n- a **language zone** (FR/EN);\n- a **brand zone**, free, where composition, copy and image live.\n\n**Bilingual, always.** FR and EN on every piece. We write English first; French follows as a faithful register - a real voice, not a word-for-word copy. Which language reads first is decided piece by piece: France leads in FR, the UK in EN. Luxembourg is still to be settled; Belgium is not yet scoped (to raise with Nico and legal).\n\n**Evin law.** The health message appears as soon as a French-market buyer might see the piece: this is a rule of market, not of language. The legal zone always stays sharp, never blurred, distorted or condensed. It has a floor size; if it does not fit, we enlarge the piece, we never shrink the mention. And the template does not replace review: every piece goes through the Evin review before publication.\n\n**To confirm with the legal referent:** the exact wording of the mentions, the company's legal identity, and the mandatory trade mentions (VAT, excise, importer for the UK). An unconfirmed cell stays unconfirmed, never \"probably not required\".\n\n## The product sheet (one per Monochrome)\n\nA one-side page that reuses the logic of the Monochrome's web page, recut for a single sheet. It carries: the aroma name (FR + EN), a **sensory line that evokes the flavor**, the provenance and method (hand-painted, vacuum distilled, no additives), two or three composition roles (what the material does **in** a glass, never a finished drink), the Monochrome's color ramp, a few pairings, and a call to action (sample or order, with a link or QR to what comes next).\n\nOne template, as many versions as there are Monochromes: each one's own content is filled in elsewhere. The discipline: the sensory line **evokes**; the facts, for their part, stay true and verifiable. We evoke, we do not oversell, and we speak of the fruit, not of the alcohol or of an effect. The sheet does not copy the site: it points toward the depth (composition, rigor), it does not reproduce it.\n\n## The press kit\n\nA compressed pass through the story, for journalists - an audience in their own right, not a \"B2B client\". The sections: what this is, the positioning (the material and the language of flavor), the range, the rigor and the method, the credited-pro angle, contacts, assets (logo, photos), and the legal notice.\n\nThe central rule: **we do not open on a founder myth** (\"who is Rémy, why he started this\"). We open on the flavor and on the material-and-language idea, evoked honestly. Legitimacy comes through the work - the method, the rigor - not through a personal legend. This is consistent with the idea that Abstract's advantage does not come down to one person.\n\nIf a founder quote appears, it is short, attributed, focused on the product or the method, never leading and never an origin story (to settle with Nico). The credited pro, by contrast, comes first: their name first, Abstract named as the material behind, never the star, and always with their consent. Finally, one story: the kit and the site tell the same thing, and we never write the same claim twice.\n\nThe Bistrot section stays on hold: it depends on the frontier between the Lab (the kitchen, where we make things) and the Bistrot (the lounge, where we host), still to be settled (2026-07-04 orientation: shared foundation + own expression per venue, to validate with Rémy).\n\n## The \"how to compose\" tool (for sales)\n\nA booklet the team leaves with the pro to help them **compose, reproduce and pass on** with the Monochromes. The method is Rémy's cascade: **taste** is the structure you build on (old fashioned, sour, Negroni); **aroma** is a timeline (attack, body, finish, sillage); **texture** is the toolkit (temperature, fat, CO2). Same method, same words as on the site.\n\nThe key point: **the material, not the recipe.** The Monochrome is paint, not a finished painting; the examples illustrate the method, they are not a catalogue to copy. We make the pro an author. Here, technical depth is welcome: this is the moment of the deep dive, not of first discovery.\n\nOn Evin: as soon as it is handed out, the tool becomes public. We say what the material does in the glass, never an effect on the person; the health message appears on every edition aimed at the French market. To confirm with legal: the case where the tool reaches a non-pro reader (left on a counter, photographed). The shape of the object - pages, binding, typography - is the art director's hand.\n\n## Still to be settled\n\n- Exact legal mentions, company identity, trade mentions (legal).\n- Extension of the \"by market\" rule to print (legal).\n- Luxembourg (health text) and Belgium (scoping to open).\n- Health-message size on a deck: two templates contradict each other (fixed floor vs scaling), to settle with Nico and legal.\n- Founder quote in the press kit (Nico).\n- Bistrot section: depends on the Lab/Bistrot frontier.\n", "fr": "# Print & trade\n\nCe chapitre couvre les supports imprimés et de vente qu'on met entre les mains de l'équipe, des clients et des journalistes : la fiche produit, le dossier de presse, l'outil de composition, et le gabarit légal commun à tout le print. Un principe les traverse tous : la partie légale se pose d'abord et ne bouge jamais ; la marque se compose autour.\n\n## Le gabarit commun à tout le print\n\nChaque pièce imprimée se construit sur trois zones :\n\n- une **zone légale**, fixe, verrouillée en premier ;\n- une **zone langue** (FR/EN) ;\n- une **zone de marque**, libre, où vivent la composition, la copie et l'image.\n\n**Bilingue, toujour
